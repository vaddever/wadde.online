  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    /* ── LIGHT theme (default) ─────────────────────────────────── */
    :root {
      --bg:      #f4f7fc;
      --bg2:     #ffffff;
      --bg3:     #eaf0f9;
      --bdr:     rgba(59,88,160,.13);
      --gold:    #c8850c;
      --gdim:    rgba(200,133,12,.1);
      --tx:      #0d1b30;
      --mu:      #4e6a8a;
      --dm:      #9ab0c8;
      --gn:      #16a34a;
      --rd:      #dc2626;
      --bl:      #1d4ed8;
      --r:       12px;
      --rs:      8px;
      --topbar:  rgba(255,255,255,.96);
      --topbar-b:rgba(59,88,160,.1);
      --shadow:  0 1px 4px rgba(13,27,48,.08),0 4px 16px rgba(13,27,48,.04);
      --ov:      rgba(13,27,48,.55);
      --hero:    linear-gradient(160deg,#e8f0fb 0%,#dce8f7 100%);
    }

    /* ── DARK theme ─────────────────────────────────────────────── */
    html.dark {
      --bg:      #080f1e;
      --bg2:     #0d1a2e;
      --bg3:     #0f2140;
      --bdr:     rgba(28,55,100,.7);
      --gold:    #f0b429;
      --gdim:    rgba(240,180,41,.12);
      --tx:      #dce8f5;
      --mu:      #5b8bb8;
      --dm:      #2a4d6e;
      --gn:      #22c55e;
      --rd:      #ef4444;
      --bl:      #3b82f6;
      --topbar:  rgba(8,15,30,.97);
      --topbar-b:rgba(28,55,100,.7);
      --shadow:  none;
      --ov:      rgba(0,0,0,.75);
      --hero:    linear-gradient(160deg,#0e1520 0%,#111827 100%);
    }

    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh;transition:background .25s,color .25s}
    #root{min-height:100vh}

    .topbar{background:var(--topbar);border-bottom:1px solid var(--topbar-b);padding:11px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;backdrop-filter:blur(10px)}
    .logo{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--gold);letter-spacing:1.5px}
    .back-a{font-size:13px;color:var(--mu);text-decoration:none;display:flex;align-items:center;gap:4px}
    .back-a:hover{color:var(--tx)}
    .page{max-width:680px;margin:0 auto;padding:20px 16px 80px}

    .card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem;box-shadow:var(--shadow)}
    .card-dark{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem}
    .card-sm{padding:.75rem 1rem}
    h1,h2,h3{font-family:'Barlow Condensed',sans-serif;font-weight:600;color:var(--tx);letter-spacing:.5px}
    h1{font-size:26px}h2{font-size:21px;margin-bottom:14px}h3{font-size:17px;margin-bottom:10px}
    button{font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
    .btn{padding:9px 16px;border-radius:var(--rs);border:1px solid var(--bdr);background:var(--bg2);color:var(--tx);font-size:13px;display:inline-flex;align-items:center;gap:6px;box-shadow:var(--shadow)}
    .btn:hover:not(:disabled){border-color:var(--mu);background:var(--bg3)}
    .btn-p{padding:10px 20px;border-radius:var(--rs);border:none;background:#1a56db;color:#fff;font-size:14px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
    .btn-p:hover:not(:disabled){background:#1648bf}
    .btn-g{padding:10px 24px;border-radius:var(--rs);border:none;background:var(--gold);color:#fff;font-size:14px;font-weight:600}
    html:not(.dark) .btn-g{color:#3d2200}
    .btn-g:hover{filter:brightness(.92)}
    .theme-btn{padding:7px 11px;border-radius:var(--rs);border:1px solid var(--bdr);background:var(--bg3);color:var(--tx);font-size:16px;line-height:1;cursor:pointer;transition:all .15s}
    .theme-btn:hover{background:var(--bg2);border-color:var(--mu)}
    button:disabled{opacity:.4;cursor:not-allowed}
    input{width:100%;padding:10px 14px;border:1px solid var(--bdr);border-radius:var(--rs);background:var(--bg3);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s,background .2s}
    input:focus{border-color:#1a56db;background:var(--bg2)}
    input::placeholder{color:var(--dm)}
    label{display:block;font-size:13px;color:var(--mu);margin-bottom:5px}
    .tabs{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:20px;overflow-x:auto}
    .tab{padding:10px 16px;border:none;border-bottom:2px solid transparent;background:transparent;font-size:13px;color:var(--mu);white-space:nowrap;transition:all .15s}
    .tab.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:500}
    .tab:hover:not(.on){color:var(--tx)}
    .bdg{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
    .blv{background:rgba(220,38,38,.1);color:var(--rd)}
    .bdn{background:rgba(22,163,74,.1);color:var(--gn)}
    .bup{background:rgba(78,106,138,.1);color:var(--mu)}
    .bpa{background:rgba(180,110,10,.1);color:var(--gold)}
    .toast{position:fixed;top:64px;right:16px;z-index:999;padding:10px 16px;border-radius:var(--rs);font-size:13px;max-width:260px;animation:sli .2s ease;box-shadow:0 4px 16px rgba(0,0,0,.12)}
    .tok{background:var(--bg2);border:1px solid var(--gn);color:var(--gn)}
    .ter{background:var(--bg2);border:1px solid var(--rd);color:var(--rd)}
    @keyframes sli{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
    .ov{position:fixed;inset:0;background:var(--ov);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px 80px;overflow-y:auto}
    .modal{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:1.5rem;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
    .pill{padding:4px 12px;border-radius:20px;border:1px solid;cursor:pointer;font-size:12px;transition:all .15s}
    .pill.on{background:#1a56db;color:#fff;border-color:#1a56db}
    .pill:not(.on){background:transparent;color:var(--mu);border-color:var(--bdr)}
    .pill:not(.on):hover{border-color:var(--mu);color:var(--tx)}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .mc{background:var(--bg2);border:1px solid var(--bdr);border-left:3px solid;border-radius:0 var(--r) var(--r) 0;padding:12px 14px}
    .sn{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:700;min-width:36px;text-align:center;color:var(--tx)}
    .lbr{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
    ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
    @media(max-width:480px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>

<!-- Global crash net: if anything throws after the app has mounted (e.g. a
     bad value coming back from a periodic GAS poll), React unmounts the
     whole tree and #root goes blank with the only trace in devtools console.
     This catches that moment and writes a visible banner instead, so the
     page never just silently disappears. The AppErrorBoundary further down
     handles in-render React errors; this covers everything else
     (async callbacks, timers, promise rejections). -->
<script>
(function(){
  function showCrashBanner(label, err){
    try {
      var msg = (err && (err.message || err.reason && err.reason.message)) || String(err && err.reason || err) || 'Unknown error';
      var existing = document.getElementById('__crash_banner__');
      if (existing) return; // only show the first one
      var el = document.createElement('div');
      el.id = '__crash_banner__';
      el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#7a1212;color:#fff;' +
        'font-family:monospace;font-size:12px;padding:10px 14px;white-space:pre-wrap;max-height:40vh;overflow:auto;' +
        'border-bottom:2px solid #f0b429;';
      el.textContent = '⚠ ' + label + ': ' + msg + '  (page kept your data — try reloading)';
      document.body.appendChild(el);
    } catch(e) { /* never let the error handler itself throw */ }
  }
  window.addEventListener('error', function(e){ showCrashBanner('Script error', e.error || e); });
  window.addEventListener('unhandledrejection', function(e){ showCrashBanner('Unhandled promise rejection', e); });
})();
</script>

// ── KO qualifier calculation ─────────────────────────────────────────────
function getKOQualifiers(results) {
  var w={}, r={}, third=[], groupDone={};
  Object.keys(GRP).forEach(function(g){
    var rows = computeGroupStandings(g, results);
    var gMs  = MS.filter(function(m){return m.gr===g;});
    groupDone[g] = gMs.length>0 && gMs.every(function(m){return !!results[m.id];});
    if(rows[0]) w[g]={team:rows[0].team,confirmed:groupDone[g]};
    if(rows[1]) r[g]={team:rows[1].team,confirmed:groupDone[g]};
    if(rows[2]) third.push(Object.assign({},rows[2],{group:g,confirmed:groupDone[g]}));
  });
  third.sort(function(a,b){return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf;});
  return {winners:w, runners:r, best3rd:third.slice(0,8),
          allGroupsDone: Object.values(groupDone).every(Boolean)};
}

// Resolve a slot label → team name (recursive for KO rounds)
function resolveSlot(slot, q, koRes) {
  if (!slot||!q) return null;
  // Group winner: 'W-A'
  if (/^W-[A-L]$/.test(slot)) { var o=q.winners[slot[2]]; return o?o.team:null; }
  // Group runner-up: 'R-A'
  if (/^R-[A-L]$/.test(slot)) { var o=q.runners[slot[2]]; return o?o.team:null; }
  // Best 3rd: '3rd-1' … '3rd-8'
  if (/^3rd-\d$/.test(slot)) { var o=q.best3rd[+slot[4]-1]; return o?o.team:null; }
  // Winner of prior KO match: 'W-r32_01' or bare 'r32_01' (h_from/a_from use bare IDs)
  var isLoser  = slot.startsWith('L-');
  var matchId  = isLoser ? slot.slice(2) : (slot.startsWith('W-') ? slot.slice(2) : slot);
  var km = KO_MS.find(function(m){return m.id===matchId;});
  if (!km) return null;
  var res = koRes && koRes[matchId];
  if (!res) return null;
  var homeTeam = resolveSlot(km.h_slot||km.h_from, q, koRes);
  var awayTeam = resolveSlot(km.a_slot||km.a_from, q, koRes);
  var hWon = res.h > res.a, aWon = res.a > res.h;
  if (!hWon && !aWon) return null; // draw (AET/pens — treat as winner = home for now)
  return isLoser ? (hWon?awayTeam:homeTeam) : (hWon?homeTeam:awayTeam);
}

function koMatchTeams(km, q, koRes) {
  return {
    h: resolveSlot(km.h_slot||km.h_from, q, koRes),
    a: resolveSlot(km.a_slot||km.a_from, q, koRes),
  };
}

// ── Live score API (football-data.org) ──────────────────────────────────
// Process raw API matches array → call onUpdate with result map
function _applyMatches(matches, onUpdate, onLive) {
  var ALL = MS.concat(KO_MS);
  var upd = {}, live = {};
  (matches||[]).forEach(function(am){
    var sc=am.score&&am.score.fullTime;
    if (!sc||sc.home===null||sc.away===null) return;
    var hn=fdTeam(am.homeTeam&&am.homeTeam.name||'');
    var an=fdTeam(am.awayTeam&&am.awayTeam.name||'');
    var found=ALL.find(function(m){
      return (m.h===hn&&m.a===an)||(m.h===an&&m.a===hn);
    });
    if (!found) return;
    var sw=(found.h===an);
    var h=sw?sc.away:sc.home, a=sw?sc.home:sc.away;
    var st=am.status||'';
    if (st==='FINISHED') {
      upd[found.id]={h:h, a:a, auto:true};
    } else if (st==='IN_PLAY'||st==='PAUSED'||st==='HALFTIME'||st==='LIVE') {
      var ht=am.score.halfTime||{}; var period=st;
      var minRaw=am.minute||am.minutesElapsed||null;
      var minStr=minRaw?minRaw+"'":st==='PAUSED'?'HT':(st==='HALFTIME'?'HT':'LIVE');
      live[found.id]={h:h, a:a, status:st, min:minStr, htH:sw?ht.away:ht.home, htA:sw?ht.home:ht.away};
    }
  });
  if (Object.keys(upd).length) onUpdate(upd);
  if (onLive) onLive(live);
}

function fetchLiveScores(apiKey, onUpdate, onLive, onError) {
  if (!apiKey) { if (onError) onError('No API key'); return; }
  fetch(GS_URL + '?action=livescores&key=' + encodeURIComponent(apiKey))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.ok) {
        _applyMatches(d.matches, onUpdate, onLive);
      } else {
        var msg = d.error || 'GAS error';
        console.warn('Live scores error:', msg);
        if (onError) onError(msg);
      }
    })
    .catch(function(e){
      console.warn('Live scores fetch error:', e.message);
      if (onError) onError(e.message);
    });
}

function computeGroupStandings(grpKey, results) {
  var teams = GRP[grpKey] || [];
  var s = {};
  teams.forEach(function(t){ s[t]={mp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}; });
  MS.filter(function(m){ return m.gr===grpKey && results && results[m.id]; }).forEach(function(m){
    var r=results[m.id], h=m.h, a=m.a;
    // Guard: skip if either team isn't in this group's roster. This can
    // happen if a result references a team name that doesn't match GRP
    // (stale data, a manual edit, etc.) — previously this threw
    // "Cannot read properties of undefined (reading 'mp')" and crashed
    // the whole app since this runs unguarded on every render.
    if (!s[h] || !s[a]) { console.warn('computeGroupStandings: skipping match with unknown team(s)', m.id, h, a, 'group', grpKey); return; }
    s[h].mp++; s[a].mp++;
    s[h].gf+=r.h; s[h].ga+=r.a; s[a].gf+=r.a; s[a].ga+=r.h;
    s[h].gd=s[h].gf-s[h].ga; s[a].gd=s[a].gf-s[a].ga;
    if(r.h>r.a){s[h].w++;s[h].pts+=3;s[a].l++;}
    else if(r.h<r.a){s[a].w++;s[a].pts+=3;s[h].l++;}
    else{s[h].d++;s[h].pts++;s[a].d++;s[a].pts++;}
  });
  return teams.map(function(t){ return Object.assign({team:t},s[t]); })
    .sort(function(a,b){ return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||b.w-a.w; });
}

// Get key players for a team (top 6 by position order FW/MF/DF/GK)
function getTeamPlayers(team) {
  var order = {FW:0, MF:1, DF:2, GK:3};
  return WC_PLAYERS.filter(function(p){ return p.t === team; })
    .sort(function(a,b){ return (order[a.p]||0)-(order[b.p]||0); })
    .slice(0, 6);
}

// Get today's and next 24h matches
function getUpcomingMatchDay() {
  var now = Date.now();
  var soon = now + 86400000 * 2; // next 2 days
  return MS.filter(function(m) {
    var mt = new Date(m.utc).getTime();
    return mt >= now - 7200000 && mt <= soon;
  }).slice(0, 8);
}

// Check if any match is currently live
function anyLive() {
  var now = Date.now();
  return MS.some(function(m) {
    var st = new Date(m.utc).getTime();
    return now >= st && now <= st + 7200000;
  });
}

    .catch(function() { return null; });
  },

  // Write one key to the Sheet (POST with text/plain avoids CORS preflight)
  _write: function(key, val) {
    return fetch(GS_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'set', key: key, value: val })
    })
    .then(function(r) { return r.json(); })
    .catch(function(e) { console.warn('Sheet write error:', e); });
  },

  // Public: get a value
  get: function(path) {
    if (!this._ready()) return Promise.resolve(null);
    var key = 'wc26_' + path.replace(/\//g,'_');
    return this._read(key).then(function(v) {
      if (v !== null) _cache[key] = v;
      return _cache[key] !== undefined ? _cache[key] : null;
    });
  },

  // Public: set a value (supports sub-paths like 'preds/userId_matchId')
  set: function(path, val) {
    if (!this._ready()) return Promise.resolve();
    var self = this;
    var parts  = path.split('/');
    var rootKey = 'wc26_' + parts[0];

    if (parts.length === 1) {
      // Simple set
      _cache[rootKey] = val;
      _lastWrite[rootKey] = Date.now();   // record when we wrote
      (_listeners[rootKey] || []).forEach(function(cb) { cb(val || {}); });
      return self._write(rootKey, val);
    } else {
      // Sub-path merge: read → patch → write
      var childKey = parts.slice(1).join('_');
      var parent = _cache[rootKey] || {};
      if (!_cache[rootKey]) {
        return self._read(rootKey).then(function(existing) {
          var obj = existing || {};
          obj[childKey] = val;
          _cache[rootKey] = obj;
          (_listeners[rootKey] || []).forEach(function(cb) { cb(obj); });
          return self._write(rootKey, obj);
        });
      } else {
        parent[childKey] = val;
        _cache[rootKey] = parent;
        (_listeners[rootKey] || []).forEach(function(cb) { cb(parent); });
        return self._write(rootKey, parent);
      }
    }
  },

  // Public: subscribe to a key with polling (fires immediately + every 8s)
  listen: function(path, cb) {
    if (!this._ready()) { setTimeout(function() { cb({}); }, 0); return function() {}; }
    var self = this;
    var key = 'wc26_' + path.replace(/\//g,'_');
    if (!_listeners[key]) _listeners[key] = [];
    _listeners[key].push(cb);

    function load() {
      self._read(key).then(function(v) {
        if (v !== null) {
          // Don't overwrite cache with GAS data if we wrote locally in the last 8s
          // (GAS write may not have been processed yet)
          var writtenRecently = _lastWrite[key] && (Date.now() - _lastWrite[key] < 8000);
          if (!writtenRecently) {
            _cache[key] = v;
          }
        }
        cb(_cache[key] || {});
      }).catch(function() { cb(_cache[key] || {}); });
    }

    load();
    var timer = setInterval(load, anyLive() ? 3000 : 5000);
    return function() {
      clearInterval(timer);
      _listeners[key] = (_listeners[key] || []).filter(function(x) { return x !== cb; });
    };
  }
};

// Helpers
function calcPts(p, r, matchId) {
  if (!p || !r) return null;
  if (p.h===undefined||p.a===undefined||r.h===undefined||r.a===undefined) return null;
  var ph=Number(p.h), pa=Number(p.a), rh=Number(r.h), ra=Number(r.a);
  // Determine actual result direction (handle penalty winners in KO)
  var rw = rh>ra?1:rh<ra?-1:0;
  if (rw===0 && r.winner) {
    // Draw with penalty winner — find match to know home/away
    var m = matchId ? KO_MS.find(function(x){return x.id===matchId;}) : null;
    rw = (m && r.winner===m.h) ? 1 : -1;
  }
  if (ph===rh && pa===ra) {
    // Exact score match
    if (rw!==0 && ph===pa) {
      // KO draw exact — also check winner pick
      var pw2 = p.winner ? ((p.winner && r.winner && p.winner===r.winner)?rw:rw*-1) : 0;
      return pw2===rw ? 4 : 2; // right winner = 4pts, wrong winner = 2pts
    }
    return 4;
  }
  var pw = ph>pa?1:ph<pa?-1:0;
  // For KO draw prediction, use winner field to determine direction
  if (pw===0 && p.winner && matchId) {
    var km = KO_MS.find(function(x){return x.id===matchId;});
    if (km) pw = p.winner===km.h ? 1 : -1;
  }
  return pw===rw ? 2 : 0;
}
function fmtTime(iso) {
  var d   = new Date(iso);
  var tz  = 'Indian/Maldives'; // MVT = UTC+5
  var day  = d.toLocaleDateString('en-US',  {weekday:'short', timeZone:tz});         // "Fri"
  var date = d.toLocaleDateString('en-US',  {month:'short', day:'numeric', timeZone:tz}); // "Jun 12"
  var time = d.toLocaleTimeString('en-US',  {hour:'2-digit', minute:'2-digit',
               hour12:false, timeZone:tz});                                           // "07:00"
  return { day:day, date:date, time:time,
    local: day + ', ' + date + ', ' + time,
    utcS:  d.toUTCString().replace(' GMT','') + ' UTC' };
}
function mStat(m, results) {
  var now = Date.now(), st = new Date(m.utc).getTime();
  if (results[m.id]) return 'done';
  if (now >= st + 7200000) return 'past';
  if (now >= st) return 'live';
  return 'soon';
}
// Single source of truth for whether a prediction can still be made/edited.
// cutoffMin = minutes before kickoff after which predictions lock (superadmin-
// configurable; 0 = lock exactly at kickoff). Used both by the UI (to hide/
// disable predict buttons) and by doPredict itself as a final guard, so no
// code path can bypass the lockout.
function canStillPredict(m, cutoffMin) {
  if (!m || !m.utc) return false;
  var cutoff = (Number(cutoffMin)||0) * 60000;
  return Date.now() < (new Date(m.utc).getTime() - cutoff);
}
function genCode() { return Math.random().toString(36).substring(2,8).toUpperCase(); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).substring(2,6); }
function shuffle(arr) { return arr.slice().sort(function() { return Math.random() - 0.5; }); }

  var maU = useState(''); var manualUid = maU[0]; var setManualUid = maU[1];

  var syncStatus = useState('idle'); var syncSt=syncStatus[0]; var setSyncSt=syncStatus[1];

  // Password change
  var npS = useState(''); var newPw = npS[0]; var setNewPw = npS[1];
  var opS = useState(''); var oldPw = opS[0]; var setOldPw = opS[1];
  var pwMsgS = useState(''); var pwMsg = pwMsgS[0]; var setPwMsg = pwMsgS[1];

  // ── Password helpers (local-first, GAS optional) ────────────────────
  function getSuperHash() {
    // Default hash of 'wadde2026'; user can override in localStorage
    return _ls.get('wc26_superpw_hash', btoa('wadde2026')) || btoa('wadde2026');
  }
  function verifyLocal(pw) { return btoa(pw) === getSuperHash(); }

  function doLogin() {
    if (!pass.trim()) return;
    // 1. Verify locally first (works without GAS)
    if (verifyLocal(pass.trim())) {
      setAuthed(true); setErr(''); loadAll(); return;
    }
    // 2. Fall back to GAS verification (works once GAS is updated)
    setErr('Checking…');
    fetch(GS_URL + '?action=superlogin&pass=' + encodeURIComponent(pass.trim()))
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d.ok) {
          // Sync local hash from GAS
          _ls.set('wc26_superpw_hash', btoa(pass.trim()));
          setAuthed(true); setErr(''); loadAll();
        } else setErr('✗ Wrong password');
      })
      .catch(function(){ setErr('✗ Wrong password'); });
  }

  function loadAll() {
    setLoading(true);
    var keys = ['wc26_users','wc26_rooms','wc26_preds','wc26_results','wc26_global_anns','wc26_pred_log','wc26_bonus','wc26_koresults','wc26_pin_requests','wc26_settings','wc26_ko_schedule'];
    var done = 0;

                   wc26_preds:setSaPreds, wc26_results:setSaResults,
                   wc26_koresults:setSaKoResults, wc26_bonus:setSaBonusPts, wc26_pin_requests:function(v){setPinRequests(Array.isArray(v)?v:[]);}, wc26_settings:function(v){if(v&&typeof v.showBadges!=='undefined')setShowBadges(v.showBadges); if(v&&typeof v.predictionCutoffMinutes!=='undefined'){var n=Number(v.predictionCutoffMinutes);if(!isNaN(n))setPredCutoffMin(n);}},
                   wc26_pred_log:function(v){setPredLog(Array.isArray(v)?v.slice(-300):[]);},
                   wc26_global_anns:function(v){setGlobalAnns(Array.isArray(v)?v:v?Object.values(v):[]);}, wc26_ko_schedule:function(v){setSaKoSchedule(Array.isArray(v)?v:v?Object.values(v):[]);} };
    function tick() { done++; if (done >= keys.length) setLoading(false); }
    keys.forEach(function(k){
      fetch(GS_URL + '?action=get&key=' + k)
        .then(function(r){ return r.json(); })
        .then(function(d){ setters[k](d.value||{}); tick(); })

  function deleteUser(uid) {

    Object.keys(nr).forEach(function(rid) {

    // 3. Save users (required) — rooms (if changed)
    fetch(GS_URL, {method:'POST', headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'set', key:'wc26_users', value:nu})})
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d.ok !== false) {
          setSaUsers(nu);
          if (roomsChanged) {
            setSaRooms(nr);

              body:JSON.stringify({action:'set', key:'wc26_rooms', value:nr})});

                    }}>Reject</button>

              })}

        </div>

        <!-- Change User PIN directly -->

              style=${{width:150,padding:'7px',fontSize:12,background:'var(--bg3)',color:'var(--tx)',border:'1px solid var(--bdr)',borderRadius:'var(--rs)'}} />

function WelcomePage(props) {
  // Live seconds ticker for welcome page
  var TARGET = new Date('2026-06-11T19:00:00Z').getTime();
  var cs = useState(Math.max(0, TARGET - Date.now()));
  var rem = cs[0]; var setRem = cs[1];
  useEffect(function() {
    if (rem <= 0) return;
    var tmr = setInterval(function() { setRem(Math.max(0, TARGET - Date.now())); }, 1000);
    return function() { clearInterval(tmr); };
  }, []);
  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  var dd = Math.floor(rem / 86400000);
  var hh = Math.floor((rem % 86400000) / 3600000);
  var mm = Math.floor((rem % 3600000) / 60000);
  var ss = Math.floor((rem % 60000) / 1000);

  return html`<div>
    <div class="card-dark" style=${{padding:'32px 24px 28px',marginBottom:14,textAlign:'center',
      borderColor:'rgba(240,180,41,.15)',background:'var(--hero)'}}>

      <!-- WC 2026 official logo -->
      <div style=${{display:'flex',justifyContent:'center',marginBottom:14}}>
        <${WC2026Logo} size=${90} />
      </div>
      <div style=${{fontFamily:'Barlow Condensed,sans-serif',fontSize:11,letterSpacing:5,
        color:'var(--gold)',fontWeight:700,marginBottom:6,textTransform:'uppercase'}}>FIFA World Cup</div>
      <h1 style=${{fontSize:30,marginBottom:5,fontWeight:800,letterSpacing:-.3}}>2026 Prediction League</h1>
      <p style=${{color:'var(--mu)',fontSize:13,marginBottom:20}}>USA · Canada · Mexico | Jun 11 — Jul 19</p>

      <!-- Live countdown pill -->
      ${rem > 0
        ? html`<div style=${{display:'inline-flex',alignItems:'center',gap:10,
            background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.11)',
            borderRadius:24,padding:'8px 20px',marginBottom:24,cursor:'default'}}>
            <span style=${{fontSize:14}}>⏱</span>
            ${[{v:pad(dd),l:'d'},{v:pad(hh),l:'h'},{v:pad(mm),l:'m'},{v:pad(ss),l:'s'}].map(function(u){
              return html`<div key=${u.l} style=${{display:'flex',alignItems:'baseline',gap:1}}>
                <span style=${{fontFamily:'Barlow Condensed,sans-serif',fontSize:20,fontWeight:700,
                  color:'var(--gold)',letterSpacing:.5}}>${u.v}</span>
                <span style=${{fontSize:10,color:'var(--mu)',marginRight:6}}>${u.l}</span>
              </div>`;
            })}
            <span style=${{fontSize:13,color:'var(--mu)'}}>until kick-off!</span>
          </div>`
        : html`<div style=${{display:'inline-flex',alignItems:'center',gap:8,
            background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',
            borderRadius:24,padding:'8px 20px',marginBottom:24}}>
            <span style=${{fontSize:14,color:'#f87171',fontWeight:600}}>🔴 Tournament is underway!</span>
          </div>`

function PlayerPicker(props) {
  var ss = useState(''); var search = ss[0]; var setSearch = ss[1];
  var POS_COLOR = {FW:'rgba(239,68,68,.15)',MF:'rgba(59,130,246,.15)',DF:'rgba(34,197,94,.15)',GK:'rgba(245,158,11,.15)'};
  var POS_TEXT  = {FW:'#f87171',MF:'#60a5fa',DF:'#4ade80',GK:'#fbbf24'};

  // selected is a single player name string (or empty string)

              borderRadius:20,padding:'5px 12px 5px 14px',fontSize:13}}>
            <span style=${{color:'var(--tx)',fontWeight:500}}>${selected}</span>

function AuthPage(props) {

  var pis=useState(''); var pin=pis[0]; var setPin=pis[1];
  var ts2=useState(''); var teamSearch=ts2[0]; var setTeamSearch=ts2[1];
  var fs=useState([]); var favT=fs[0]; var setFavT=fs[1];
  var fp=useState([]); var favP=fp[0]; var setFavP=fp[1];
  var ss=useState(1); var step=ss[0]; var setStep=ss[1];

        ${[['login','Log in'],['reg','Create Profile']].map(function(pair){ return html`<button key=${pair[0]} class=${'tab '+(props.mode===pair[0]?'on':'')} onClick=${function(){reset(pair[0]);}}>${pair[1]}</button>`; })}
      </div>
      ${props.mode==='login' ? html`<div style=${{display:'flex',flexDirection:'column',gap:14}}>
        <h2>Welcome back</h2>

        <div><label>PIN</label><input type="password" inputMode="numeric" maxLength="6" value=${pin} onChange=${function(e){setPin(e.target.value.replace(/\D/g,''));}} placeholder="4–6 digit PIN" /></div>
        <p style=${{fontSize:11,color:'var(--dm)',margin:'-8px 0 0'}}>No PIN? Leave blank (older accounts work without it)</p>
        <button class="btn-p" style=${{width:'100%',marginTop:4}} onClick=${sub}>Log in →</button>
        <button class="btn" style=${{width:'100%',marginTop:6,fontSize:12,color:'var(--dm)'}}
          onClick=${function(){props.onForgotPin&&props.onForgotPin(name,phone);}}>🔑 Forgot PIN? Request reset</button>
      </div>` : html`<div>
        ${step===1&&html`<div style=${{display:'flex',flexDirection:'column',gap:14}}>
          <h2>Create profile <span style=${{fontSize:13,color:'var(--mu)',fontWeight:400}}>1 of 3</span></h2>
          <div><label>Your name</label><input value=${name} onChange=${function(e){setName(e.target.value);}} placeholder="Full name" /></div>
          <div><label>Phone</label><input value=${phone} onChange=${function(e){setPhone(e.target.value);}} placeholder="+1234567890" /></div>
          <div>
            <label>Create a PIN <span style=${{color:'var(--dm)',fontWeight:400,fontSize:12}}>(4–6 digits, required to log in)</span></label>
            <input type="password" inputMode="numeric" maxLength="6" value=${pin} onChange=${function(e){setPin(e.target.value.replace(/\D/g,''));}} placeholder="e.g. 1234" />
          </div>
          <button class="btn-p" style=${{width:'100%',opacity:(!name||!phone||pin.length<4)?0.45:1}} disabled=${!name||!phone||pin.length<4} onClick=${sub}>Next: Pick teams →</button>
        </div>`}
        ${step===2&&html`<div>
          <h2>Favorite teams <span style=${{fontSize:13,color:'var(--mu)',fontWeight:400}}>2 of 3 · pick 1</span></h2>
          <input value=${teamSearch} onChange=${function(e){setTeamSearch(e.target.value);}} placeholder="🔍 Search teams…" style=${{marginBottom:10,fontSize:13}} autoFocus />
          <div class="g3" style=${{marginBottom:14,maxHeight:260,overflowY:'auto',padding:4}}>

              <${FlagImg} team=${t} w=${32} />
              <span style=${{textAlign:'center',fontSize:10,lineHeight:1.2}}>${t}</span>
            </button>`; })}
          </div>
          <div style=${{display:'flex',gap:8}}>
            <button class="btn" style=${{flex:1}} onClick=${function(){setStep(1);}}>← Back</button>
            <button class="btn-p" style=${{flex:2,opacity:!favT.length?0.45:1}} disabled=${!favT.length} onClick=${sub}>Next: Players →</button>

      </div>`}
    </div>
  </div>`;
}


// ── WC 2026 Live Countdown Banner ─────────────────────────────────────────
function CountdownBanner() {
  var TARGET = new Date('2026-06-11T19:00:00Z').getTime(); // Opening match MVT
  var cs = useState(Math.max(0, TARGET - Date.now()));
  var rem = cs[0]; var setRem = cs[1];

  useEffect(function() {
    if (rem <= 0) return;
    var timer = setInterval(function() {
      setRem(Math.max(0, TARGET - Date.now()));
    }, 1000);
    return function() { clearInterval(timer); };
  }, []);

  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  var d = Math.floor(rem / 86400000);
  var h = Math.floor((rem % 86400000) / 3600000);
  var m = Math.floor((rem % 3600000) / 60000);
  var s = Math.floor((rem % 60000) / 1000);
  var units = [{v:pad(d),l:'days'},{v:pad(h),l:'hours'},{v:pad(m),l:'mins'},{v:pad(s),l:'secs'}];

  return html`<div style=${{
    background:'linear-gradient(135deg,#2D3CE6 0%,#1a29c8 100%)',
    borderRadius:'var(--rs)', padding:'10px 18px',
    display:'flex', alignItems:'center', justifyContent:'space-between',
    marginBottom:16, gap:12, overflow:'hidden', position:'relative'
  }}>
    <!-- subtle radial glow -->
    <div style=${{position:'absolute',inset:0,background:'radial-gradient(ellipse 60% 80% at 30% 50%,rgba(255,255,255,.06),transparent)',pointerEvents:'none'}}></div>

    <!-- Left: Logo + text -->
    <div style=${{display:'flex',alignItems:'center',gap:12,position:'relative'}}>
      <!-- WC 2026 official logo -->
      <${WC2026Logo} size=${44} />
      <div>
        <div style=${{fontWeight:700,fontSize:14,color:'white',letterSpacing:.2,lineHeight:1.2}}>FIFA World Cup 2026™</div>
        <div style=${{fontSize:11,color:'rgba(255,255,255,.65)',marginTop:3}}>11 June – 19 July 2026</div>
      </div>
    </div>

    <!-- Right: Countdown or LIVE -->
    <div style=${{position:'relative'}}>
      ${rem > 0
        ? html`<div style=${{display:'flex',gap:14,alignItems:'flex-start'}}>
            ${units.map(function(u){
              return html`<div key=${u.l} style=${{textAlign:'center'}}>
                <div style=${{fontFamily:'Barlow Condensed,Arial Narrow,sans-serif',fontSize:34,fontWeight:700,color:'white',lineHeight:1,letterSpacing:1}}>${u.v}</div>
                <div style=${{fontSize:10,color:'rgba(255,255,255,.55)',marginTop:1,letterSpacing:.5,textTransform:'uppercase'}}>${u.l}</div>
              </div>`;
            })}
          </div>`
        : html`<div style=${{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}}>
            <div style=${{fontFamily:'Barlow Condensed,sans-serif',fontSize:18,fontWeight:800,color:'#fbbf24',letterSpacing:.5}}>⚽ GROUP STAGE</div>
            <div style=${{fontSize:11,color:'rgba(255,255,255,.7)'}}>In progress</div>
          </div>`
      }
    </div>
  </div>`;
}

          return html`<div key=${m.id} class="card" style=${{padding:'12px 14px',borderLeft:'3px solid '+(isLive?'#ef4444':'rgba(240,180,41,.5)')}}>
            <div style=${{display:'flex',alignItems:'center',gap:10}}>
              <div style=${{display:'flex',alignItems:'center',gap:6,flex:1}}>
                <${TeamCircle} team=${m.h} size=${28} />

              <div style=${{fontSize:11,fontWeight:600,color:isLive?'#ef4444':'var(--mu)',textAlign:'center',minWidth:40}}>
                ${isLive?'🔴 LIVE':'vs'}
              </div>
              <div style=${{display:'flex',alignItems:'center',gap:6,flex:1,justifyContent:'flex-end'}}>
                <span style=${{fontSize:13,fontWeight:500}}>${m.a} ${F[m.a]||''}</span>

            <div style=${{fontSize:11,color:'var(--mu)',marginTop:6,textAlign:'center'}}>${t.local} · Group ${m.gr}</div>
          </div>`;
        })}
      </div>
    </div>`}

  </div>`;
}

// ── Full KO Bracket View ──────────────────────────────────────────────────
function KOBracketView(props) {
  var koRes = props.koResults || {};
  var preds = props.preds || {};
  var uid   = props.user && props.user.id;
  var now   = Date.now();

  // Group KO_MS by round
  var byRound = {};
  
  // Resolve team name: if placeholder like 'W r32_01', look up koResults
  function getTeam(slot, koRes) {
    if (!slot || (!slot.startsWith('W ') && !slot.startsWith('Los ') && !slot.startsWith('Win '))) return slot;
    var m = slot.match(/^(W|Win|Los)\s+(r32|r16|qf|sf|3pl|fin)_?(\S+)$/);
    if (!m) return slot;
    var isLoss = m[1]==='Los';
    var matchId = m[2]+'_'+m[3];
    if (matchId.includes('__')) matchId = matchId.replace('__','_'); // normalize
    var res = koRes[matchId];
    if (!res) return slot; // not played yet
    var parentMatch = KO_MS.find(function(x){return x.id===matchId;});
    if (!parentMatch) return slot;
    var hTeam = getTeam(parentMatch.h, koRes);
    var aTeam = getTeam(parentMatch.a, koRes);
    if (res.h > res.a) return isLoss ? aTeam : hTeam;
    if (res.a > res.h) return isLoss ? hTeam : aTeam;
    // Draw — use winner field if available
    if (res.winner) {
      var winnerTeam = res.winner === parentMatch.h ? hTeam : aTeam;
      return isLoss ? (winnerTeam===hTeam?aTeam:hTeam) : winnerTeam;
    }
    return slot;
  }

// Merge hardcoded KO_MS with any custom schedule from GAS
  var effKO_BV = (function(){
    var ks = props.koSchedule || [];
    if (!ks.length) return KO_MS;
    var ovMap = {};
    ks.forEach(function(m){ if(m.id) ovMap[m.id]=m; });
    return KO_MS.map(function(m){ return ovMap[m.id]?Object.assign({},m,ovMap[m.id]):m; })
                .concat(ks.filter(function(m){return m.id&&!KO_MS.find(function(k){return k.id===m.id;});}));
  })();
  effKO_BV.forEach(function(m) {
    if (!byRound[m.rd]) byRound[m.rd] = [];
    byRound[m.rd].push(m);
  });
  var rounds = ['R32','R16','QF','SF','3PL','FIN'];
  var roundLabels = {R32:'Round of 32',R16:'Round of 16',QF:'Quarter-Finals',SF:'Semi-Finals','3PL':'3rd Place Play-off',FIN:'🏆 Final'};

  var ROUND_COLORS = {R32:'#3b82f6',R16:'#8b5cf6',QF:'#f59e0b',SF:'#ef4444','3PL':'#6b7280',FIN:'#f0b429'};

  function matchStatus(m) {
    var mTime = new Date(m.utc).getTime();
    var res   = koRes[m.id];
    if (res) return 'done';
    if (now > mTime) return 'live';
    if (now > mTime - 3600000) return 'soon';
    return 'upcoming';
  }

  return html`<div style=${{display:'flex',flexDirection:'column',gap:20}}>
    ${rounds.filter(function(rd){return byRound[rd]&&byRound[rd].length;}).map(function(rd){
      var matches = byRound[rd];
      var color   = ROUND_COLORS[rd]||'#60a5fa';
      var upcoming = matches.filter(function(m){return matchStatus(m)==='upcoming';});
      var live     = matches.filter(function(m){return matchStatus(m)==='live'||matchStatus(m)==='soon';});
      var done     = matches.filter(function(m){return matchStatus(m)==='done';});

      return html`<div key=${rd}>
        <!-- Round header -->
        <div style=${{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          <div style=${{height:3,flex:1,background:color,borderRadius:2,opacity:.4}}></div>
          <span style=${{fontSize:11,fontWeight:700,color:color,letterSpacing:1,textTransform:'uppercase',whiteSpace:'nowrap'}}>${roundLabels[rd]||rd}</span>
          <div style=${{height:3,flex:1,background:color,borderRadius:2,opacity:.4}}></div>
        </div>

        <!-- Matches -->
        <div style=${{display:'flex',flexDirection:'column',gap:8}}>
          ${matches.map(function(m){
            var status = matchStatus(m);
            var res    = koRes[m.id];
            var myPred = uid ? preds[uid+'_'+m.id] : null;
            var mTime  = new Date(m.utc);
            var mvtStr = mTime.toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Indian/Maldives'});
            var resolvedH = getTeam(m.h, koRes);
            var resolvedA = getTeam(m.a, koRes);
            var isKnown = resolvedH && !resolvedH.startsWith('W ') && !resolvedH.startsWith('L ') && !resolvedH.startsWith('Win ');

            return html`<div key=${m.id} style=${{
              borderRadius:'var(--rs)',
              border:'1px solid '+(status==='live'||status==='soon'?'rgba(239,68,68,.4)':status==='done'?'rgba(74,222,128,.15)':'var(--bdr)'),
              background:status==='live'||status==='soon'?'rgba(239,68,68,.04)':status==='done'?'rgba(74,222,128,.03)':'var(--bg2)',
              overflow:'hidden'
            }}>
              <!-- Match row -->
              <div style=${{display:'flex',alignItems:'center',padding:'10px 12px',gap:8}}>
                <!-- Home team -->
                <div style=${{flex:1,display:'flex',alignItems:'center',gap:6,justifyContent:'flex-end',minWidth:0}}>
                  ${isKnown?html`<${FlagImg} team=${resolvedH} w=${22} />`:null}
                  <span style=${{fontSize:13,fontWeight:700,color:'var(--tx)',textAlign:'right',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${resolvedH}</span>
                </div>
                <!-- Score / time -->
                <div style=${{textAlign:'center',flexShrink:0,width:80}}>
                  ${status==='done'&&res?html`<div style=${{fontFamily:'Barlow Condensed,sans-serif',fontSize:22,fontWeight:900,color:'var(--tx)',letterSpacing:2}}>${res.h}–${res.a}</div>`:null}
                  ${status==='live'||status==='soon'?html`<div>
                    <div style=${{fontSize:10,color:'#ef4444',fontWeight:700,animation:'pulse 1s infinite'}}>● LIVE</div>
                    <div style=${{fontSize:11,color:'var(--dm)'}}>${mvtStr.split(', ').slice(1).join(', ')}</div>
                  </div>`:null}
                  ${status==='upcoming'?html`<div style=${{fontSize:10,color:'var(--dm)',lineHeight:1.4}}>
                    <div style=${{fontWeight:600,color:'var(--mu)'}}>${mvtStr.split(' ')[0]} ${mvtStr.split(' ')[1]} ${mvtStr.split(' ')[2]}</div>
                    <div>${mvtStr.split(', ').pop()} MVT</div>
                  </div>`:null}
                </div>
                <!-- Away team -->
                <div style=${{flex:1,display:'flex',alignItems:'center',gap:6,minWidth:0}}>
                  ${isKnown?html`<${FlagImg} team=${resolvedA} w=${22} />`:null}
                  <span style=${{fontSize:13,fontWeight:700,color:'var(--tx)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${m.a}</span>
                </div>
              </div>

              <!-- My prediction + action row -->
              ${(myPred||(!res&&isKnown&&status!=='done'))&&html`<div style=${{borderTop:'1px solid var(--bdr)',padding:'6px 12px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,background:'rgba(0,0,0,.1)'}}>
                <div style=${{fontSize:11,color:'var(--dm)'}}>
                  ${myPred?html`<span>My pick: <strong style=${{color:'var(--tx)',fontFamily:'Barlow Condensed,sans-serif',fontSize:14}}>${myPred.h}–${myPred.a}</strong>
                    ${res?html`<span style=${{marginLeft:6,fontWeight:600,color:(myPred.h==res.h&&myPred.a==res.a)?'#fbbf24':((myPred.h>myPred.a&&res.h>res.a)||(myPred.h<myPred.a&&res.h<res.a)||(myPred.h==myPred.a&&res.h==res.a))?'#4ade80':'#f87171'}}>
                      ${(myPred.h==res.h&&myPred.a==res.a)?'🎯 +4pts':((myPred.h>myPred.a&&res.h>res.a)||(myPred.h<myPred.a&&res.h<res.a)||(myPred.h==myPred.a&&res.h==res.a))?'✓ +2pts':'✗ 0pts'}
                    </span>`:null}
                  </span>`:html`<span style=${{color:'var(--dm)'}}>No prediction yet</span>`}
                </div>
                ${!res&&isKnown&&props.onPredict&&canStillPredict(m,props.predCutoffMin)?html`<button class="btn-p" style=${{fontSize:11,padding:'4px 12px'}}
                  onClick=${function(){props.onPredict(m);}}>
                  ${myPred?'✎ Edit':'⚽ Predict'}
                </button>`:(!res&&isKnown&&myPred===null?html`<span style=${{fontSize:11,color:'var(--dm)'}}>🔒 Locked</span>`:null)}
              </div>`}
            </div>`;
          })}
        </div>
      </div>`;
    })}
  </div>`;
}



// ── Chat Room ─────────────────────────────────────────────────────────────
function ChatRoom(props) {
  var user = props.user;
  var msgs = props.msgs || [];
  var ts = useState(''); var text = ts[0]; var setText = ts[1];
  var rs = useState(false); var sending = rs[0]; var setSending = rs[1];
  var endRef = { current: null };

  // Auto-scroll to bottom when new messages arrive
  useEffect(function() {
    if (endRef.current) endRef.current.scrollIntoView({behavior:'smooth'});
  }, [msgs.length]);

  function send() {
    var msg = text.trim();
    if (!msg || sending) return;
    setSending(true);
    var newMsg = {uid: user.id, name: user.name, text: msg, ts: Date.now()};
    props.onSend(newMsg, function(){ setSending(false); setText(''); });
  }

  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

  function fmtMsgTime(ts) {
    var d = new Date(ts);
    var now = new Date();
    var isToday = d.toDateString() === now.toDateString();
    return isToday
      ? d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
      : d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' +
        d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  // Group consecutive messages from same user
  function groupMsgs(msgs) {
    var groups = [];
    msgs.forEach(function(m, i) {
      var prev = msgs[i-1];
      var sameUser = prev && prev.uid === m.uid && (m.ts - prev.ts) < 300000; // 5 min gap
      if (sameUser) {
        groups[groups.length-1].messages.push(m);
      } else {
        groups.push({uid: m.uid, name: m.name, messages: [m]});
      }
    });
    return groups;
  }

  var grouped = groupMsgs(msgs);
  var myId = user.id;

  return html`<div style=${{display:'flex',flexDirection:'column',height:'calc(100vh - 180px)',minHeight:300,maxHeight:600}}>
    <!-- Messages area -->
    <div style=${{flex:1,overflowY:'auto',padding:'4px 0',display:'flex',flexDirection:'column',gap:2}}>
      ${msgs.length === 0
        ? html`<div style=${{textAlign:'center',padding:'40px 20px'}}>
            <div style=${{fontSize:32,marginBottom:8}}>💬</div>
            <p style=${{color:'var(--mu)',fontSize:13}}>No messages yet — say hello!</p>
          </div>`
        : grouped.map(function(grp, gi) {
            var isMe = grp.uid === myId;
            return html`<div key=${gi} style=${{
              display:'flex', flexDirection:'column',
              alignItems: isMe ? 'flex-end' : 'flex-start',
              marginBottom:8, padding:'0 4px'
            }}>
              <!-- Sender name (not shown for own messages) -->
              ${!isMe && html`<div style=${{fontSize:11,color:'var(--mu)',marginBottom:2,paddingLeft:12,fontWeight:500}}>${grp.name}</div>`}

              ${grp.messages.map(function(m, mi) {
                var isLast = mi === grp.messages.length - 1;
                return html`<div key=${m.ts} style=${{
                  display:'flex', flexDirection: isMe?'row-reverse':'row',
                  alignItems:'flex-end', gap:6, marginBottom: isLast?0:2
                }}>
                  <!-- Avatar (only on last msg in group, for others) -->
                  ${!isMe && isLast
                    ? html`<div style=${{width:28,height:28,borderRadius:14,flexShrink:0,
                        background: teamBg(grp.name),
                        display:'flex',alignItems:'center',justifyContent:'center',
                        fontSize:11,fontWeight:700,color:'white',fontFamily:'Arial'}}>
                        ${grp.name[0].toUpperCase()}
                      </div>`
                    : html`<div style=${{width:28,flexShrink:0}}></div>`
                  }
                  <!-- Bubble -->
                  <div style=${{
                    maxWidth:'72%', padding:'8px 12px',
                    borderRadius: isMe ? '16px 16px 4px 16px' : '16px 16px 16px 4px',
                    background: isMe ? '#1a56db' : 'var(--bg2)',
                    border: isMe ? 'none' : '1px solid var(--bdr)',
                    color: isMe ? '#fff' : 'var(--tx)',
                    fontSize:13, lineHeight:1.4,
                    wordBreak:'break-word',
                    boxShadow: isMe ? 'none' : 'var(--shadow)'
                  }}>
                    ${m.text}
                  </div>
                </div>`;
              })}

              <!-- Timestamp on last message -->
              <div style=${{fontSize:10,color:'var(--dm)',marginTop:2,
                paddingLeft: isMe?0:40, paddingRight: isMe?4:0}}>
                ${fmtMsgTime(grp.messages[grp.messages.length-1].ts)}
              </div>
            </div>`;
          })
      }
      <!-- Scroll anchor -->
      <div ref=${function(el){endRef.current=el;}}></div>
    </div>

    <!-- Input bar -->
    <div style=${{borderTop:'1px solid var(--bdr)',padding:'10px 0 0',display:'flex',gap:8,alignItems:'flex-end'}}>
      <textarea
        value=${text}
        onChange=${function(e){ setText(e.target.value); }}
        onKeyDown=${handleKey}
        placeholder="Type a message… (Enter to send)"
        rows="1"
        style=${{
          flex:1, resize:'none', border:'1px solid var(--bdr)',
          borderRadius:'var(--rs)', padding:'9px 12px',
          background:'var(--bg3)', color:'var(--tx)',
          fontFamily:'DM Sans,sans-serif', fontSize:13,
          lineHeight:1.4, outline:'none', maxHeight:80,
          width:'100%'
        }}
      ></textarea>
      <button class="btn-p" style=${{padding:'9px 14px',flexShrink:0,opacity:sending||!text.trim()?0.5:1}}
        onClick=${send} disabled=${sending || !text.trim()}>
        ${sending ? '...' : '↑'}
      </button>
    </div>
  </div>`;
}


// ── Room Announcements ───────────────────────────────────────────────────
function AnnouncementsPanel(props) {

    var title = (a.title||'').toLowerCase();
    return !title.includes('hello guys');
  });
  // Auto-delete "Hello GUYS" AFTER render (useEffect prevents React update-during-render error)
  useEffect(function(){
    var bad = (props.announcements||[]).filter(function(a){return (a.title||'').toLowerCase().includes('hello guys');});
    if (bad.length && props.onDelete) {
      bad.forEach(function(a){ props.onDelete(a.id); });

  }, [(props.announcements||[]).length]);
  if (anns.length === 0 && !props.isAdmin) return null;

  return html`<div style=${{marginBottom:12}}>
    ${anns.length > 0 && html`<div style=${{display:'flex',flexDirection:'column',gap:6,marginBottom:props.isAdmin?8:0}}>
      ${anns.map(function(a, i) {
        return html`<div key=${a.id||i} style=${{
          background:'linear-gradient(135deg,rgba(26,86,219,.08) 0%,rgba(26,86,219,.03) 100%)',
          border:'1px solid rgba(26,86,219,.2)', borderLeft:'3px solid #1a56db',
          borderRadius:'var(--rs)', padding:'10px 14px', position:'relative'
        }}>
          ${a.imageUrl&&html`<img src=${a.imageUrl} alt="" style=${{width:'100%',maxHeight:180,objectFit:'cover',borderRadius:6,marginBottom:8,display:'block'}} onError=${function(e){e.target.style.display='none';}} />`}
          ${a.title&&html`<div style=${{fontWeight:600,fontSize:13,marginBottom:a.body?4:0}}>${a.title}</div>`}

}

// ── Head-to-Head Comparison Modal ─────────────────────────────────────────
function H2HModal(props) {
  var ua = props.userA, ub = props.userB;
  if (!ua || !ub) return null;
  var predsA = props.preds, predsB = props.preds;
  var results = props.results;
  var done = MS.filter(function(m){ return results[m.id]; });

  var aWins=0, bWins=0, draws=0;
  done.forEach(function(m){
    var pa=predsA[ua.id+'_'+m.id], pb=predsB[ub.id+'_'+m.id], r=results[m.id];
    var ptA=calcPts(pa,r)||0, ptB=calcPts(pb,r)||0;
    if(ptA>ptB) aWins++;
    else if(ptB>ptA) bWins++;
    else if(pa||pb) draws++;
  });

  return html`<div class="ov" onClick=${function(e){if(e.target===e.currentTarget)props.onClose();}}>
    <div class="modal" style=${{padding:0,overflow:'hidden',maxHeight:'85vh',display:'flex',flexDirection:'column'}}>

      <!-- Header -->
      <div style=${{background:'linear-gradient(135deg,#1a56db,#1e40af)',padding:'16px 20px',flexShrink:0}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <h2 style=${{margin:0,fontSize:16,color:'#fff'}}>⚔️ Head-to-Head</h2>
          <button class="btn" style=${{padding:'4px 10px',fontSize:12}} onClick=${props.onClose}>✕</button>
        </div>
        <div style=${{display:'grid',gridTemplateColumns:'1fr auto 1fr',alignItems:'center',gap:8}}>
          <div style=${{textAlign:'center'}}>
            ${ua.favT&&ua.favT[0]&&html`<${FlagImg} team=${ua.favT[0]} w=${28} />`}
            <div style=${{fontSize:14,fontWeight:700,color:'#fff',marginTop:4}}>${ua.name}</div>
            <div style=${{fontSize:22,fontWeight:900,color:'#4ade80',fontFamily:'Barlow Condensed'}}>${aWins}</div>
          </div>
          <div style=${{textAlign:'center',color:'rgba(255,255,255,.5)',fontSize:11}}>
            <div style=${{fontSize:18,fontWeight:700,color:'rgba(255,255,255,.6)'}}>${draws}</div>
            <div>draws</div>
          </div>
          <div style=${{textAlign:'center'}}>
            ${ub.favT&&ub.favT[0]&&html`<${FlagImg} team=${ub.favT[0]} w=${28} />`}
            <div style=${{fontSize:14,fontWeight:700,color:'#fff',marginTop:4}}>${ub.name}</div>
            <div style=${{fontSize:22,fontWeight:900,color:'#f87171',fontFamily:'Barlow Condensed'}}>${bWins}</div>
          </div>
        </div>
      </div>

      <!-- Match rows -->
      <div style=${{overflowY:'auto',flex:1,padding:'8px 0'}}>
        ${done.length===0&&html`<div style=${{textAlign:'center',padding:32,color:'var(--mu)',fontSize:13}}>No results yet — check back after matches are played!</div>`}
        ${done.map(function(m){
          var pa=predsA[ua.id+'_'+m.id], pb=predsB[ub.id+'_'+m.id], r=results[m.id];
          var ptA=calcPts(pa,r)||0, ptB=calcPts(pb,r)||0;
          var isExA=ptA===4;
          var isExB=ptB===4;
          var colA=ptA===0?'var(--dm)':isExA?'#22c55e':'#60a5fa';
          var colB=ptB===0?'var(--dm)':isExB?'#22c55e':'#60a5fa';
          return html`<div key=${m.id} style=${{
            display:'grid',gridTemplateColumns:'1fr auto 1fr',
            padding:'10px 16px',borderBottom:'1px solid var(--bdr)',
            alignItems:'center',gap:8
          }}>
            <!-- User A prediction -->
            <div style=${{textAlign:'center'}}>
              ${pa
                ? html`<div style=${{fontSize:15,fontWeight:700,color:colA,fontFamily:'Barlow Condensed'}}>${pa.h}–${pa.a}</div>
                    <div style=${{fontSize:10,color:colA}}>${isExA?'🎯 +'+ptA:ptA>0?'✓ +'+ptA:'✗'}</div>`
                : html`<div style=${{fontSize:11,color:'var(--dm)'}}>—</div>`}
            </div>
            <!-- Match info -->
            <div style=${{textAlign:'center',minWidth:80}}>
              <div style=${{fontSize:10,color:'var(--dm)',marginBottom:2}}>Group ${m.gr}</div>
              <div style=${{fontSize:11,color:'var(--mu)',whiteSpace:'nowrap'}}>${m.h.split(' ').pop()} vs ${m.a.split(' ').pop()}</div>
              <div style=${{fontSize:14,fontWeight:700,fontFamily:'Barlow Condensed',color:'var(--tx)',marginTop:2}}>${r.h}–${r.a}</div>
            </div>
            <!-- User B prediction -->
            <div style=${{textAlign:'center'}}>
              ${pb
                ? html`<div style=${{fontSize:15,fontWeight:700,color:colB,fontFamily:'Barlow Condensed'}}>${pb.h}–${pb.a}</div>
                    <div style=${{fontSize:10,color:colB}}>${isExB?'🎯 +'+ptB:ptB>0?'✓ +'+ptB:'✗'}</div>`
                : html`<div style=${{fontSize:11,color:'var(--dm)'}}>—</div>`}
            </div>
          </div>`;
        })}
      </div>

      <!-- Footer total -->
      ${done.length>0&&html`<div style=${{
        display:'grid',gridTemplateColumns:'1fr auto 1fr',padding:'12px 16px',
        borderTop:'1px solid var(--bdr)',background:'var(--bg3)',flexShrink:0
      }}>
        <div style=${{textAlign:'center',fontSize:16,fontWeight:800,fontFamily:'Barlow Condensed',color:'#4ade80'}}>${props.ptsA} pts</div>
        <div style=${{textAlign:'center',fontSize:11,color:'var(--dm)'}}>Total pts</div>
        <div style=${{textAlign:'center',fontSize:16,fontWeight:800,fontFamily:'Barlow Condensed',color:'#f87171'}}>${props.ptsB} pts</div>
      </div>`}
    </div>
  </div>`;
}



// ── User Predictions Modal ────────────────────────────────────────────────
function UserPredictionsModal(props) {
  var u = props.user;
  if (!u) return null;
  var predsMap   = props.preds    || {};
  var resultsMap = props.results  || {};
  var koResMap   = props.koResults || {};
  var gsMatches  = props.MS  || [];
  var koMatches  = props.KO_MS || [];
  var isMe = props.currentUser && props.currentUser.id === u.id;

  // Group stage predictions
  var gsPreds = gsMatches.filter(function(m){ return predsMap[u.id+'_'+m.id]; });
  // KO stage predictions
  var koPreds = koMatches.filter(function(m){ return predsMap[u.id+'_'+m.id]; });
  // All for stats
  var allPreds = gsPreds.concat(koPreds);
  var done = allPreds.filter(function(m){
    return resultsMap[m.id] || koResMap[m.id];
  }).length;
  var exactCount = allPreds.filter(function(m){
    var p=predsMap[u.id+'_'+m.id];
    var r=resultsMap[m.id]||koResMap[m.id];
    return r&&p&&Number(p.h)===Number(r.h)&&Number(p.a)===Number(r.a);
  }).length;
  var totalPts = allPreds.reduce(function(s,m){
    var p=predsMap[u.id+'_'+m.id];
    var r=resultsMap[m.id]||koResMap[m.id];
    return s+(calcPts(p,r)||0);
  },0);
  var isKing = exactCount >= 3;

  // Expand state for GS completed sections
  var exS = useState({}); var expanded=exS[0]; var setExpanded=exS[1];
  function toggleGrp(grp){ setExpanded(function(p){var n=Object.assign({},p);n[grp]=!n[grp];return n;}); }

  // Group GS matches by group letter, only show those with predictions
  var gsByGrp = {};
  gsPreds.forEach(function(m){
    if(!gsByGrp[m.gr]) gsByGrp[m.gr]=[];
    gsByGrp[m.gr].push(m);
  });

  function renderMatch(m, koResMap2) {
    var p = predsMap[u.id+'_'+m.id];
    if (!p) return null;
    var r = resultsMap[m.id] || (koResMap2&&koResMap2[m.id]);
    var pts = r?(calcPts(p,r)||0):null;
    var isExact  = pts===4;
    var isWinner = pts===2;
    var isWrong  = pts===0 && r;
    var pending  = !r;
    var teamH = m.h||m.h_slot||'TBD';
    var teamA = m.a||m.a_slot||'TBD';
    return html`<div key=${m.id} style=${{
      display:'flex',alignItems:'center',gap:8,padding:'8px 16px',
      borderBottom:'1px solid rgba(255,255,255,.06)',
      background:isExact?'rgba(251,191,36,.05)':'transparent'
    }}>
      <!-- Home -->
      <div style=${{flex:1,display:'flex',alignItems:'center',gap:5,minWidth:0,justifyContent:'flex-end'}}>
        <span style=${{fontSize:12,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'right'}}>${teamH}</span>
        <${FlagImg} team=${teamH} w=${18} />
      </div>
      <!-- Score -->
      <div style=${{textAlign:'center',minWidth:90,flexShrink:0}}>
        <div style=${{fontFamily:'Barlow Condensed',fontSize:19,fontWeight:800,
          color:isExact?'#fbbf24':isWinner?'#60a5fa':isWrong?'#f87171':'var(--tx)'}}>${p.h}–${p.a}</div>
        ${r?html`<div style=${{fontSize:10,color:'var(--dm)'}}>Result: <strong style=${{color:'var(--tx)'}}>${r.h}–${r.a}</strong></div>`:null}
        ${pending?html`<div style=${{fontSize:10,color:'var(--dm)'}}>Pending</div>`:null}
      </div>
      <!-- Away -->
      <div style=${{flex:1,display:'flex',alignItems:'center',gap:5,minWidth:0}}>
        <${FlagImg} team=${teamA} w=${18} />
        <span style=${{fontSize:12,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${teamA}</span>
      </div>
      <!-- Badge -->
      <div style=${{flexShrink:0,width:28,textAlign:'center'}}>
        ${isExact?'🎯':isWinner?html`<span style=${{fontSize:10,color:'#60a5fa',fontWeight:700}}>+2</span>`:isWrong?'✗':pending?'⏳':''}
      </div>
    </div>`;
  }

  return html`<div class="ov" onClick=${function(e){if(e.target===e.currentTarget)props.onClose();}}>
    <div class="modal" style=${{padding:0,overflow:'hidden',maxWidth:480,maxHeight:'85vh',display:'flex',flexDirection:'column'}}>
      <!-- Header -->
      <div style=${{background:'linear-gradient(135deg,#1e1b4b,#0f172a)',padding:'16px 16px 12px',flexShrink:0}}>
        <div style=${{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          <div style=${{width:36,height:36,borderRadius:18,background:'#1a56db',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:700,color:'#fff',flexShrink:0}}>
            ${(u.name||'?')[0].toUpperCase()}
          </div>
          <div style=${{flex:1,minWidth:0}}>
            <div style=${{fontSize:15,fontWeight:700,color:'#fff',display:'flex',alignItems:'center',gap:6}}>
              ${u.name} ${isKing?html`<span>👑</span>`:null} ${isMe?html`<span style=${{fontSize:10,background:'rgba(59,130,246,.3)',color:'#93c5fd',padding:'1px 7px',borderRadius:8}}>you</span>`:null}
            </div>
            <div style=${{fontSize:11,color:'rgba(255,255,255,.5)',marginTop:2}}>${u.favT&&u.favT[0]?u.favT[0]+' fan':''}${u.champTeam?' · 🏆 '+u.champTeam:''}</div>
          </div>
          <button class="btn" style=${{fontSize:11,padding:'3px 10px',color:'rgba(255,255,255,.5)',borderColor:'rgba(255,255,255,.2)'}} onClick=${props.onClose}>✕</button>
        </div>
        <!-- Stats -->
        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6}}>
          ${[[allPreds.length,'Predicted'],[done,'Resolved'],[exactCount,'🎯 Exact'],[totalPts+' pts','Score']].map(function(s,i){
            return html`<div key=${i} style=${{textAlign:'center',background:'rgba(255,255,255,.07)',borderRadius:8,padding:'6px 4px'}}>
              <div style=${{fontSize:17,fontWeight:800,color:i===2&&exactCount>0?'#fbbf24':'#fff',fontFamily:'Barlow Condensed'}}>${s[0]}</div>
              <div style=${{fontSize:9,color:'rgba(255,255,255,.5)',letterSpacing:.5,textTransform:'uppercase'}}>${s[1]}</div>
            </div>`;
          })}
        </div>
        ${isKing?html`<div style=${{marginTop:8,background:'rgba(251,191,36,.15)',border:'1px solid rgba(251,191,36,.35)',borderRadius:8,padding:'7px 12px',display:'flex',alignItems:'center',gap:8}}>
          <span style=${{fontSize:18}}>👑</span>
          <div><div style=${{fontSize:12,fontWeight:700,color:'#fbbf24'}}>King of Prediction!</div>
          <div style=${{fontSize:11,color:'rgba(255,255,255,.6)'}}>${exactCount} exact scores — incredible accuracy!</div></div>
        </div>`:null}
      </div>

      <!-- Scrollable body -->
      <div style=${{overflowY:'auto',flex:1}}>

        <!-- ── KO Stage Predictions ────────────────────────────────── -->
        ${koPreds.length>0?html`<div>
          <div style=${{padding:'8px 16px',background:'rgba(240,180,41,.06)',borderBottom:'1px solid rgba(240,180,41,.15)',fontSize:11,fontWeight:700,color:'var(--gold)',letterSpacing:.5}}>
            🏆 KNOCKOUT STAGES (${koPreds.length} predictions)
          </div>
          ${koPreds.map(function(m){ return renderMatch(m, koResMap); })}
        </div>`:null}

        <!-- ── Group Stage — grouped & collapsible ────────────────── -->
        ${Object.keys(gsByGrp).sort().map(function(grp){
          var matches = gsByGrp[grp];
          var grpDone = matches.filter(function(m){return resultsMap[m.id];}).length;
          var grpPts  = matches.reduce(function(s,m){return s+(calcPts(predsMap[u.id+'_'+m.id],resultsMap[m.id])||0);},0);
          var allDone = grpDone === matches.length;
          var isOpen  = expanded[grp] !== false && !allDone || expanded[grp] === true;
          return html`<div key=${grp}>
            <div style=${{display:'flex',alignItems:'center',padding:'7px 16px',background:'var(--bg3)',borderBottom:'1px solid var(--bdr)',cursor:allDone?'pointer':'default'}}
              onClick=${allDone?function(){toggleGrp(grp);}:undefined}>
              <span style=${{fontSize:11,fontWeight:700,color:'var(--gold)',letterSpacing:.5,flex:1}}>GROUP ${grp}</span>
              <span style=${{fontSize:11,color:'var(--dm)',marginRight:8}}>${grpDone}/${matches.length} done · <strong style=${{color:grpPts>0?'#4ade80':'var(--dm)'}}>${grpPts>0?'+'+grpPts+'pts':''}</strong></span>
              ${allDone?html`<span style=${{fontSize:11,color:'var(--dm)'}}>${isOpen?'▲':'▼ expand'}</span>`:null}
            </div>
            ${(!allDone||isOpen)?matches.map(function(m){ return renderMatch(m, null); }):null}
          </div>`;
        })}

        ${allPreds.length===0?html`<div style=${{textAlign:'center',padding:'40px 20px',color:'var(--dm)'}}>
          <div style=${{fontSize:28,marginBottom:6}}>📋</div>
          <div>No predictions made yet</div>
        </div>`:null}
      </div>
    </div>
  </div>`;
}

function PenaltyGame(props) {
  var DIRS = ['left','center','right'];
  var gs = useState({phase:'idle',score:[0,0],round:1,maxRounds:5,playerTurn:true,
                     shotDir:null,keeperDir:null,result:null,history:[],msg:''});
  var g=gs[0]; var setG=gs[1];

  function shoot(dir) {
    if (!g.playerTurn || g.phase!=='shoot') return;
    var kDir = DIRS[Math.floor(Math.random()*3)];
    var scored = dir !== kDir;
    var msg = scored ? '⚽ GOAL!' : (kDir===dir?'🧤 Saved!':'🧤 Keeper guessed right!');
    var newScore = scored ? [g.score[0]+1, g.score[1]] : [g.score[0], g.score[1]];
    var newHistory = g.history.concat([{type:'player',dir:dir,keeperDir:kDir,scored:scored}]);
    var nextRound = g.round;
    
    // Keeper shot (AI)
    setTimeout(function(){
      var pDir = DIRS[Math.floor(Math.random()*3)];
      var kShootDir = DIRS[Math.floor(Math.random()*3)];
      var kScored = pDir !== kShootDir;
      var kMsg = kScored ? '🤖 CPU scores!' : '🙌 You saved it!';
      var finalScore = kScored ? [newScore[0], newScore[1]+1] : newScore;
      var finalHistory = newHistory.concat([{type:'keeper',dir:kShootDir,playerDir:pDir,scored:kScored}]);
      var isLast = nextRound >= g.maxRounds;
      setG(function(prev){return Object.assign({},prev,{
        phase: isLast ? 'done' : 'shoot',
        score: finalScore,
        round: isLast ? nextRound : nextRound+1,
        history: finalHistory,
        msg: isLast ? (finalScore[0]>finalScore[1]?'🏆 You Win! '+finalScore[0]+'-'+finalScore[1]
                       :finalScore[0]<finalScore[1]?'😢 CPU Wins! '+finalScore[0]+'-'+finalScore[1]
                       :'🤝 Draw! '+finalScore[0]+'-'+finalScore[1]) : kMsg
      });});
    }, 800);
    
    setG(function(prev){return Object.assign({},prev,{phase:'animating',shotDir:dir,keeperDir:kDir,
      score:newScore,history:newHistory,msg:msg});});
  }

  function chooseDir(dir) {
    if (g.playerTurn || g.phase!=='choose') return;
    var kShootDir = DIRS[Math.floor(Math.random()*3)];
    var saved = dir === kShootDir;
    var kScored = !saved;
    var finalScore = kScored ? [g.score[0], g.score[1]+1] : [g.score[0], g.score[1]];
    setG(function(prev){return Object.assign({},prev,{
      phase:'shoot', playerTurn:true, round:prev.round+1 <= prev.maxRounds ? prev.round : prev.maxRounds,
      score:finalScore, msg: saved ? '🙌 Great save!' : '🤖 CPU scores!'
    });});
  }

  function startGame() {
    setG({phase:'shoot',score:[0,0],round:1,maxRounds:5,playerTurn:true,

  var GOAL_W = 240; var GOAL_H = 120;

    <div style=${{textAlign:'center',marginBottom:16}}>

      <p style=${{fontSize:12,color:'var(--dm)',margin:0}}>Best of ${g.maxRounds} — You vs CPU Keeper</p>
    </div>

    <!-- Scoreboard -->
    <div style=${{display:'flex',justifyContent:'center',gap:20,marginBottom:14,alignItems:'center'}}>
      <div style=${{textAlign:'center'}}>
        <div style=${{fontSize:12,color:'var(--dm)'}}>You</div>
        <div style=${{fontFamily:'Barlow Condensed,sans-serif',fontSize:36,fontWeight:900,color:'#4ade80'}}>${g.score[0]}</div>
      </div>
      <div style=${{fontSize:20,color:'var(--dm)'}}>–</div>
      <div style=${{textAlign:'center'}}>
        <div style=${{fontSize:12,color:'var(--dm)'}}>CPU</div>
        <div style=${{fontFamily:'Barlow Condensed,sans-serif',fontSize:36,fontWeight:900,color:'#f87171'}}>${g.score[1]}</div>
      </div>
    </div>

    ${g.phase!=='idle'&&html`<div style=${{fontSize:12,color:'var(--dm)',textAlign:'center',marginBottom:8}}>Round ${Math.min(g.round,g.maxRounds)} / ${g.maxRounds}</div>`}

    <!-- Goal visualization -->
    <div style=${{position:'relative',width:GOAL_W+'px',height:GOAL_H+'px',margin:'0 auto 14px',
      background:'linear-gradient(180deg,#1a7a3c 0%,#155f30 100%)',
      border:'3px solid rgba(255,255,255,.4)',borderRadius:4}}>
      <!-- Crossbar -->
      <div style=${{position:'absolute',top:0,left:0,right:0,height:3,background:'white',opacity:.6}}></div>

      <div style=${{position:'absolute',top:0,bottom:0,right:0,width:3,background:'white',opacity:.6}}></div>
      <!-- Net lines -->

  // Save to localStorage helper
  function save(arr){
    try{ _ls.set('wc26_chat_'+_rid, JSON.stringify(arr.slice(-150))); }catch(e){}
    setMsgs(arr.slice(-150));
  }

  // Poll GAS – only if not recently sent
  function pollGAS(){
    if(Date.now()-_lastSent.current < 12000) return;
    fetch(GS_URL+'?action=get&key=wc26_chat_'+encodeURIComponent(_rid)+'&_='+Date.now(),{redirect:'follow'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.ok||!Array.isArray(d.value)) return;

      msgs.forEach(function(m){if(m&&m.ts&&m.uid)localKeys[m.uid+'|'+m.ts]=1;});
      var hasNew = remote.some(function(m){return m&&m.ts&&m.uid&&!localKeys[m.uid+'|'+m.ts];});
      if(hasNew){ save(remote); }
    })
    .catch(function(){});

  // Set up poll interval + initial GAS fetch after 3s
  useEffect(function(){
    var init = setTimeout(pollGAS, 3000);
    _pollTimer.current = setInterval(pollGAS, 10000);

      clearTimeout(init);
      clearInterval(_pollTimer.current);

    setInput('');
    _lastSent.current = Date.now();
    // Save to GAS

  return html`<div style=${{display:'flex',flexDirection:'column',height:'calc(100vh - 260px)',minHeight:360}}>

      ${msgs.length===0&&html`<div style=${{textAlign:'center',padding:'40px 20px',color:'var(--dm)'}}>
        <div style=${{fontSize:28,marginBottom:6}}>💬</div>
        <div style=${{fontSize:13,fontWeight:600}}>No messages yet</div>
        <div style=${{fontSize:12,marginTop:3}}>Say something!</div>
      </div>`}
      ${msgs.map(function(m,i){
        var isMe = props.user&&m.uid===props.user.id;

        var showName = !prev||prev.uid!==m.uid;
        var ts = m.ts?new Date(m.ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Indian/Maldives'}):'';
        return html`<div key=${i} style=${{display:'flex',flexDirection:isMe?'row-reverse':'row',alignItems:'flex-end',gap:6,padding:'0 4px'}}>
          ${!isMe&&showName&&html`<div style=${{width:26,height:26,borderRadius:13,flexShrink:0,background:'#1a56db',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff'}}>${(m.name||'?')[0].toUpperCase()}</div>`}
          ${!isMe&&!showName&&html`<div style=${{width:26,flexShrink:0}}></div>`}
          <div style=${{maxWidth:'72%',background:isMe?'#1a56db':'var(--bg3)',color:isMe?'#fff':'var(--tx)',borderRadius:isMe?'16px 16px 4px 16px':'16px 16px 16px 4px',padding:'7px 11px',boxShadow:'0 1px 2px rgba(0,0,0,.2)'}}>

            <div style=${{fontSize:13,lineHeight:1.4,wordBreak:'break-word'}}>${m.text}</div>

// ── Top-level boundary: catches ANY crash anywhere in the app (not just
// inside a room) so the page never silently goes blank. Without this,
// a throw inside any useEffect/render (e.g. malformed data coming back
// from the GAS polling a few seconds after mount) unmounts the whole
// React tree and leaves #root empty with no visible explanation. ─────────
class AppErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = {hasError: false, err: null};
  }
  static getDerivedStateFromError(e) { return {hasError: true, err: e}; }
  componentDidCatch(error, info) {
    // Log as much as possible so it's recoverable from devtools even if
    // the on-screen message ends up generic.
    try {
      console.error('App crashed. Raw value:', error);
      console.error('Type:', typeof error, 'Constructor:', error && error.constructor && error.constructor.name);
      console.error('Component stack:', info && info.componentStack);
    } catch(e) {}
  }
  render() {
    if (this.state.hasError) {
      var raw = this.state.err;
      var msg = 'Unknown error';
      var detail = '';
      try {
        if (raw == null) {
          msg = '(threw a null/undefined value — no message available)';
        } else if (raw instanceof Error) {
          msg = raw.message || raw.name || 'Error (no message)';
          detail = raw.stack || '';
        } else if (typeof raw === 'string') {
          msg = raw;
        } else {
          // Some thrown value that isn't a string or Error (object, event, response, etc.)
          msg = 'Threw a non-Error value of type "' + typeof raw + '"';
          try { detail = JSON.stringify(raw, Object.getOwnPropertyNames(raw), 2); }
          catch(e) { try { detail = String(raw); } catch(e2) { detail = '(could not stringify)'; } }
        }
      } catch(e) {
        msg = 'Error boundary itself failed while reading the error.';
      }
      return React.createElement('div', {
        style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
          minHeight:'100vh',gap:14,background:'#0a1628',color:'#fff',fontFamily:'sans-serif',
          padding:'24px',textAlign:'center'}
      },
        React.createElement('div', {style:{fontSize:48}}, '⚠️'),
        React.createElement('h2', {style:{margin:0,color:'#f0b429'}}, 'App crashed after loading'),
        React.createElement('p', {style:{color:'#dce8f5',margin:0,fontSize:14,maxWidth:480,wordBreak:'break-word'}}, msg),
        React.createElement('p', {style:{color:'#5b8bb8',margin:0,fontSize:12}}, 'Open DevTools (F12) → Console tab for full details.'),
        React.createElement('button', {
          onClick:function(){window.location.reload();},
          style:{padding:'10px 24px',background:'#f0b429',color:'#0a1628',border:'none',
            borderRadius:8,fontSize:14,fontWeight:700,cursor:'pointer',marginTop:8}
        }, '↻ Reload'),
        detail && React.createElement('pre', {
          style:{color:'#5b8bb8',fontSize:10,maxWidth:560,overflow:'auto',textAlign:'left',
            marginTop:12,whiteSpace:'pre-wrap'}
        }, detail)
      );
    }
    return this.props.children;
  }
}

// Load each room member's predictions from their per-user key
function loadMemberPreds(memberIds, setPredsCallback) {
  if (!memberIds || !memberIds.length) return;
  memberIds.forEach(function(uid) {
    var userKey = 'wc26_preds_' + uid;
    if (_cache[userKey]) {
      // Already cached — merge into global preds
      var cached = _cache[userKey];
      setPredsCallback(function(prev) {
        var upd = Object.assign({}, prev);
        Object.keys(cached).forEach(function(mId){ upd[uid+'_'+mId] = cached[mId]; });
        return upd;
      });
    }
    // Fetch from GAS
    fetch(GS_URL+'?action=get&key='+encodeURIComponent(userKey)+'&_='+Date.now(),{redirect:'follow'})
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.ok && d.value && typeof d.value === 'object') {
        _cache[userKey] = d.value;
        setPredsCallback(function(prev) {
          var upd = Object.assign({}, prev);
          Object.keys(d.value).forEach(function(mId){ upd[uid+'_'+mId] = d.value[mId]; });
          return upd;
        });
      }
    })
    .catch(function(){});
  });
}

  function doPredict(mId, h, a, winner) {
    var m = MS.find(function(x){return x.id===mId;}) || KO_MS.find(function(x){return x.id===mId;});
    if (!canStillPredict(m, predCutoffMin)) {
      notify('Predictions for this match are locked ⏱️', 'err');
      setModal(null);
      return;
    }
    var key      = user.id + '_' + mId;
    var userKey  = 'wc26_preds_' + user.id;
    var newPred  = {h: Number(h), a: Number(a), ts: new Date().toISOString()}; if(winner) newPred.winner=winner;

    // Build this user's prediction set
    var myPreds = Object.assign({}, _cache[userKey] || {});
    if (!Object.keys(myPreds).length) {
      Object.keys(preds).forEach(function(k) {
        if (k.indexOf(user.id+'_') === 0)
          myPreds[k.slice(user.id.length+1)] = preds[k];
      });
    }
    myPreds[mId] = newPred;

    // Update global preds state immediately
    var upd = Object.assign({}, preds);
    upd[key] = newPred;
    setPreds(upd);

    // Update caches so the merge listener keeps the new prediction
    _cache[userKey]       = myPreds;
    _cache['wc26_preds']  = upd;           // global cache holds merged state
    _lastWrite['wc26_preds'] = Date.now() + 300000; // 5-min guard on global poll

    // Write ONLY this user's preds — max ~6KB, never hits 50K limit
    fetch(GS_URL, {method:'POST', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({action:'set', key:userKey, value:myPreds})
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d && d.ok) {
        _lastWrite[userKey] = Date.now();
        console.log('[Pred] Saved ✓', mId, Number(h)+'-'+Number(a));
      } else {
        console.error('[Pred] GAS error:', JSON.stringify(d));
      }
    })
    .catch(function(e){ console.error('[Pred] Network error:', e.message); });

    setModal(null);
    notify('Prediction saved! ⚽');
  }

  // Merge hardcoded KO_MS with any GAS schedule overrides
  function getEffKO() {
    if (!koSchedule || koSchedule.length === 0) return KO_MS;
    var overrides = {};
    koSchedule.forEach(function(m){ if(m.id) overrides[m.id] = m; });
    return KO_MS.map(function(m){ return overrides[m.id] ? Object.assign({},m,overrides[m.id]) : m; })

  function uPts(uid) {
    var grpPts = MS.reduce(function(total,m){

    var koPts = getEffKO().reduce(function(total,m){
      return total + (calcPts(preds[uid+'_'+m.id], koResults[m.id])||0);
    }, 0);
    return grpPts + koPts;
  }

// ── Achievement Badges ────────────────────────────────────────────────────
var BADGES = [
  {id:'first',   icon:'⚽', col:'#60a5fa', label:'First Kick',   desc:'Made your first prediction!'},
  {id:'sniper',  icon:'🎯', col:'#22c55e', label:'Sniper',       desc:'Scored an exact result!'},
  {id:'marksman',icon:'🏹', col:'#f59e0b', label:'Marksman',     desc:'3+ exact scores!'},
  {id:'fire',    icon:'🔥', col:'#ef4444', label:'On Fire',      desc:'3+ correct in a row!'},
  {id:'early',   icon:'⚡', col:'#a78bfa', label:'Early Bird',   desc:'Predicted 12h+ before kick-off!'},
  {id:'allin',   icon:'💯', col:'#f0b429', label:'All In',       desc:'Predicted every group match!'},
  {id:'perfect', icon:'⭐', col:'#fbbf24', label:'Perfect!',     desc:'100% accuracy on 5+ predictions!'}
];

function getAchievements(uid, predsMap, resultsMap) {
  var b = [];
  var myPreds = MS.filter(function(m){ return predsMap[uid+'_'+m.id]; });
  var donePreds = myPreds.filter(function(m){ return resultsMap[m.id]; });
  var exactPreds = donePreds.filter(function(m){
    var p=predsMap[uid+'_'+m.id], r=resultsMap[m.id];
    return p&&r&&Number(p.h)===Number(r.h)&&Number(p.a)===Number(r.a);
  });
  var correctPreds = donePreds.filter(function(m){
    return calcPts(predsMap[uid+'_'+m.id], resultsMap[m.id]) > 0;
  });

  if (myPreds.length >= 1)    b.push('first');
  if (exactPreds.length >= 1) b.push('sniper');
  if (exactPreds.length >= 3) b.push('marksman');
  if (myPreds.length === MS.length && MS.length > 0) b.push('allin');
  if (donePreds.length >= 5 && correctPreds.length === donePreds.length) b.push('perfect');

  // Early bird: predicted a match 12+ hours before kick-off
  var hasEarly = myPreds.some(function(m){
    var p=predsMap[uid+'_'+m.id];
    return p&&p.ts&&(new Date(m.utc)-new Date(p.ts))>=43200000;
  });
  if (hasEarly) b.push('early');

  // On fire: 3+ correct in a row
  var streak=0, best=0;
  donePreds.forEach(function(m){
    if(calcPts(predsMap[uid+'_'+m.id],resultsMap[m.id])>0){streak++;best=Math.max(best,streak);}
    else streak=0;
  });
  if (best>=3) b.push('fire');

  return b.map(function(id){ return BADGES.find(function(b){return b.id===id;}); }).filter(Boolean);
}

  function uAcc(uid) {
    var done = MS.filter(function(m){ return results[m.id]; });
    if (!done.length) return null;
    var tot  = done.filter(function(m){ return preds[uid+'_'+m.id]; }).length;
    if (!tot) return null;
    var hits = done.filter(function(m){ return calcPts(preds[uid+'_'+m.id], results[m.id]) > 0; }).length;
    return Math.round(hits / tot * 100);
  }

  function getLb() {
    if (!room) return [];

      .map(function(uid){
        var u = users[uid] || {name:'Member #'+(room.members.indexOf(uid)+1), id:uid, _loading:!Object.keys(users).length};
        var basePts = uPts(uid);
        // Add live projected pts (not final — shown as bonus indicator)
        var livePts = 0;
        Object.keys(liveScores||{}).forEach(function(mid){
          if (results[mid]) return; // already have final result
          var lv = liveScores[mid];
          var lp = calcPts(preds[uid+'_'+mid], lv);
          if (lp > 0) livePts += lp;
        });
        var bonus = (bonusPts[room.id]||{})[uid] || 0;
        return {user:u, pts:basePts + bonus, basePts:basePts, bonusPts:bonus, livePts:livePts,
          np:MS.filter(function(m){return preds[uid+'_'+m.id];}).length,
          acc:uAcc(uid), pick:(users[uid]||{}).champTeam||null,
          badges:getAchievements(uid, preds, results)};
      }).sort(function(a,b){
      var aTotal=(a.pts||0)+(a.livePts||0)*0.1; // live pts break ties
      var bTotal=(b.pts||0)+(b.livePts||0)*0.1;
      return bTotal-aTotal||(b.np||0)-(a.np||0);
    });
