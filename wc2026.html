  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    /* ── LIGHT theme (default) ─────────────────────────────────── */
    :root {
      --bg:      #f4f7fc;
      --bg2:     #ffffff;
      --bg3:     #eaf0f9;
      --bdr:     rgba(59,88,160,.13);
      --gold:    #c8850c;
      --gdim:    rgba(200,133,12,.1);
      --tx:      #0d1b30;
      --mu:      #4e6a8a;
      --dm:      #9ab0c8;
      --gn:      #16a34a;
      --rd:      #dc2626;
      --bl:      #1d4ed8;
      --r:       12px;
      --rs:      8px;
      --topbar:  rgba(255,255,255,.96);
      --topbar-b:rgba(59,88,160,.1);
      --shadow:  0 1px 4px rgba(13,27,48,.08),0 4px 16px rgba(13,27,48,.04);
      --ov:      rgba(13,27,48,.55);
      --hero:    linear-gradient(160deg,#e8f0fb 0%,#dce8f7 100%);
    }

    /* ── DARK theme ─────────────────────────────────────────────── */
    html.dark {
      --bg:      #080f1e;
      --bg2:     #0d1a2e;
      --bg3:     #0f2140;
      --bdr:     rgba(28,55,100,.7);
      --gold:    #f0b429;
      --gdim:    rgba(240,180,41,.12);
      --tx:      #dce8f5;
      --mu:      #5b8bb8;
      --dm:      #2a4d6e;
      --gn:      #22c55e;
      --rd:      #ef4444;
      --bl:      #3b82f6;
      --topbar:  rgba(8,15,30,.97);
      --topbar-b:rgba(28,55,100,.7);
      --shadow:  none;
      --ov:      rgba(0,0,0,.75);
      --hero:    linear-gradient(160deg,#0e1520 0%,#111827 100%);
    }

    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh;transition:background .25s,color .25s}
    #root{min-height:100vh}

    .topbar{background:var(--topbar);border-bottom:1px solid var(--topbar-b);padding:11px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;backdrop-filter:blur(10px)}
    .logo{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--gold);letter-spacing:1.5px}
    .back-a{font-size:13px;color:var(--mu);text-decoration:none;display:flex;align-items:center;gap:4px}
    .back-a:hover{color:var(--tx)}
    .page{max-width:680px;margin:0 auto;padding:20px 16px 80px}

    .card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem;box-shadow:var(--shadow)}
    .card-dark{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem}
    .card-sm{padding:.75rem 1rem}
    h1,h2,h3{font-family:'Barlow Condensed',sans-serif;font-weight:600;color:var(--tx);letter-spacing:.5px}
    h1{font-size:26px}h2{font-size:21px;margin-bottom:14px}h3{font-size:17px;margin-bottom:10px}
    button{font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
    .btn{padding:9px 16px;border-radius:var(--rs);border:1px solid var(--bdr);background:var(--bg2);color:var(--tx);font-size:13px;display:inline-flex;align-items:center;gap:6px;box-shadow:var(--shadow)}
    .btn:hover:not(:disabled){border-color:var(--mu);background:var(--bg3)}
    .btn-p{padding:10px 20px;border-radius:var(--rs);border:none;background:#1a56db;color:#fff;font-size:14px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
    .btn-p:hover:not(:disabled){background:#1648bf}
    .btn-g{padding:10px 24px;border-radius:var(--rs);border:none;background:var(--gold);color:#fff;font-size:14px;font-weight:600}
    html:not(.dark) .btn-g{color:#3d2200}
    .btn-g:hover{filter:brightness(.92)}
    .theme-btn{padding:7px 11px;border-radius:var(--rs);border:1px solid var(--bdr);background:var(--bg3);color:var(--tx);font-size:16px;line-height:1;cursor:pointer;transition:all .15s}
    .theme-btn:hover{background:var(--bg2);border-color:var(--mu)}
    button:disabled{opacity:.4;cursor:not-allowed}
    input{width:100%;padding:10px 14px;border:1px solid var(--bdr);border-radius:var(--rs);background:var(--bg3);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s,background .2s}
    input:focus{border-color:#1a56db;background:var(--bg2)}
    input::placeholder{color:var(--dm)}
    label{display:block;font-size:13px;color:var(--mu);margin-bottom:5px}
    .tabs{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:20px;overflow-x:auto}
    .tab{padding:10px 16px;border:none;border-bottom:2px solid transparent;background:transparent;font-size:13px;color:var(--mu);white-space:nowrap;transition:all .15s}
    .tab.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:500}
    .tab:hover:not(.on){color:var(--tx)}
    .bdg{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
    .blv{background:rgba(220,38,38,.1);color:var(--rd)}
    .bdn{background:rgba(22,163,74,.1);color:var(--gn)}
    .bup{background:rgba(78,106,138,.1);color:var(--mu)}
    .bpa{background:rgba(180,110,10,.1);color:var(--gold)}
    .toast{position:fixed;top:64px;right:16px;z-index:999;padding:10px 16px;border-radius:var(--rs);font-size:13px;max-width:260px;animation:sli .2s ease;box-shadow:0 4px 16px rgba(0,0,0,.12)}
    .tok{background:var(--bg2);border:1px solid var(--gn);color:var(--gn)}
    .ter{background:var(--bg2);border:1px solid var(--rd);color:var(--rd)}
    @keyframes sli{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
    .ov{position:fixed;inset:0;background:var(--ov);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px 80px;overflow-y:auto}
    .modal{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:1.5rem;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
    .pill{padding:4px 12px;border-radius:20px;border:1px solid;cursor:pointer;font-size:12px;transition:all .15s}
    .pill.on{background:#1a56db;color:#fff;border-color:#1a56db}
    .pill:not(.on){background:transparent;color:var(--mu);border-color:var(--bdr)}
    .pill:not(.on):hover{border-color:var(--mu);color:var(--tx)}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .mc{background:var(--bg2);border:1px solid var(--bdr);border-left:3px solid;border-radius:0 var(--r) var(--r) 0;padding:12px 14px}
    .sn{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:700;min-width:36px;text-align:center;color:var(--tx)}
    .lbr{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
    ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
    @media(max-width:480px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>

// ── KO qualifier calculation ─────────────────────────────────────────────
function getKOQualifiers(results) {
  var w={}, r={}, third=[], groupDone={};
  Object.keys(GRP).forEach(function(g){
    var rows = computeGroupStandings(g, results);
    var gMs  = MS.filter(function(m){return m.gr===g;});
    groupDone[g] = gMs.length>0 && gMs.every(function(m){return !!results[m.id];});
    if(rows[0]) w[g]={team:rows[0].team,confirmed:groupDone[g]};
    if(rows[1]) r[g]={team:rows[1].team,confirmed:groupDone[g]};
    if(rows[2]) third.push(Object.assign({},rows[2],{group:g,confirmed:groupDone[g]}));
  });
  third.sort(function(a,b){return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf;});
  return {winners:w, runners:r, best3rd:third.slice(0,8),
          allGroupsDone: Object.values(groupDone).every(Boolean)};
}

// Resolve a slot label → team name (recursive for KO rounds)
function resolveSlot(slot, q, koRes) {
  if (!slot||!q) return null;
  // Group winner: 'W-A'
  if (/^W-[A-L]$/.test(slot)) { var o=q.winners[slot[2]]; return o?o.team:null; }
  // Group runner-up: 'R-A'
  if (/^R-[A-L]$/.test(slot)) { var o=q.runners[slot[2]]; return o?o.team:null; }
  // Best 3rd: '3rd-1' … '3rd-8'
  if (/^3rd-\d$/.test(slot)) { var o=q.best3rd[+slot[4]-1]; return o?o.team:null; }
  // Winner of prior KO match: 'W-r32_01' or bare 'r32_01' (h_from/a_from use bare IDs)
  var isLoser  = slot.startsWith('L-');
  var matchId  = isLoser ? slot.slice(2) : (slot.startsWith('W-') ? slot.slice(2) : slot);
  var km = KO_MS.find(function(m){return m.id===matchId;});
  if (!km) return null;
  var res = koRes && koRes[matchId];
  if (!res) return null;
  var homeTeam = resolveSlot(km.h_slot||km.h_from, q, koRes);
  var awayTeam = resolveSlot(km.a_slot||km.a_from, q, koRes);
  var hWon = res.h > res.a, aWon = res.a > res.h;
  if (!hWon && !aWon) return null; // draw (AET/pens — treat as winner = home for now)
  return isLoser ? (hWon?awayTeam:homeTeam) : (hWon?homeTeam:awayTeam);
}

function koMatchTeams(km, q, koRes) {
  return {
    h: resolveSlot(km.h_slot||km.h_from, q, koRes),
    a: resolveSlot(km.a_slot||km.a_from, q, koRes),
  };
}

// ── Live score API (football-data.org) ──────────────────────────────────
// Process raw API matches array → call onUpdate with result map
function _applyMatches(matches, onUpdate, onLive) {
  var ALL = MS.concat(KO_MS);
  var upd = {}, live = {};
  (matches||[]).forEach(function(am){
    var sc=am.score&&am.score.fullTime;
    if (!sc||sc.home===null||sc.away===null) return;
    var hn=fdTeam(am.homeTeam&&am.homeTeam.name||'');
    var an=fdTeam(am.awayTeam&&am.awayTeam.name||'');
    var found=ALL.find(function(m){
      return (m.h===hn&&m.a===an)||(m.h===an&&m.a===hn);
    });
    if (!found) return;
    var sw=(found.h===an);
    var h=sw?sc.away:sc.home, a=sw?sc.home:sc.away;
    var st=am.status||'';
    if (st==='FINISHED') {
      upd[found.id]={h:h, a:a, auto:true};
    } else if (st==='IN_PLAY'||st==='PAUSED'||st==='HALFTIME'||st==='LIVE') {
      var ht=am.score.halfTime||{}; var period=st;
      var minRaw=am.minute||am.minutesElapsed||null;
      var minStr=minRaw?minRaw+"'":st==='PAUSED'?'HT':(st==='HALFTIME'?'HT':'LIVE');
      live[found.id]={h:h, a:a, status:st, min:minStr, htH:sw?ht.away:ht.home, htA:sw?ht.home:ht.away};
    }
  });
  if (Object.keys(upd).length) onUpdate(upd);
  if (onLive) onLive(live);
}

function fetchLiveScores(apiKey, onUpdate, onLive) {
  if (!apiKey) return;

}

function computeGroupStandings(grpKey, results) {
  var teams = GRP[grpKey] || [];
  var s = {};
  teams.forEach(function(t){ s[t]={mp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}; });
  MS.filter(function(m){ return m.gr===grpKey && results && results[m.id]; }).forEach(function(m){
    var r=results[m.id], h=m.h, a=m.a;
    s[h].mp++; s[a].mp++;
    s[h].gf+=r.h; s[h].ga+=r.a; s[a].gf+=r.a; s[a].ga+=r.h;
    s[h].gd=s[h].gf-s[h].ga; s[a].gd=s[a].gf-s[a].ga;
    if(r.h>r.a){s[h].w++;s[h].pts+=3;s[a].l++;}
    else if(r.h<r.a){s[a].w++;s[a].pts+=3;s[h].l++;}
    else{s[h].d++;s[h].pts++;s[a].d++;s[a].pts++;}
  });
  return teams.map(function(t){ return Object.assign({team:t},s[t]); })
    .sort(function(a,b){ return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||b.w-a.w; });
}

}

var Store = {
  _ready: function() {
    return typeof GS_URL === 'string' && GS_URL.indexOf('script.google.com') !== -1;
  },

  // Read one key from the Sheet
  _read: function(key) {
    return fetch(GS_URL + '?action=get&key=' + encodeURIComponent(key) + '&_=' + Date.now(), {
      redirect: 'follow'
    })
    .then(function(r) { return r.json(); })
    .then(function(d) { return d.ok ? d.value : null; })
    .catch(function() { return null; });
  },

  // Write one key to the Sheet (POST with text/plain avoids CORS preflight)
  _write: function(key, val) {
    return fetch(GS_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'set', key: key, value: val })
    })
    .then(function(r) { return r.json(); })
    .catch(function(e) { console.warn('Sheet write error:', e); });
  },

  // Public: get a value
  get: function(path) {
    if (!this._ready()) return Promise.resolve(null);
    var key = 'wc26_' + path.replace(/\//g,'_');
    return this._read(key).then(function(v) {
      if (v !== null) _cache[key] = v;
      return _cache[key] !== undefined ? _cache[key] : null;
    });
  },

  // Public: set a value (supports sub-paths like 'preds/userId_matchId')
  set: function(path, val) {
    if (!this._ready()) return Promise.resolve();
    var self = this;
    var parts  = path.split('/');
    var rootKey = 'wc26_' + parts[0];

    if (parts.length === 1) {
      // Simple set
      _cache[rootKey] = val;
      (_listeners[rootKey] || []).forEach(function(cb) { cb(val || {}); });
      return self._write(rootKey, val);
    } else {
      // Sub-path merge: read → patch → write
      var childKey = parts.slice(1).join('_');
      var parent = _cache[rootKey] || {};
      if (!_cache[rootKey]) {
        return self._read(rootKey).then(function(existing) {
          var obj = existing || {};
          obj[childKey] = val;
          _cache[rootKey] = obj;
          (_listeners[rootKey] || []).forEach(function(cb) { cb(obj); });
          return self._write(rootKey, obj);
        });
      } else {
        parent[childKey] = val;
        _cache[rootKey] = parent;
        (_listeners[rootKey] || []).forEach(function(cb) { cb(parent); });
        return self._write(rootKey, parent);
      }
    }
  },

  // Public: subscribe to a key with polling (fires immediately + every 8s)
  listen: function(path, cb) {
    if (!this._ready()) { setTimeout(function() { cb({}); }, 0); return function() {}; }
    var self = this;
    var key = 'wc26_' + path.replace(/\//g,'_');
    if (!_listeners[key]) _listeners[key] = [];
    _listeners[key].push(cb);

    function load() {
      self._read(key).then(function(v) {
        if (v !== null) _cache[key] = v;
        cb(_cache[key] || {});
      }).catch(function() { cb(_cache[key] || {}); });
    }

    load();
    var timer = setInterval(load, anyLive() ? 3000 : 5000);
    return function() {
      clearInterval(timer);
      _listeners[key] = (_listeners[key] || []).filter(function(x) { return x !== cb; });
    };
  }
};

var Sess = {
  get: function(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },

// Helpers
function calcPts(p, r) {
  if (!p || !r) return null;
  var exact = (p.h === r.h && p.a === r.a);
  if (exact) return 2; // exact score = 2 pts
  var pw = p.h > p.a ? 1 : p.h < p.a ? -1 : 0;
  var rw = r.h > r.a ? 1 : r.h < r.a ? -1 : 0;
  return pw === rw ? 2 : 0; // 2pts correct winner only
}
function fmtTime(iso) {
  var d   = new Date(iso);
  var tz  = 'Indian/Maldives'; // MVT = UTC+5
  var day  = d.toLocaleDateString('en-US',  {weekday:'short', timeZone:tz});         // "Fri"
  var date = d.toLocaleDateString('en-US',  {month:'short', day:'numeric', timeZone:tz}); // "Jun 12"
  var time = d.toLocaleTimeString('en-US',  {hour:'2-digit', minute:'2-digit',
               hour12:false, timeZone:tz});                                           // "07:00"
  return { day:day, date:date, time:time,
    local: day + ', ' + date + ', ' + time,
    utcS:  d.toUTCString().replace(' GMT','') + ' UTC' };
}
function mStat(m, results) {
  var now = Date.now(), st = new Date(m.utc).getTime();
  if (results[m.id]) return 'done';
  if (now >= st + 7200000) return 'past';
  if (now >= st) return 'live';
  return 'soon';
}

function SuperAdminApp() {
  var ps  = useState(''); var pass = ps[0]; var setPass = ps[1];
  var as  = useState(false); var authed = as[0]; var setAuthed = as[1];
  var es  = useState(''); var err = es[0]; var setErr = es[1];
  var ts  = useState('users'); var saTab = ts[0]; var setSaTab = ts[1];

  // Data
  var uS  = useState({}); var saUsers = uS[0]; var setSaUsers = uS[1];
  var rS  = useState({}); var saRooms = rS[0]; var setSaRooms = rS[1];
  var prS = useState({}); var saPreds = prS[0]; var setSaPreds = prS[1];
  var reS = useState({}); var saResults = reS[0]; var setSaResults = reS[1];
  var lS  = useState(false); var loading = lS[0]; var setLoading = lS[1];
  var erS = useState(null);  var expandedRoom = erS[0]; var setExpandedRoom = erS[1];
  var rcS = useState(null); var recResult = rcS[0]; var setRecResult = rcS[1];
  var rcL = useState(false); var recLoading = rcL[0]; var setRecLoading = rcL[1];
  var maU = useState(''); var manualUid = maU[0]; var setManualUid = maU[1];
  var maR = useState(''); var manualRid = maR[0]; var setManualRid = maR[1];
  var maMsg = useState(''); var manualMsg = maMsg[0]; var setManualMsg = maMsg[1];
  var gaS = useState([]);    var globalAnns = gaS[0]; var setGlobalAnns = gaS[1];
  var gaMod = useState(null); var gAnnModal = gaMod[0]; var setGAnnModal = gaMod[1];
  var apiKeyS = useState(localStorage.getItem('wc26_apikey')||''); var saApiKey=apiKeyS[0]; var setSaApiKey=apiKeyS[1];
  var syncStatus = useState('idle'); var syncSt=syncStatus[0]; var setSyncSt=syncStatus[1];

  // Password change
  var npS = useState(''); var newPw = npS[0]; var setNewPw = npS[1];
  var opS = useState(''); var oldPw = opS[0]; var setOldPw = opS[1];
  var pwMsgS = useState(''); var pwMsg = pwMsgS[0]; var setPwMsg = pwMsgS[1];

  // ── Password helpers (local-first, GAS optional) ────────────────────
  function getSuperHash() {
    // Default hash of 'wadde2026'; user can override in localStorage
    return localStorage.getItem('wc26_superpw_hash') || btoa('wadde2026');
  }
  function verifyLocal(pw) { return btoa(pw) === getSuperHash(); }

  function doLogin() {
    if (!pass.trim()) return;
    // 1. Verify locally first (works without GAS)
    if (verifyLocal(pass.trim())) {
      setAuthed(true); setErr(''); loadAll(); return;
    }
    // 2. Fall back to GAS verification (works once GAS is updated)
    setErr('Checking…');
    fetch(GS_URL + '?action=superlogin&pass=' + encodeURIComponent(pass.trim()))
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d.ok) {
          // Sync local hash from GAS
          localStorage.setItem('wc26_superpw_hash', btoa(pass.trim()));
          setAuthed(true); setErr(''); loadAll();
        } else setErr('✗ Wrong password');
      })
      .catch(function(){ setErr('✗ Wrong password'); });
  }

  function loadAll() {
    setLoading(true);
    var keys = ['wc26_users','wc26_rooms','wc26_preds','wc26_results','wc26_global_anns'];
    var done = 0;
    var setters = {wc26_users:setSaUsers, wc26_rooms:setSaRooms,
                   wc26_preds:setSaPreds, wc26_results:setSaResults,
                   wc26_global_anns:function(v){setGlobalAnns(Array.isArray(v)?v:v?Object.values(v):[]);}};
    function tick() { done++; if (done >= keys.length) setLoading(false); }
    keys.forEach(function(k){
      fetch(GS_URL + '?action=get&key=' + k)
        .then(function(r){ return r.json(); })
        .then(function(d){ setters[k](d.value||{}); tick(); })
        .catch(function(){ tick(); });
    });
  }

  function deleteUser(uid) {
    var u = saUsers[uid];
    if (!confirm('Delete user "' + (u&&u.name||uid) + '"?\nThis also removes them from all rooms. Cannot be undone.')) return;

    // 1. Remove from users
    var nu = Object.assign({}, saUsers);
    delete nu[uid];

    // 2. Remove from every room they belong to
    var nr = Object.assign({}, saRooms);
    var roomsChanged = false;
    Object.keys(nr).forEach(function(rid) {
      var r = nr[rid];
      if (r.members && r.members.includes(uid)) {
        nr[rid] = Object.assign({}, r, {members: r.members.filter(function(m){ return m !== uid; })});
        roomsChanged = true;
      }
    });

    // 3. Save users (required) — rooms (if changed)
    fetch(GS_URL, {method:'POST', headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'set', key:'wc26_users', value:nu})})
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d.ok !== false) {
          setSaUsers(nu);
          if (roomsChanged) {
            setSaRooms(nr);
            return fetch(GS_URL, {method:'POST', headers:{'Content-Type':'text/plain'},
              body:JSON.stringify({action:'set', key:'wc26_rooms', value:nr})});
          }
        } else { alert('Save error: '+(d.error||'?')); }
      })
      .catch(function(e){ alert('Network error: '+e.message); });
  }

  function deleteRoom(rid) {
    var r = saRooms[rid];
    if (!confirm('Delete room "' + (r&&r.name||rid) + '"?\nMembers lose access.')) return;
    var nr = Object.assign({}, saRooms);
    delete nr[rid];
    fetch(GS_URL, {method:'POST', headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'set', key:'wc26_rooms', value:nr})})

function WelcomePage(props) {
  // Live seconds ticker for welcome page
  var TARGET = new Date('2026-06-11T19:00:00Z').getTime();
  var cs = useState(Math.max(0, TARGET - Date.now()));
  var rem = cs[0]; var setRem = cs[1];
  useEffect(function() {

function PlayerPicker(props) {

// ── Chat Room ─────────────────────────────────────────────────────────────
function ChatRoom(props) {
  var user = props.user;
  var msgs = props.msgs || [];
  var ts = useState(''); var text = ts[0]; var setText = ts[1];
  var rs = useState(false); var sending = rs[0]; var setSending = rs[1];
  var endRef = { current: null };

  // Auto-scroll to bottom when new messages arrive
  useEffect(function() {
    if (endRef.current) endRef.current.scrollIntoView({behavior:'smooth'});
  }, [msgs.length]);

  function send() {
    var msg = text.trim();
    if (!msg || sending) return;
    setSending(true);
    var newMsg = {uid: user.id, name: user.name, text: msg, ts: Date.now()};
    props.onSend(newMsg, function(){ setSending(false); setText(''); });
  }

  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

  function fmtMsgTime(ts) {
    var d = new Date(ts);
    var now = new Date();
    var isToday = d.toDateString() === now.toDateString();
    return isToday
      ? d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
      : d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' +
        d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  // Group consecutive messages from same user
  function groupMsgs(msgs) {
    var groups = [];
    msgs.forEach(function(m, i) {
      var prev = msgs[i-1];
      var sameUser = prev && prev.uid === m.uid && (m.ts - prev.ts) < 300000; // 5 min gap
      if (sameUser) {
        groups[groups.length-1].messages.push(m);
      } else {
        groups.push({uid: m.uid, name: m.name, messages: [m]});
      }
    });
    return groups;
  }

  var grouped = groupMsgs(msgs);
  var myId = user.id;

  return html`<div style=${{display:'flex',flexDirection:'column',height:'calc(100vh - 180px)',minHeight:300,maxHeight:600}}>
    <!-- Messages area -->
    <div style=${{flex:1,overflowY:'auto',padding:'4px 0',display:'flex',flexDirection:'column',gap:2}}>
      ${msgs.length === 0
        ? html`<div style=${{textAlign:'center',padding:'40px 20px'}}>
            <div style=${{fontSize:32,marginBottom:8}}>💬</div>
            <p style=${{color:'var(--mu)',fontSize:13}}>No messages yet — say hello!</p>
          </div>`
        : grouped.map(function(grp, gi) {
            var isMe = grp.uid === myId;
            return html`<div key=${gi} style=${{
              display:'flex', flexDirection:'column',
              alignItems: isMe ? 'flex-end' : 'flex-start',
              marginBottom:8, padding:'0 4px'
            }}>
              <!-- Sender name (not shown for own messages) -->
              ${!isMe && html`<div style=${{fontSize:11,color:'var(--mu)',marginBottom:2,paddingLeft:12,fontWeight:500}}>${grp.name}</div>`}

              ${grp.messages.map(function(m, mi) {
                var isLast = mi === grp.messages.length - 1;
                return html`<div key=${m.ts} style=${{
                  display:'flex', flexDirection: isMe?'row-reverse':'row',
                  alignItems:'flex-end', gap:6, marginBottom: isLast?0:2
                }}>
                  <!-- Avatar (only on last msg in group, for others) -->
                  ${!isMe && isLast
                    ? html`<div style=${{width:28,height:28,borderRadius:14,flexShrink:0,
                        background: teamBg(grp.name),
                        display:'flex',alignItems:'center',justifyContent:'center',
                        fontSize:11,fontWeight:700,color:'white',fontFamily:'Arial'}}>
                        ${grp.name[0].toUpperCase()}
                      </div>`
                    : html`<div style=${{width:28,flexShrink:0}}></div>`
                  }
                  <!-- Bubble -->
                  <div style=${{
                    maxWidth:'72%', padding:'8px 12px',
                    borderRadius: isMe ? '16px 16px 4px 16px' : '16px 16px 16px 4px',
                    background: isMe ? '#1a56db' : 'var(--bg2)',
                    border: isMe ? 'none' : '1px solid var(--bdr)',
                    color: isMe ? '#fff' : 'var(--tx)',
                    fontSize:13, lineHeight:1.4,
                    wordBreak:'break-word',
                    boxShadow: isMe ? 'none' : 'var(--shadow)'
                  }}>
                    ${m.text}
                  </div>
                </div>`;
              })}

              <!-- Timestamp on last message -->
              <div style=${{fontSize:10,color:'var(--dm)',marginTop:2,
                paddingLeft: isMe?0:40, paddingRight: isMe?4:0}}>
                ${fmtMsgTime(grp.messages[grp.messages.length-1].ts)}
              </div>
            </div>`;
          })
      }
      <!-- Scroll anchor -->
      <div ref=${function(el){endRef.current=el;}}></div>
    </div>

    <!-- Input bar -->
    <div style=${{borderTop:'1px solid var(--bdr)',padding:'10px 0 0',display:'flex',gap:8,alignItems:'flex-end'}}>
      <textarea
        value=${text}
        onChange=${function(e){ setText(e.target.value); }}
        onKeyDown=${handleKey}
        placeholder="Type a message… (Enter to send)"
        rows="1"
        style=${{
          flex:1, resize:'none', border:'1px solid var(--bdr)',
          borderRadius:'var(--rs)', padding:'9px 12px',
          background:'var(--bg3)', color:'var(--tx)',
          fontFamily:'DM Sans,sans-serif', fontSize:13,
          lineHeight:1.4, outline:'none', maxHeight:80,
          width:'100%'
        }}
      ></textarea>
      <button class="btn-p" style=${{padding:'9px 14px',flexShrink:0,opacity:sending||!text.trim()?0.5:1}}
        onClick=${send} disabled=${sending || !text.trim()}>
        ${sending ? '...' : '↑'}
      </button>
    </div>
  </div>`;
}

// ── Head-to-Head Comparison Modal ─────────────────────────────────────────
function H2HModal(props) {
  var ua = props.userA, ub = props.userB;
  if (!ua || !ub) return null;
  var predsA = props.preds, predsB = props.preds;
  var results = props.results;
  var done = MS.filter(function(m){ return results[m.id]; });

  var aWins=0, bWins=0, draws=0;
  done.forEach(function(m){
    var pa=predsA[ua.id+'_'+m.id], pb=predsB[ub.id+'_'+m.id], r=results[m.id];
    var ptA=calcPts(pa,r)||0, ptB=calcPts(pb,r)||0;
    if(ptA>ptB) aWins++;
    else if(ptB>ptA) bWins++;
    else if(pa||pb) draws++;
  });

  return html`<div class="ov" onClick=${function(e){if(e.target===e.currentTarget)props.onClose();}}>
    <div class="modal" style=${{padding:0,overflow:'hidden',maxHeight:'85vh',display:'flex',flexDirection:'column'}}>

      <!-- Header -->
      <div style=${{background:'linear-gradient(135deg,#1a56db,#1e40af)',padding:'16px 20px',flexShrink:0}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <h2 style=${{margin:0,fontSize:16,color:'#fff'}}>⚔️ Head-to-Head</h2>
          <button class="btn" style=${{padding:'4px 10px',fontSize:12}} onClick=${props.onClose}>✕</button>
        </div>
        <div style=${{display:'grid',gridTemplateColumns:'1fr auto 1fr',alignItems:'center',gap:8}}>
          <div style=${{textAlign:'center'}}>
            ${ua.favT&&ua.favT[0]&&html`<${FlagImg} team=${ua.favT[0]} w=${28} />`}
            <div style=${{fontSize:14,fontWeight:700,color:'#fff',marginTop:4}}>${ua.name}</div>
            <div style=${{fontSize:22,fontWeight:900,color:'#4ade80',fontFamily:'Barlow Condensed'}}>${aWins}</div>
          </div>
          <div style=${{textAlign:'center',color:'rgba(255,255,255,.5)',fontSize:11}}>
            <div style=${{fontSize:18,fontWeight:700,color:'rgba(255,255,255,.6)'}}>${draws}</div>
            <div>draws</div>
          </div>
          <div style=${{textAlign:'center'}}>
            ${ub.favT&&ub.favT[0]&&html`<${FlagImg} team=${ub.favT[0]} w=${28} />`}
            <div style=${{fontSize:14,fontWeight:700,color:'#fff',marginTop:4}}>${ub.name}</div>
            <div style=${{fontSize:22,fontWeight:900,color:'#f87171',fontFamily:'Barlow Condensed'}}>${bWins}</div>
          </div>
        </div>
      </div>

      <!-- Match rows -->
      <div style=${{overflowY:'auto',flex:1,padding:'8px 0'}}>
        ${done.length===0&&html`<div style=${{textAlign:'center',padding:32,color:'var(--mu)',fontSize:13}}>No results yet — check back after matches are played!</div>`}
        ${done.map(function(m){
          var pa=predsA[ua.id+'_'+m.id], pb=predsB[ub.id+'_'+m.id], r=results[m.id];
          var ptA=calcPts(pa,r)||0, ptB=calcPts(pb,r)||0;
          var isExA=pa&&r&&Number(pa.h)===Number(r.h)&&Number(pa.a)===Number(r.a);
          var isExB=pb&&r&&Number(pb.h)===Number(r.h)&&Number(pb.a)===Number(r.a);
          var colA=ptA===0?'var(--dm)':isExA?'#22c55e':'#60a5fa';
          var colB=ptB===0?'var(--dm)':isExB?'#22c55e':'#60a5fa';
          return html`<div key=${m.id} style=${{
            display:'grid',gridTemplateColumns:'1fr auto 1fr',
            padding:'10px 16px',borderBottom:'1px solid var(--bdr)',
            alignItems:'center',gap:8
          }}>
            <!-- User A prediction -->
            <div style=${{textAlign:'center'}}>
              ${pa
                ? html`<div style=${{fontSize:15,fontWeight:700,color:colA,fontFamily:'Barlow Condensed'}}>${pa.h}–${pa.a}</div>
                    <div style=${{fontSize:10,color:colA}}>${isExA?'🎯 +'+ptA:ptA>0?'✓ +'+ptA:'✗'}</div>`
                : html`<div style=${{fontSize:11,color:'var(--dm)'}}>—</div>`}
            </div>
            <!-- Match info -->
            <div style=${{textAlign:'center',minWidth:80}}>
              <div style=${{fontSize:10,color:'var(--dm)',marginBottom:2}}>Group ${m.gr}</div>
              <div style=${{fontSize:11,color:'var(--mu)',whiteSpace:'nowrap'}}>${m.h.split(' ').pop()} vs ${m.a.split(' ').pop()}</div>
              <div style=${{fontSize:14,fontWeight:700,fontFamily:'Barlow Condensed',color:'var(--tx)',marginTop:2}}>${r.h}–${r.a}</div>
            </div>
            <!-- User B prediction -->
            <div style=${{textAlign:'center'}}>
              ${pb
                ? html`<div style=${{fontSize:15,fontWeight:700,color:colB,fontFamily:'Barlow Condensed'}}>${pb.h}–${pb.a}</div>
                    <div style=${{fontSize:10,color:colB}}>${isExB?'🎯 +'+ptB:ptB>0?'✓ +'+ptB:'✗'}</div>`
                : html`<div style=${{fontSize:11,color:'var(--dm)'}}>—</div>`}
            </div>
          </div>`;
        })}
      </div>

      <!-- Footer total -->
      ${done.length>0&&html`<div style=${{
        display:'grid',gridTemplateColumns:'1fr auto 1fr',padding:'12px 16px',
        borderTop:'1px solid var(--bdr)',background:'var(--bg3)',flexShrink:0
      }}>
        <div style=${{textAlign:'center',fontSize:16,fontWeight:800,fontFamily:'Barlow Condensed',color:'#4ade80'}}>${props.ptsA} pts</div>
        <div style=${{textAlign:'center',fontSize:11,color:'var(--dm)'}}>Total pts</div>
        <div style=${{textAlign:'center',fontSize:16,fontWeight:800,fontFamily:'Barlow Condensed',color:'#f87171'}}>${props.ptsB} pts</div>
      </div>`}
    </div>
  </div>`;
}



// ── User Predictions Modal ────────────────────────────────────────────────
function UserPredictionsModal(props) {
  var u = props.user;
  if (!u) return null;
  var predsMap  = props.preds    || {};
  var resultsMap = props.results || {};
  var allMatches = (props.MS || []).concat(props.KO_MS || []);
  var isMe = props.currentUser && props.currentUser.id === u.id;

  // Get all matches this user predicted (sorted by predicted time)
  var predicted = allMatches
    .filter(function(m){ return predsMap[u.id+'_'+m.id]; })
    .sort(function(a,b){
      var ta = predsMap[u.id+'_'+a.id]; var tb = predsMap[u.id+'_'+b.id];
      return ((ta&&ta.ts?new Date(ta.ts).getTime():0)) - ((tb&&tb.ts?new Date(tb.ts).getTime():0));
    });

  var totalPts = 0, exactCount = 0, winnerCount = 0;
  predicted.forEach(function(m){
    var p = predsMap[u.id+'_'+m.id], r = resultsMap[m.id];
    if (!r) return;
    var pts = calcPts(p,r)||0;
    totalPts += pts;
    if (pts > 0 && Number(p.h)===Number(r.h) && Number(p.a)===Number(r.a)) exactCount++;
    else if (pts > 0) winnerCount++;
  });
  var done = predicted.filter(function(m){return resultsMap[m.id];}).length;
  var isKing = exactCount >= 1;

  return html`<div class="ov" onClick=${function(e){if(e.target===e.currentTarget)props.onClose();}}>
    <div class="modal" style=${{padding:0,overflow:'hidden',maxHeight:'88vh',display:'flex',flexDirection:'column',maxWidth:480}}>

      <!-- Header -->
      <div style=${{background:'linear-gradient(135deg,#1e1b4b,#1a1035)',padding:'16px 20px',flexShrink:0}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
          <div style=${{display:'flex',alignItems:'center',gap:10}}>
            <div style=${{width:42,height:42,borderRadius:21,background:'#1a56db',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:700,color:'#fff',flexShrink:0}}>
              ${(u.name||'?')[0].toUpperCase()}
            </div>
            <div>
              <div style=${{fontSize:16,fontWeight:700,color:'#fff',display:'flex',alignItems:'center',gap:6}}>
                ${u.name}
                ${isKing&&html`<span style=${{fontSize:13}}>👑</span>`}
                ${isMe&&html`<span style=${{fontSize:10,background:'rgba(59,130,246,.3)',color:'#93c5fd',padding:'1px 7px',borderRadius:8}}>you</span>`}
              </div>
              <div style=${{fontSize:12,color:'rgba(255,255,255,.5)',marginTop:1}}>
                ${u.favT&&u.favT[0]&&(u.favT[0]+' fan')}${u.champTeam?' · 🏆 '+u.champTeam:''}
              </div>
            </div>
          </div>
          <button class="btn" style=${{padding:'4px 10px',fontSize:12,flexShrink:0}} onClick=${props.onClose}>✕</button>
        </div>

        <!-- Stats row -->
        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8}}>
          ${[
            [predicted.length, 'Predicted'],
            [done, 'Resolved'],
            [exactCount, '🎯 Exact'],
            [totalPts + ' pts', 'Score']
          ].map(function(s,i){
            return html`<div key=${i} style=${{textAlign:'center',background:'rgba(255,255,255,.07)',borderRadius:8,padding:'7px 4px'}}>
              <div style=${{fontSize:18,fontWeight:800,color:i===2&&exactCount>0?'#fbbf24':'#fff',fontFamily:'Barlow Condensed'}}>${s[0]}</div>
              <div style=${{fontSize:9,color:'rgba(255,255,255,.5)',letterSpacing:.5,textTransform:'uppercase'}}>${s[1]}</div>
            </div>`;
          })}
        </div>

          var isExact = pts===2 && r && Number(p.h)===Number(r.h) && Number(p.a)===Number(r.a);

          var isWrong  = pts===0 && r;

          return html`<div key=${m.id} style=${{

              ${isWinner&&html`<span style=${{fontSize:10,background:'rgba(96,165,250,.12)',color:'#60a5fa',border:'1px solid rgba(96,165,250,.25)',padding:'1px 8px',borderRadius:12}}>✅ +2 pts</span>`}
              ${isWrong&&html`<span style=${{fontSize:10,background:'rgba(239,68,68,.07)',color:'#f87171',padding:'1px 8px',borderRadius:12}}>✗ 0 pts</span>`}
              ${pending&&html`<span style=${{fontSize:10,color:'var(--dm)',padding:'1px 8px'}}>Pending</span>`}
            </div>

            <div style=${{display:'grid',gridTemplateColumns:'1fr auto 1fr',alignItems:'center',gap:6}}>
              <!-- Home team -->
              <div style=${{display:'flex',alignItems:'center',gap:6}}>
                <${FlagImg} team=${m.h||m.h_slot||''} w=${20} />
                <span style=${{fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${m.h||m.h_slot||'TBD'}</span>
              </div>

              <!-- Scores -->
              <div style=${{textAlign:'center',minWidth:90}}>
                <div style=${{display:'flex',alignItems:'center',gap:4,justifyContent:'center'}}>
                  <!-- Predicted -->
                  <span style=${{fontFamily:'Barlow Condensed',fontSize:20,fontWeight:700,color:isExact?'#fbbf24':isWinner?'#60a5fa':isWrong?'#f87171':'var(--tx)'}}>${p.h}–${p.a}</span>

                <span style=${{fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'right'}}>${m.a||m.a_slot||'TBD'}</span>
                <${FlagImg} team=${m.a||m.a_slot||''} w=${20} />
              </div>
            </div>
          </div>`;
        })}
      </div>
    </div>
  </div>`;
}


class RoomErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = {err: null};
  }
  static getDerivedStateFromError(e) { return {err: e}; }
  render() {
    if (this.state.err) {
      var msg = this.state.err && this.state.err.message || 'Unknown error';
      return React.createElement('div', {style:{padding:'40px 24px',textAlign:'center',background:'var(--bg)'}},
        React.createElement('div', {style:{fontSize:48,marginBottom:12}}, '⚠️'),
        React.createElement('h2', {style:{marginBottom:8,fontFamily:'Barlow Condensed,sans-serif'}}, 'Something went wrong'),
        React.createElement('p', {style:{fontSize:13,color:'var(--mu)',marginBottom:6}}, msg),
        React.createElement('p', {style:{fontSize:12,color:'var(--dm)',marginBottom:20}}, 'Your data is safe — please refresh the page.'),
        React.createElement('button', {class:'btn', onClick:function(){window.location.reload();}}, '↻ Refresh')
      );
    }
    return this.props.children;
  }
}

    if (Object.values(users).find(function(x){return x.phone===ph;})) return notify('Phone already registered','err');
    var id = genId();
    var nu = Object.assign({}, users);
    nu[id] = {id:id, name:name.trim(), phone:phone.trim(), pin:btoa(pin), favT:favT, favP:favP, joined:new Date().toISOString()};
    Store.set('users', nu);

  }
  function doResult(mId, h, a) {
    Store.set('results/' + mId, {h:h, a:a, ts:new Date().toISOString()});
    setModal(null); notify('Result saved! Points updated ✅');
  }

  function uPts(uid) {
    return MS.reduce(function(t,m){ return t+(calcPts(preds[uid+'_'+m.id], results[m.id])||0); }, 0);
  }

// ── Achievement Badges ────────────────────────────────────────────────────
var BADGES = [
  {id:'first',   icon:'⚽', col:'#60a5fa', label:'First Kick',   desc:'Made your first prediction!'},
  {id:'sniper',  icon:'🎯', col:'#22c55e', label:'Sniper',       desc:'Scored an exact result!'},
  {id:'marksman',icon:'🏹', col:'#f59e0b', label:'Marksman',     desc:'3+ exact scores!'},
  {id:'fire',    icon:'🔥', col:'#ef4444', label:'On Fire',      desc:'3+ correct in a row!'},
  {id:'early',   icon:'⚡', col:'#a78bfa', label:'Early Bird',   desc:'Predicted 12h+ before kick-off!'},
  {id:'allin',   icon:'💯', col:'#f0b429', label:'All In',       desc:'Predicted every group match!'},
  {id:'perfect', icon:'⭐', col:'#fbbf24', label:'Perfect!',     desc:'100% accuracy on 5+ predictions!'}
];

function getAchievements(uid, predsMap, resultsMap) {
  var b = [];
  var myPreds = MS.filter(function(m){ return predsMap[uid+'_'+m.id]; });
  var donePreds = myPreds.filter(function(m){ return resultsMap[m.id]; });
  var exactPreds = donePreds.filter(function(m){
    var p=predsMap[uid+'_'+m.id], r=resultsMap[m.id];
    return p&&r&&Number(p.h)===Number(r.h)&&Number(p.a)===Number(r.a);
  });
  var correctPreds = donePreds.filter(function(m){
    return calcPts(predsMap[uid+'_'+m.id], resultsMap[m.id]) > 0;
  });

  if (myPreds.length >= 1)    b.push('first');
  if (exactPreds.length >= 1) b.push('sniper');
  if (exactPreds.length >= 3) b.push('marksman');
  if (myPreds.length === MS.length && MS.length > 0) b.push('allin');
  if (donePreds.length >= 5 && correctPreds.length === donePreds.length) b.push('perfect');

  // Early bird: predicted a match 12+ hours before kick-off
  var hasEarly = myPreds.some(function(m){
    var p=predsMap[uid+'_'+m.id];
    return p&&p.ts&&(new Date(m.utc)-new Date(p.ts))>=43200000;
  });
  if (hasEarly) b.push('early');

  // On fire: 3+ correct in a row
  var streak=0, best=0;
  donePreds.forEach(function(m){
    if(calcPts(predsMap[uid+'_'+m.id],resultsMap[m.id])>0){streak++;best=Math.max(best,streak);}
    else streak=0;
  });
  if (best>=3) b.push('fire');

  return b.map(function(id){ return BADGES.find(function(b){return b.id===id;}); }).filter(Boolean);
}

  function uAcc(uid) {
    var done = MS.filter(function(m){ return results[m.id]; });
    if (!done.length) return null;
    var tot  = done.filter(function(m){ return preds[uid+'_'+m.id]; }).length;
    if (!tot) return null;
    var hits = done.filter(function(m){ return calcPts(preds[uid+'_'+m.id], results[m.id]) > 0; }).length;
    return Math.round(hits / tot * 100);
  }

  function getLb() {
    if (!room) return [];
    return (room.members||[])
      .map(function(uid){
        var u = users[uid] || {name:'Member #'+(room.members.indexOf(uid)+1), id:uid, _loading:!Object.keys(users).length};
        var basePts = uPts(uid);
        // Add live projected pts (not final — shown as bonus indicator)
        var livePts = 0;
        Object.keys(liveScores||{}).forEach(function(mid){
          if (results[mid]) return; // already have final result
          var lv = liveScores[mid];
          var lp = calcPts(preds[uid+'_'+mid], lv);
          if (lp > 0) livePts += lp;
        });
        return {user:u, pts:basePts, livePts:livePts,
          np:MS.filter(function(m){return preds[uid+'_'+m.id];}).length,
          acc:uAcc(uid), pick:(users[uid]||{}).champTeam||null,
          badges:getAchievements(uid, preds, results)};
      }).sort(function(a,b){return (b.pts||0)-(a.pts||0)||(b.np||0)-(a.np||0);});
  }
  function newQuiz() { setQSet(shuffle(QQ).slice(0,5)); setQIdx(0); setQScore(0); setQDone(false); setQSel(null); }
  function ansQ(i) {
    if (qSel !== null) return;
    setQSel(i);
    if (i === qSet[qIdx].a) setQScore(function(s){return s+1;});
    setTimeout(function(){
      if (qIdx < qSet.length-1) { setQIdx(function(x){return x+1;}); setQSel(null); }
      else setQDone(true);
    }, 1300);
  }

  var lboard = room ? getLb() : [];
  var myRooms = user ? Object.values(rooms).filter(function(r){return r.members&&r.members.includes(user.id);}) : [];
  var canPick = Date.now() < KOS.getTime();
  var myPick = room ? (tpicks[user&&user.id+'_'+room.id]||{}).team : null;
  var isAdmin = room && adminAuth[room.id] === true;
  var qualifiers = getKOQualifiers(results);
  var unreadChat = room ? Math.max(0, (chatMsgs[room.id]||[]).length - (lastReadChat[room.id]||0)) : 0;

  function saveAnnouncement(ann) {
    if (!room) return;
    var rid = room.id;
    var existing = (annsByRoom[rid] || []);
    var updated = ann.id && existing.find(function(a){ return a.id === ann.id; })
      ? existing.map(function(a){ return a.id === ann.id ? ann : a; })
      : existing.concat([ann]);
    // Primary: localStorage (instant, no GAS dependency)
    try { localStorage.setItem('wc26_ann_'+rid, JSON.stringify(updated)); } catch(e){}
    // Also try GAS (may fail silently on old deployment)
    Store.set('ann_' + rid, updated);
    setAnnsByRoom(function(prev){ var n=Object.assign({},prev); n[rid]=updated; return n; });
    setAnnModal(null);
    notify('Announcement saved!');
  }

  function deleteAnnouncement(annId) {
    if (!room) return;
    var rid = room.id;
    var updated = (annsByRoom[rid] || []).filter(function(a){ return a.id !== annId; });
    try { localStorage.setItem('wc26_ann_'+rid, JSON.stringify(updated)); } catch(e){}
    Store.set('ann_' + rid, updated);
    setAnnsByRoom(function(prev){ var n=Object.assign({},prev); n[rid]=updated; return n; });
    notify('Announcement removed');
  }

  function markChatRead() {
    if (!room) return;
    var count = (chatMsgs[room.id]||[]).length;
    setLastReadChat(function(prev){ var n=Object.assign({},prev); n[room.id]=count; return n; });
  }

  function doLockRoom(locked) {
    if (!room) return;
    var upd = Object.assign({}, room, {locked: locked});
    var nr = Object.assign({}, rooms); nr[room.id] = upd;
    Store.set('rooms', nr);
    setRoom(upd);
    notify(locked ? '🔒 Room locked — no new members can join' : '🔓 Room unlocked');
  }

  function leaveRoom() {
    if (!room || !user) return;
    if (!confirm('Leave "' + room.name + '"?\nYou can rejoin with the room code.')) return;
    var nr = Object.assign({}, rooms);
    var upd = Object.assign({}, room, {members: (room.members||[]).filter(function(id){return id!==user.id;})});
    nr[room.id] = upd;
    Store.set('rooms', nr);
    setScr('dash');
    notify('You left "' + room.name + '"');
  }

  function removeFromRoom(uid) {
    if (!room) return;
    var u = users[uid];
    if (!confirm('Remove "' + (u&&u.name||uid) + '" from this room?')) return;
    var upd = Object.assign({}, room, {members: (room.members||[]).filter(function(id){return id!==uid;})});
    var nr = Object.assign({}, rooms); nr[room.id] = upd;
    Store.set('rooms', nr);
    setRoom(upd);
    notify((u&&u.name||'User') + ' removed');
  }

  function addToRoomByPhone(phone) {
    if (!room || !phone) return;
    var ph = phone.trim();
    var found = Object.values(users).find(function(u){ return u.phone===ph; });
    if (!found) return notify('No user found with that phone number', 'err');
    if ((room.members||[]).includes(found.id)) return notify(found.name + ' is already in this room', 'err');
    var upd = Object.assign({}, room, {members: (room.members||[]).concat([found.id])});
    var nr = Object.assign({}, rooms); nr[room.id] = upd;
    Store.set('rooms', nr);
    setRoom(upd);
    notify(found.name + ' added to room!');
  }

  function sendChatMessage(newMsg, onDone) {
    if (!room) return;
    var roomId = room.id;
    var existing = (chatMsgs[roomId] || []).slice(-200);
    var updated = existing.concat([newMsg]);
    // Primary: localStorage (persists even if GAS fails)
    try { localStorage.setItem('wc26_chat_'+roomId, JSON.stringify(updated)); } catch(e){}
    Store.set('chat_' + roomId, updated);
    setChatMsgs(function(prev) { var n = Object.assign({}, prev); n[roomId] = updated; return n; });
    if (onDone) onDone();
  }

  function saveAPIKey(key) {
    localStorage.setItem('wc26_apikey', key);
    setApiKey(key);
    // restart sync with new key
    fetchLiveScores(key, function(updates) {
      var grpU={}, koU={};
      Object.keys(updates).forEach(function(id){
        if(KO_MS.some(function(m){return m.id===id;})) koU[id]=updates[id];
        else grpU[id]=updates[id];
      });
      if(Object.keys(grpU).length) setResults(function(p){var n=Object.assign({},p,grpU);Store.set('results',n);return n;});
      if(Object.keys(koU).length) setKoResults(function(p){var n=Object.assign({},p,koU);localStorage.setItem('wc26_kores',JSON.stringify(n));Store.set('koresults',n);return n;});
    });
    notify('API key saved — scores syncing!');
  }

  function doKOResult(km, h, a, hs, as) {
    var upd = Object.assign({}, koResults);
    upd[km.id] = {h: parseInt(hs)||0, a: parseInt(as)||0};
    setKoResults(upd);
    localStorage.setItem('wc26_kores', JSON.stringify(upd));
    Store.set('koresults', upd);  // persist to GAS so all users see it
    notify('KO result saved!');
  }
  function verifyAdmin(pass) {
    if (!room || !pass) return false;
    if (room.adminPass === pass.trim()) {
      var na = Object.assign({}, adminAuth); na[room.id] = true;
      setAdminAuth(na);
      // Admin auth kept in memory only (no localStorage) — prevents cross-user leaks
      return true;
    }
    return false;
  }
  var dl = daysTill(WCS);

  function doExport() {
    if (!room) return;

    // ── Sheet 1: Leaderboard ──
    var csvLB = 'Rank,Name,Points,Predictions Made,Tournament Pick\n';
    lboard.forEach(function(e, i) {
      csvLB += [(i+1), '"'+(e.user.name||'?')+'"', e.pts, e.np, '"'+(e.pick||'-')+'"'].join(',') + '\n';
    });

    // ── Sheet 2: Match predictions grid ──
    var headers = ['Match ID','Group','Home','Away','Date (UTC)','Result'];
    lboard.forEach(function(e){ headers.push('"'+(e.user.name||'?')+' pick"'); });
    var csvPreds = headers.join(',') + '\n';
    MS.forEach(function(m) {
      var res = results[m.id];
      var resStr = res ? (res.h+'-'+res.a) : 'TBD';
      var d = new Date(m.utc).toUTCString().replace(' GMT','');
      var row = [m.id, m.gr, '"'+m.h+'"', '"'+m.a+'"', '"'+d+'"', resStr];
      lboard.forEach(function(e) {
        var pred = preds[(e.user.id||'')+'_'+m.id];
        row.push(pred ? (pred.h+'-'+pred.a) : '-');
      });
      csvPreds += row.join(',') + '\n';
    });

    // ── Sheet 3: Player profiles ──
    var csvUsers = 'Name,Phone,Fav Teams,Fav Players,Joined\n';
    lboard.forEach(function(e) {
      var u = e.user;
      csvUsers += ['"'+(u.name||'')+'"', '"'+(u.phone||'')+'"', '"'+((u.favT||[]).join(', '))+'"', '"'+((u.favP||[]).join(', '))+'"', '"'+(u.joined||'')+'"'].join(',') + '\n';
    });

    var full = 'LEADERBOARD — '+room.name+'\n'+csvLB+'\n\nMATCH PREDICTIONS\n'+csvPreds+'\n\nMEMBER PROFILES\n'+csvUsers;
    var blob = new Blob([full], {type:'text/csv;charset=utf-8;'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = room.name.replace(/\s+/g,'_')+'_WC2026.csv';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    notify('CSV downloaded! Open in Google Sheets via File → Import 📊');
  }


  // Show setup screen if GS_URL not configured
  if (!Store._ready()) return html`<${SetupScreen} />`;

  // Route to super admin
  if (isSuperAdmin) return html`<${SuperAdminApp} />`;

  if (scr === 'loading') return html`<div style=${{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,background:'var(--bg)'}}>
    <svg viewBox="0 0 56 64" xmlns="http://www.w3.org/2000/svg" width="56" height="64">
      <path d="M10 8 H46 L42 38 Q39 47 28 50 Q17 47 14 38 Z" fill="#f0b429"/>
      <path d="M14 13 Q4 13 4 23 Q4 33 14 33" fill="none" stroke="#f0b429" stroke-width="5" stroke-linecap="round"/>
      <path d="M42 13 Q52 13 52 23 Q52 33 42 33" fill="none" stroke="#f0b429" stroke-width="5" stroke-linecap="round"/>
      <rect x="25" y="50" width="6" height="8" fill="#f0b429"/>
      <rect x="16" y="58" width="24" height="6" rx="3" fill="#f0b429"/>
      <text x="28" y="37" text-anchor="middle" fill="#0a1628" font-size="13" font-weight="900" font-family="Arial Black,sans-serif">26</text>
    </svg>
    <div style=${{fontFamily:'Barlow Condensed,sans-serif',fontSize:22,fontWeight:700,color:'var(--gold)',letterSpacing:3}}>FIFA WORLD CUP 2026</div>
    <p style=${{color:'var(--mu)',fontSize:13}}>Loading predictions...</p>
  </div>`;

  return html`<div>
    <div class="topbar">
      
      <span class="logo" style=${{display:'flex',alignItems:'center',gap:6}}>
        <svg viewBox="0 0 32 36" xmlns="http://www.w3.org/2000/svg" width="20" height="23" style=${{display:'block'}}><path d="M6 4 H26 L24 21 Q22 26 16 28 Q10 26 8 21 Z" fill="#f0b429"/><path d="M8 7 Q2 7 2 13 Q2 19 8 19" fill="none" stroke="#f0b429" stroke-width="3" stroke-linecap="round"/><path d="M24 7 Q30 7 30 13 Q30 19 24 19" fill="none" stroke="#f0b429" stroke-width="3" stroke-linecap="round"/><rect x="14" y="28" width="4" height="5" fill="#f0b429"/><rect x="9" y="33" width="14" height="3" rx="1.5" fill="#f0b429"/><text x="16" y="21" text-anchor="middle" fill="#0a1628" font-size="8" font-weight="900" font-family="Arial Black,sans-serif">26</text></svg>
        WC 2026 Predictions
      </span>
      <div style=${{display:'flex',alignItems:'center',gap:8}}>
      <button class="theme-btn" onClick=${toggleTheme} title=${theme==='dark'?'Switch to Light':'Switch to Dark'}>
        ${theme==='dark'?'☀️':'🌙'}
      </button>
      ${user&&html`<button class="btn" style=${{fontSize:12}} onClick=${doLogout}><i class="ti ti-logout"></i> Out</button>`}
    </div>
    </div>

    ${toast&&html`<div class=${'toast '+(toast.t==='err'?'ter':'tok')}>${toast.msg}</div>`}

    ${h2hUser&&html`<${UserPredictionsModal}
      user=${h2hUser}
      currentUser=${user}
      preds=${preds}
      results=${results}
      MS=${(function(){try{return MS;}catch(e){return [];}})()}
      KO_MS=${(function(){try{return KO_MS;}catch(e){return [];}})()}
      onClose=${function(){setH2hUser(null);}} />`}

    ${annModal&&html`<${AnnouncementModal}
      ann=${annModal.ann||{}}
      onSave=${saveAnnouncement}
      onClose=${function(){setAnnModal(null);}} />`}

    ${modal&&html`<div class="ov" onClick=${function(e){if(e.target===e.currentTarget)setModal(null);}}>
      ${modal.t==='pred'&&html`<${PredModal} match=${modal.m} existing=${preds[user&&user.id+'_'+modal.m.id]} onSave=${doPredict} onClose=${function(){setModal(null);}} />`}
      ${modal.t==='create'&&html`<${CreateModal} onSave=${doCreate} onClose=${function(){setModal(null);}} />`}
      ${modal.t==='join'&&html`<${JoinModal} onJoin=${doJoin} onClose=${function(){setModal(null);}} />`}
      ${modal.t==='winner'&&html`<${WinnerModal} current=${myPick} onPick=${doPickW} onClose=${function(){setModal(null);}} />`}
      ${modal.t==='result'&&isAdmin&&html`<${ResultModal} match=${modal.m} existing=${results[modal.m&&modal.m.id]} onSave=${doResult} onClose=${function(){setModal(null);}} />`}
    </div>`}

    ${matchDetail&&html`<div class="ov" onClick=${function(e){if(e.target===e.currentTarget)setMatchDetail(null);}}>
      <${MatchDetailModal} match=${matchDetail} results=${results} pred=${preds[user&&user.id+'_'+matchDetail.id]} onClose=${function(){setMatchDetail(null);}} />
    </div>`}

    <div class="page">
      ${scr==='welcome'&&html`<${WelcomePage} liveScores=${liveScores} globalAnns=${globalAnns.filter(function(a){return a.scope==="welcome"||a.scope==="all";})} factI=${factI} plyrI=${plyrI} dl=${dl} onLogin=${function(){setAuthMode('login');setScr('auth');}} onReg=${function(){setAuthMode('reg');setScr('auth');}} />`}
      ${scr==='auth'&&html`<${AuthPage} mode=${authMode} setMode=${setAuthMode} onLogin=${doLogin} onReg=${doReg} onBack=${function(){setScr('welcome');}} />`}
      ${scr==='dash'&&user&&html`<${DashPage} globalAnns=${globalAnns.filter(function(a){return a.scope==="dash"||a.scope==="all";})} user=${user} rooms=${myRooms} factI=${factI} plyrI=${plyrI} dl=${dl} onEnter=${function(r){
      // Restore cached room if local rooms haven't loaded yet (faster display)
      var cached = null;
      try { cached = JSON.parse(localStorage.getItem('wc26_room_cache_'+r.id)||'null'); } catch(e) {}
      var useRoom = (cached&&cached.members&&cached.members.length>=(r.members||[]).length)?cached:r;
      setRoom(useRoom); setTab('leaderboard'); setScr('room'); subscribeChatRoom(r.id);
    }} onCreate=${function(){setModal({t:'create'});}} onJoin=${function(){setModal({t:'join'});}} myChampion=${user&&user.champTeam||null} onPickChampion=${function(){setModal({t:'winner'});}} news=${news} newsLoading=${newsLoading} onFetchNews=${fetchNews} />`}
      ${scr==='room'&&room&&user&&html`<${RoomErrorBoundary}><${RoomPage} user=${user} users=${users} room=${room} tab=${tab} setTab=${setTab} grp=${grp} setGrp=${setGrp} lboard=${lboard} liveScores=${liveScores} canPick=${canPick} myPick=${myPick} preds=${preds} results=${results} onBack=${function(){setScr('dash');}} onPredict=${function(m){setModal({t:'pred',m:m});}} onPickW=${function(){setModal({t:'winner'});}} onResult=${function(m){setModal({t:'result',m:m});}} onShowMatch=${function(m){setMatchDetail(m);}} onAdminUnlock=${verifyAdmin}
          isAdmin=${isAdmin} qualifiers=${qualifiers} koResults=${koResults}
          apiKey=${apiKey} onSaveAPIKey=${saveAPIKey}
          roomMsgs=${room&&chatMsgs[room.id]||[]}
          onSendChat=${sendChatMessage}
          announcements=${(room&&annsByRoom[room.id]||[]).concat(globalAnns.filter(function(a){return a.scope==="rooms"||a.scope==="all";}))}
          onLeaveRoom=${leaveRoom} onLockRoom=${doLockRoom} onH2H=${function(u){setH2hUser(u);}} onViewPreds=${function(u){setH2hUser(u);}} onRemoveFromRoom=${removeFromRoom} onAddToRoom=${addToRoomByPhone} unreadChat=${unreadChat} onChatRead=${markChatRead} onAddAnn=${function(){setAnnModal({mode:'add'});}}
          onEditAnn=${function(a){setAnnModal({mode:'edit',ann:a});}}
          onDeleteAnn=${deleteAnnouncement}
          onKOResult=${function(km,h,a){
            var hs=prompt('Score for '+h+'?','0');
            var as=prompt('Score for '+a+'?','0');
            if(hs!==null&&as!==null) doKOResult(km,h,a,hs,as);
          }} factI=${factI} qIdx=${qIdx} qScore=${qScore} qDone=${qDone} qSel=${qSel} qSet=${qSet} onAnswer=${ansQ} onNewQuiz=${newQuiz} onResetQuiz=${function(){setQIdx(0);setQScore(0);setQDone(false);setQSel(null);}} onExport=${doExport} /></${RoomErrorBoundary}>`}
    </div>
  </div>`;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
