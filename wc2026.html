  }, []);

  const notify = (msg,t='ok') => { setToast({msg,t}); setTimeout(()=>setToast(null),3000); };
  const openM = m => setModal(m);

  // ── AUTH ──
  async function doReg(name,phone,favT,favP) {
    if (!name.trim()||!phone.trim()) return notify('Name & phone required','err');
    if (Object.values(users).find(u=>u.phone===phone.trim())) return notify('Phone already registered','err');
    const id=genId();
    const nu={...users,[id]:{id,name:name.trim(),phone:phone.trim(),favT,favP,joined:new Date().toISOString()}};
    await Store.set('users',nu); Sess.set('wc26s',id);
    setUser(nu[id]); setScr('dash'); notify(`Welcome ${name}! 🎉`);
  }
  async function doLogin(name,phone) {
    const f=Object.values(users).find(u=>u.name.toLowerCase()===name.toLowerCase().trim()&&u.phone===phone.trim());
    if (!f) return notify('User not found. Check name & phone.','err');
    Sess.set('wc26s',f.id); setUser(f); setScr('dash'); notify(`Welcome back ${f.name}!`);
  }
  function doLogout() { Sess.del('wc26s'); setUser(null); setRoom(null); setScr('welcome'); }

  // ── ROOMS ──
  async function doCreate(name) {
    const code=genCode(), id=genId();
    const nr={...rooms,[id]:{id,name,code,by:user.id,members:[user.id],created:new Date().toISOString()}};
    await Store.set('rooms',nr); setRoom(nr[id]); setModal(null); setTab('matches'); setScr('room');
    notify(`Room created! Share code: ${code}`);
  }
  async function doJoin(code) {
    const f=Object.values(rooms).find(r=>r.code===code.toUpperCase().trim());
    if (!f) return notify('Room not found','err');
    let upd=f;
    if (!f.members.includes(user.id)) {
      upd={...f,members:[...f.members,user.id]};
      await Store.set('rooms',{...rooms,[f.id]:upd});
    }
    setRoom(upd); setModal(null); setTab('matches'); setScr('room'); notify(`Joined "${f.name}"! 🎉`);
  }

  // ── PREDICTIONS ──
  async function doPredict(mId,h,a) {
    const k=`${user.id}_${mId}`;
    await Store.set(`preds/${k}`,{h,a,ts:new Date().toISOString()});
    setModal(null); notify('Prediction saved! ⚽');
  }
  async function doPickW(team) {
    if (!room) return;
    const k=`${user.id}_${room.id}`;
    await Store.set(`tpicks/${k}`,{team,ts:new Date().toISOString()});
    setModal(null); notify(`Picked ${F[team]||''} ${team}! 🏆`);
  }
  async function doResult(mId,h,a) {
    await Store.set(`results/${mId}`,{h,a,ts:new Date().toISOString()});
    setModal(null); notify('Result saved! Points updated ✅');
  }

  // ── POINTS ──
  function uPts(uid) { return MS.reduce((t,m)=>t+(calcPts(preds[`${uid}_${m.id}`],results[m.id])||0),0); }
  function lb() {
    if (!room) return [];
    return room.members.map(uid=>({
      user: users[uid]||{name:'?',id:uid},
      pts: uPts(uid),
      nPreds: MS.filter(m=>preds[`${uid}_${m.id}`]).length,
      pick: tpicks[`${uid}_${room.id}`]?.team||null
    })).sort((a,b)=>b.pts-a.pts||b.nPreds-a.nPreds);
  }

  // ── QUIZ ──
  function newQuiz() { setQSet(shuffle(QQ).slice(0,5)); setQIdx(0); setQScore(0); setQDone(false); setQSel(null); }
  function ansQ(i) {
    if (qSel!==null) return;
    setQSel(i);
    if (i===qSet[qIdx].a) setQScore(s=>s+1);
    setTimeout(()=>{ if(qIdx<qSet.length-1){setQIdx(x=>x+1);setQSel(null);}else setQDone(true); },1300);
  }

  const lboard = room ? lb() : [];
  const myRooms = user ? Object.values(rooms).filter(r=>r.members?.includes(user.id)) : [];
  const canPick = Date.now() < KOS.getTime();
  const myPick = room ? tpicks[`${user?.id}_${room?.id}`]?.team : null;
  const isAdmin = room && user && room.by === user.id;

  if (scr==='loading') return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
      <div style={{fontSize:60}}>⚽</div>
      <p style={{color:'var(--muted)',fontSize:15}}>Loading World Cup 2026...</p>
      {!window.db && <p style={{color:'#f59e0b',fontSize:13,textAlign:'center',maxWidth:280}}>⚠ Firebase not configured yet. Add your config to the HTML file.</p>}
    </div>
  );

  return (
    <div>
      {/* Topbar */}
      <div className="topbar">
        <a href="https://wadde.online" className="back-link">
          <i className="ti ti-arrow-left" style={{fontSize:14}} aria-hidden="true"></i> wadde.online
        </a>
        <span className="logo">🏆 WC 2026 Predictions</span>
        {user && <button className="btn" style={{fontSize:12}} onClick={doLogout}><i className="ti ti-logout" style={{fontSize:14}} aria-hidden="true"></i> Out</button>}
      </div>

      {/* Toast */}
      {toast && <div className={`toast toast-${toast.t}`}>{toast.msg}</div>}

      {/* Modal */}
      {modal && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          {modal.t==='pred'    && <PredModal    match={modal.m} existing={preds[`${user?.id}_${modal.m.id}`]} onSave={doPredict} onClose={()=>setModal(null)} />}
          {modal.t==='create'  && <CreateModal  onSave={doCreate}  onClose={()=>setModal(null)} />}
          {modal.t==='join'    && <JoinModal    onJoin={doJoin}    onClose={()=>setModal(null)} />}
          {modal.t==='winner'  && <WinnerModal  current={myPick}   onPick={doPickW} onClose={()=>setModal(null)} />}
          {modal.t==='result'  && isAdmin && <ResultModal match={modal.m} existing={results[modal.m?.id]} onSave={doResult} onClose={()=>setModal(null)} />}
        </div>
      )}

      <div className="page">
        {scr==='welcome' && <WelcomePage factI={factI} plyrI={plyrI} daysTill={daysTill(WCS)} onLogin={()=>{setAuthMode('login');setScr('auth');}} onReg={()=>{setAuthMode('reg');setScr('auth');}} />}
        {scr==='auth'    && <AuthPage mode={authMode} setMode={setAuthMode} onLogin={doLogin} onReg={doReg} onBack={()=>setScr('welcome')} />}
        {scr==='dash'    && user && <DashPage user={user} rooms={myRooms} factI={factI} plyrI={plyrI} daysTill={daysTill(WCS)} onEnter={r=>{setRoom(r);setTab('matches');setScr('room');}} onCreate={()=>openM({t:'create'})} onJoin={()=>openM({t:'join'})} />}
        {scr==='room'    && room && user && (
          <RoomPage room={room} user={user} tab={tab} setTab={setTab} grp={grp} setGrp={setGrp}
            lboard={lboard} canPick={canPick} myPick={myPick} preds={preds} results={results}
            onBack={()=>setScr('dash')} onPredict={m=>openM({t:'pred',m})} onPickW={()=>openM({t:'winner'})}
            onResult={m=>openM({t:'result',m})} isAdmin={isAdmin} factI={factI}
            qIdx={qIdx} qScore={qScore} qDone={qDone} qSel={qSel} qSet={qSet}
            onAnswer={ansQ} onNewQuiz={newQuiz} onResetQuiz={()=>{setQIdx(0);setQScore(0);setQDone(false);setQSel(null);}}
          />
        )}
      </div>
    </div>
  );
}

// ═══ AUTH PAGE ═══
function AuthPage({mode, setMode, onLogin, onReg, onBack}) {
  const [name, setName] = useState('');
  const [phone, setPhone] = useState('');
  const [favT, setFavT] = useState([]);
  const [favP, setFavP] = useState(['','','']);
  const [step, setStep] = useState(1);

  const togT = t => { if(favT.includes(t))setFavT(f=>f.filter(x=>x!==t)); else if(favT.length<3)setFavT(f=>[...f,t]); };
  const reset = m => { setMode(m); setStep(1); setName(''); setPhone(''); setFavT([]); setFavP(['','','']); };
  const sub = () => {
    if (mode==='login') { onLogin(name, phone); return; }
    if (step===1) { if(!name||!phone)return; setStep(2); }
    else if (step===2) { if(!favT.length)return; setStep(3); }
    else onReg(name, phone, favT, favP.filter(Boolean));
  };

  return (
    <div style={{maxWidth:480,margin:'0 auto',paddingTop:8}}>
      <button className="btn" onClick={onBack} style={{marginBottom:14}}>
        <i className="ti ti-arrow-left" style={{fontSize:14}} aria-hidden="true"></i> Back
      </button>
      <div className="card">
        <div className="tabs" style={{marginLeft:-20,marginRight:-20,paddingLeft:20,marginBottom:24}}>
          {[['login','Log in'],['reg','Create Profile']].map(([m,l])=>(
            <button key={m} className={`tab ${mode===m?'on':''}`} onClick={()=>reset(m)}>{l}</button>
          ))}
        </div>

        {mode==='login' ? (
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <h2>Welcome back</h2>
            <div><label>Name</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" /></div>
            <div><label>Phone number</label><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+1234567890" /></div>
            <button className="btn-primary" style={{width:'100%',marginTop:4}} onClick={sub}>Log in →</button>
          </div>
        ) : (
          <>
            {step===1 && (
              <div style={{display:'flex',flexDirection:'column',gap:14}}>
                <h2>Create profile <span style={{fontSize:14,color:'var(--muted)',fontWeight:400,fontFamily:'DM Sans'}}>1 of 3</span></h2>
                <div><label>Your name</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Full name" /></div>
                <div><label>Phone number</label><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+1234567890" /></div>
                <button className="btn-primary" style={{width:'100%',opacity:(!name||!phone)?0.45:1}} disabled={!name||!phone} onClick={sub}>Next: Pick teams →</button>
              </div>
            )}
            {step===2 && (
              <div>
                <h2>Favorite teams <span style={{fontSize:14,color:'var(--muted)',fontWeight:400,fontFamily:'DM Sans'}}>2 of 3 · pick 3</span></h2>
                <div className="g3" style={{marginBottom:14,maxHeight:280,overflowY:'auto',padding:4}}>
                  {TEAMS.map(t=>(
                    <button key={t} onClick={()=>togT(t)} style={{padding:'8px 5px',borderRadius:'var(--rs)',fontSize:11,cursor:'pointer',border:favT.includes(t)?'2px solid #1a56db':'1px solid var(--bdr)',background:favT.includes(t)?'rgba(26,86,219,.1)':'var(--bg3)',color:'var(--text)',display:'flex',flexDirection:'column',alignItems:'center',gap:3,opacity:!favT.includes(t)&&favT.length>=3?0.35:1}}>
                      <span style={{fontSize:20}}>{F[t]||'🏳'}</span>
                      <span style={{textAlign:'center',fontSize:10,lineHeight:1.2}}>{t}</span>
                    </button>
                  ))}
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn" style={{flex:1}} onClick={()=>setStep(1)}>← Back</button>
                  <button className="btn-primary" style={{flex:2,opacity:!favT.length?0.45:1}} disabled={!favT.length} onClick={sub}>Next: Players →</button>
                </div>
              </div>
            )}
            {step===3 && (
              <div style={{display:'flex',flexDirection:'column',gap:13}}>
                <h2>Favorite players <span style={{fontSize:14,color:'var(--muted)',fontWeight:400,fontFamily:'DM Sans'}}>3 of 3</span></h2>
                {[0,1,2].map(i=>(
                  <div key={i}><label>Player {i+1}</label><input value={favP[i]} onChange={e=>{const fp=[...favP];fp[i]=e.target.value;setFavP(fp);}} placeholder={`e.g. ${PLY[i]?.n||'Player name'}`} /></div>
                ))}
                <div className="card-sm" style={{background:'var(--bg3)',borderRadius:'var(--rs)',border:'1px solid var(--bdr)'}}>
                  <span style={{fontSize:12,color:'var(--muted)'}}>Teams: {favT.map(t=>F[t]||t).join(' ')}</span>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn" style={{flex:1}} onClick={()=>setStep(2)}>← Back</button>
                  <button className="btn-primary" style={{flex:2}} onClick={sub}>Create Profile 🎉</button>
                </div>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

  const gMs = MS.filter(m=>m.gr===grp);

  return (
    <div>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>

        {canPick && (
          <button className="btn" style={{fontSize:12,background:myPick?'var(--gold-dim)':undefined,borderColor:myPick?'rgba(240,180,41,.35)':undefined,color:myPick?'var(--gold)':undefined,whiteSpace:'nowrap',flexShrink:0}} onClick={onPickW}>

          </button>
        )}
      </div>

      {/* Tabs */}
      <div className="tabs">
        {[['matches','⚽ Matches'],['leaderboard','🏆 Standings'],['groups','📊 Groups'],['quiz','🧠 Quiz']].map(([t,l])=>(
          <button key={t} className={`tab ${tab===t?'on':''}`} onClick={()=>setTab(t)}>{l}</button>
        ))}
      </div>

      {/* ── MATCHES ── */}
      {tab==='matches' && (
        <div>
          <div style={{display:'flex',gap:5,marginBottom:14,flexWrap:'wrap'}}>
            {Object.keys(GRP).map(g=>(
              <button key={g} className={`pill ${grp===g?'on':''}`} onClick={()=>setGrp(g)}>Grp {g}</button>
            ))}
          </div>
          {gMs.map(m => {
            const st = mStat(m, results);
            const pred = preds[`${user.id}_${m.id}`];
            const res = results[m.id];
            const ep = calcPts(pred, res);
            const {local, utcS} = fmtTime(m.utc);
            const bdrColor = st==='done'?'#22c55e':st==='live'?'#ef4444':st==='past'?'#f59e0b':'var(--bdr)';
            return (
              <div key={m.id} className="mcard" style={{borderLeftColor:bdrColor,marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                  <span className={`badge ${st}`}>{st==='live'?'🔴 LIVE':st==='done'?'✓ FINAL':st==='past'?'ENDED':'⏱ UPCOMING'}</span>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    {isAdmin && st!=='done' && <button className="btn" style={{fontSize:11,padding:'3px 9px'}} onClick={()=>onResult(m)}>Enter result</button>}
                    {ep!==null && <span style={{fontWeight:500,fontSize:13,color:ep===4?'#22c55e':ep===2?'#60a5fa':'#f87171'}}>{ep>0?`+${ep} pts`:'0 pts'}</span>}
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <div style={{flex:1,textAlign:'right'}}>
                    <div style={{fontSize:26}}>{F[m.h]||'🏳'}</div>
                    <div style={{fontSize:13,fontWeight:500}}>{m.h}</div>
                  </div>
                  <div style={{background:'var(--bg3)',borderRadius:'var(--rs)',padding:'6px 14px',minWidth:72,textAlign:'center'}}>
                    {res ? <span style={{fontFamily:'Barlow Condensed',fontSize:22,fontWeight:700}}>{res.h}–{res.a}</span>
                         : st==='live' ? <span style={{fontSize:13,color:'var(--red)',fontWeight:500}}>LIVE</span>
                         : <span style={{fontSize:14,color:'var(--dim)'}}>vs</span>}
                  </div>
                  <div style={{flex:1,textAlign:'left'}}>
                    <div style={{fontSize:26}}>{F[m.a]||'🏳'}</div>
                    <div style={{fontSize:13,fontWeight:500}}>{m.a}</div>
                  </div>
                </div>
                <div style={{fontSize:11,color:'var(--muted)',marginBottom:8}}>
                  <div>{local}</div>
                  <div style={{color:'var(--dim)'}}>{utcS}</div>
                  <div style={{marginTop:1}}>{m.v}</div>
                </div>
                {st==='soon' ? (
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:8,borderTop:'1px solid var(--bdr)'}}>
                    {pred ? <span style={{fontSize:13,color:'var(--muted)'}}>Your pick: <strong style={{color:'var(--text)'}}>{pred.h}–{pred.a}</strong></span>
                           : <span style={{fontSize:12,color:'var(--dim)'}}>No prediction yet</span>}
                    <button className="btn-primary" style={{fontSize:12,padding:'6px 14px'}} onClick={()=>onPredict(m)}>{pred?'Edit':'Predict ⚽'}</button>
                  </div>
                ) : pred && (
                  <div style={{paddingTop:8,borderTop:'1px solid var(--bdr)',fontSize:12,color:'var(--muted)'}}>
                    Your prediction: <strong style={{color:'var(--text)'}}>{pred.h}–{pred.a}</strong>
                    {ep===4&&<span style={{color:'#22c55e'}}> · Exact! 🎯</span>}
                    {ep===2&&<span style={{color:'#60a5fa'}}> · Correct winner ✓</span>}
                    {ep===0&&res&&<span style={{color:'#f87171'}}> · Missed ✗</span>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ── STANDINGS ── */}
      {tab==='leaderboard' && (
        <div>
          {lboard[0]?.pts>0 && (
            <div className="card-dark" style={{padding:'14px 18px',marginBottom:14,display:'flex',alignItems:'center',gap:12,borderColor:'rgba(240,180,41,0.25)'}}>
              <span style={{fontSize:32}}>🏆</span>
              <div>
                <div style={{fontSize:10,color:'var(--gold)',letterSpacing:1.5,fontFamily:'Barlow Condensed',fontWeight:700}}>CURRENT LEADER</div>
                <div style={{fontFamily:'Barlow Condensed',fontSize:20,fontWeight:600,marginTop:2}}>{lboard[0].user?.name}</div>
                <div style={{fontSize:12,color:'var(--muted)'}}>{lboard[0].pts} pts · {lboard[0].nPreds} predictions</div>
              </div>
            </div>
          )}
          {lboard.length===0
            ? <div className="card" style={{textAlign:'center',padding:32}}><div style={{fontSize:32,marginBottom:10}}>📊</div><p style={{color:'var(--muted)'}}>No members yet</p></div>
            : <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {lboard.map((e,i)=>(
                  <div key={e.user?.id||i} className="lb-row" style={{borderColor:i===0?'rgba(240,180,41,.22)':e.user?.id===user.id?'rgba(59,130,246,.3)':undefined,background:i===0?'rgba(240,180,41,.03)':undefined}}>
                    <div style={{width:32,height:32,borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,background:i===0?'rgba(240,180,41,.15)':i===1?'rgba(148,163,184,.1)':i===2?'rgba(180,100,30,.1)':'var(--bg3)'}}>
                      {i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:500,fontSize:15,display:'flex',alignItems:'center',gap:6}}>
                        {e.user?.name}
                        {e.user?.id===user.id&&<span style={{fontSize:10,background:'rgba(59,130,246,.15)',color:'#60a5fa',padding:'1px 7px',borderRadius:8}}>you</span>}
                      </div>
                      <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>
                        {e.nPreds} predictions{e.pick?` · picked ${F[e.pick]||''} ${e.pick}`:''}
                      </div>
                    </div>
                    <div style={{fontFamily:'Barlow Condensed',fontSize:20,fontWeight:700,color:e.pts>0?'#22c55e':'var(--dim)'}}>{e.pts}<span style={{fontSize:13,fontWeight:400}}> pts</span></div>
                  </div>
                ))}
              </div>
          }
          <div className="card" style={{marginTop:14,background:'var(--bg3)'}}>
            <h3>Scoring guide</h3>
            <div style={{display:'flex',flexDirection:'column',gap:6,fontSize:13,color:'var(--muted)'}}>
              <div style={{display:'flex',justifyContent:'space-between'}}>🎯 Exact score<strong style={{color:'#22c55e'}}>4 pts</strong></div>
              <div style={{display:'flex',justifyContent:'space-between'}}>✅ Correct winner / draw<strong style={{color:'#60a5fa'}}>2 pts</strong></div>
              <div style={{display:'flex',justifyContent:'space-between'}}>❌ Wrong prediction<strong style={{color:'var(--dim)'}}>0 pts</strong></div>
              <div style={{display:'flex',justifyContent:'space-between'}}>🏆 Correct tournament winner<strong style={{color:'var(--gold)'}}>+10 pts</strong></div>
            </div>
          </div>
        </div>
      )}

      {/* ── GROUPS ── */}
      {tab==='groups' && (
        <div>
          <p style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>All 12 FIFA World Cup 2026 groups</p>
          <div className="g2">
            {Object.entries(GRP).map(([g,ts])=>(
              <div key={g} className="card">
                <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',marginBottom:8,fontFamily:'Barlow Condensed',letterSpacing:1}}>GROUP {g}</div>
                {ts.map(t=>(
                  <div key={t} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:'1px solid var(--bdr)',fontSize:13}}>
                    <span style={{fontSize:18}}>{F[t]||'🏳'}</span>
                    <span style={{flex:1}}>{t}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── QUIZ ── */}
      {tab==='quiz' && (
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <h2 style={{margin:0}}>Daily Quiz</h2>
            <button className="btn" style={{fontSize:12}} onClick={onNewQuiz}>
              <i className="ti ti-refresh" style={{fontSize:14}} aria-hidden="true"></i> New quiz
            </button>
          </div>
          {!qDone ? (
            <div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:12,fontSize:13,color:'var(--muted)'}}>
                <span>Question {qIdx+1} of {qSet.length}</span>
                <span>{qScore} correct</span>
              </div>
              <div className="card" style={{marginBottom:12}}>
                <p style={{fontFamily:'Barlow Condensed',fontSize:20,fontWeight:600,lineHeight:1.4,margin:0}}>{qSet[qIdx]?.q}</p>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {qSet[qIdx]?.o.map((opt,i)=>{
                  const isC=i===qSet[qIdx].a, isSel=qSel===i;
                  let bg='var(--bg3)', bdr='1px solid var(--bdr)', cl='var(--text)';
                  if (qSel!==null) {
                    if (isC) { bg='rgba(34,197,94,.1)'; bdr='1px solid #22c55e'; cl='#4ade80'; }
                    else if (isSel) { bg='rgba(239,68,68,.1)'; bdr='1px solid #ef4444'; cl='#f87171'; }
                  }
                  return (
                    <button key={i} onClick={()=>onAnswer(i)} style={{padding:'12px 14px',borderRadius:'var(--rs)',border:bdr,background:bg,cursor:'pointer',textAlign:'left',fontSize:14,color:cl,display:'flex',alignItems:'center',gap:10,transition:'all .15s'}}>
                      <span style={{width:26,height:26,borderRadius:13,background:'rgba(255,255,255,.06)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,flexShrink:0,color:cl}}>
                        {['A','B','C','D'][i]}
                      </span>
                      {opt}
                      {qSel!==null&&isC&&<span style={{marginLeft:'auto'}}>✓</span>}
                    </button>
                  );
                })}
              </div>
            </div>
          ) : (
            <div className="card" style={{textAlign:'center',padding:36}}>
              <div style={{fontSize:52,marginBottom:12}}>{qScore>=4?'🏆':qScore>=3?'⭐':qScore>=2?'👍':'📚'}</div>
              <h2>Quiz Complete!</h2>
              <p style={{fontSize:17,color:'var(--muted)',marginBottom:6}}>{qScore} / {qSet.length} correct</p>
              <p style={{fontSize:14,color:'var(--dim)',marginBottom:24}}>{qScore===5?'Perfect score! Football genius! 🎯':qScore>=3?'Great knowledge! ⚽':'Keep learning the beautiful game! 📖'}</p>
              <div style={{display:'flex',gap:10,justifyContent:'center'}}>
                <button className="btn" onClick={onResetQuiz}>Try again</button>
                <button className="btn-primary" onClick={onNewQuiz}><i className="ti ti-refresh" style={{fontSize:14}} aria-hidden="true"></i> New quiz</button>
              </div>
            </div>
          )}
          <div style={{background:'rgba(59,130,246,.07)',border:'1px solid rgba(59,130,246,.2)',borderRadius:'var(--rs)',padding:'10px 14px',marginTop:14,fontSize:13,color:'#93c5fd'}}>
            <strong style={{color:'#60a5fa',fontSize:11,letterSpacing:1,fontFamily:'Barlow Condensed'}}>DID YOU KNOW? &nbsp;</strong>{FACTS[factI]}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══ MODALS ═══
function ScorePick({val, onChange, label}) {
  return (
    <div style={{textAlign:'center'}}>
      <div style={{fontSize:11,color:'var(--muted)',marginBottom:6}}>{label.split(' ')[0]}</div>
      <div className="score-picker">
        <button className="btn" style={{padding:'6px 12px'}} onClick={()=>onChange(Math.max(0,val-1))}><i className="ti ti-minus" style={{fontSize:16}} aria-hidden="true"></i></button>
        <span className="score-num">{val}</span>
        <button className="btn" style={{padding:'6px 12px'}} onClick={()=>onChange(Math.min(15,val+1))}><i className="ti ti-plus" style={{fontSize:16}} aria-hidden="true"></i></button>
      </div>
    </div>
  );
}

function PredModal({match, existing, onSave, onClose}) {
  const [h, setH] = useState(existing?.h ?? 1);
  const [a, setA] = useState(existing?.a ?? 1);
  const {local, utcS} = fmtTime(match.utc);
  return (
    <div className="modal">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h2 style={{margin:0}}>Predict Score</h2>
        <button className="btn" style={{padding:'4px 8px'}} onClick={onClose}><i className="ti ti-x" style={{fontSize:18}} aria-hidden="true"></i></button>
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginBottom:12}}>
        <div style={{textAlign:'center'}}><div style={{fontSize:30}}>{F[match.h]||'🏳'}</div><div style={{fontSize:13,fontWeight:500}}>{match.h}</div></div>
        <div style={{fontSize:13,color:'var(--muted)'}}>vs</div>
        <div style={{textAlign:'center'}}><div style={{fontSize:30}}>{F[match.a]||'🏳'}</div><div style={{fontSize:13,fontWeight:500}}>{match.a}</div></div>
      </div>
      <div style={{fontSize:12,color:'var(--muted)',textAlign:'center',marginBottom:18}}>{local}<br/><span style={{fontSize:11,color:'var(--dim)'}}>{utcS}</span></div>
      <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:22,justifyContent:'center'}}>
        <ScorePick val={h} onChange={setH} label={match.h} />
        <span style={{fontFamily:'Barlow Condensed',fontSize:28,fontWeight:700,color:'var(--muted)'}}>–</span>
        <ScorePick val={a} onChange={setA} label={match.a} />
      </div>
      <div style={{display:'flex',gap:10}}>
        <button className="btn" style={{flex:1}} onClick={onClose}>Cancel</button>
        <button className="btn-primary" style={{flex:2}} onClick={()=>onSave(match.id,h,a)}>Save prediction ⚽</button>
      </div>
    </div>
  );
}

function CreateModal({onSave, onClose}) {
  const [name, setName] = useState('');
  return (
    <div className="modal">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h2 style={{margin:0}}>Create Room</h2>
        <button className="btn" style={{padding:'4px 8px'}} onClick={onClose}><i className="ti ti-x" style={{fontSize:18}} aria-hidden="true"></i></button>
      </div>
      <div style={{marginBottom:14}}><label>Room name</label><input value={name} onChange={e=>setName(e.target.value)} placeholder='e.g. Office World Cup 2026' autoFocus /></div>
      <p style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>A unique 6-character code is generated. Share it with friends to join!</p>
      <div style={{display:'flex',gap:10}}>
        <button className="btn" style={{flex:1}} onClick={onClose}>Cancel</button>
        <button className="btn-primary" style={{flex:2,opacity:!name?0.45:1}} disabled={!name} onClick={()=>onSave(name)}>Create Room 🏠</button>
      </div>
    </div>
  );
}

function JoinModal({onJoin, onClose}) {
  const [code, setCode] = useState('');
  return (
    <div className="modal">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h2 style={{margin:0}}>Join Room</h2>
        <button className="btn" style={{padding:'4px 8px'}} onClick={onClose}><i className="ti ti-x" style={{fontSize:18}} aria-hidden="true"></i></button>
      </div>
      <div style={{marginBottom:16}}><label>Room code</label><input value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder='XXXXXX' maxLength={6} style={{textTransform:'uppercase',letterSpacing:5,fontSize:22,textAlign:'center'}} autoFocus /></div>
      <div style={{display:'flex',gap:10}}>
        <button className="btn" style={{flex:1}} onClick={onClose}>Cancel</button>
        <button className="btn-primary" style={{flex:2,opacity:code.length!==6?0.45:1}} disabled={code.length!==6} onClick={()=>onJoin(code)}>Join Room 🚪</button>
      </div>
    </div>
  );
}

function WinnerModal({current, onPick, onClose}) {
  const [sel, setSel] = useState(current||null);
  const [filter, setFilter] = useState('');
  const filtered = TEAMS.filter(t=>t.toLowerCase().includes(filter.toLowerCase()));
  return (
    <div className="modal" style={{maxWidth:480}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <h2 style={{margin:0}}>🏆 Tournament Winner</h2>
        <button className="btn" style={{padding:'4px 8px'}} onClick={onClose}><i className="ti ti-x" style={{fontSize:18}} aria-hidden="true"></i></button>
      </div>
      <p style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>Pick before Round of 32 starts (June 28). Correct pick = +10 bonus points!</p>
      <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder='Search team...' style={{marginBottom:10}} />
      <div className="g3" style={{maxHeight:260,overflowY:'auto',marginBottom:16,padding:2}}>
        {filtered.map(t=>(
          <button key={t} onClick={()=>setSel(t)} style={{padding:'8px 5px',borderRadius:'var(--rs)',fontSize:11,cursor:'pointer',border:sel===t?'2px solid #1a56db':'1px solid var(--bdr)',background:sel===t?'rgba(26,86,219,.1)':'var(--bg3)',color:'var(--text)',display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
            <span style={{fontSize:20}}>{F[t]||'🏳'}</span>
            <span style={{textAlign:'center',lineHeight:1.2}}>{t}</span>
          </button>
        ))}
      </div>
      <div style={{display:'flex',gap:10}}>
        <button className="btn" style={{flex:1}} onClick={onClose}>Cancel</button>
        <button className="btn-primary" style={{flex:2,opacity:!sel?0.45:1}} disabled={!sel} onClick={()=>onPick(sel)}>Pick {sel?(F[sel]||'')+' '+sel:'winner'} 🏆</button>
      </div>
    </div>
  );
}

function ResultModal({match, existing, onSave, onClose}) {
  const [h, setH] = useState(existing?.h ?? 0);
  const [a, setA] = useState(existing?.a ?? 0);
  return (
    <div className="modal">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h2 style={{margin:0}}>Enter Result</h2>
        <button className="btn" style={{padding:'4px 8px'}} onClick={onClose}><i className="ti ti-x" style={{fontSize:18}} aria-hidden="true"></i></button>
      </div>
      <div style={{textAlign:'center',marginBottom:14,fontSize:14,color:'var(--muted)'}}>{F[match.h]||''} {match.h} vs {match.a} {F[match.a]||''}</div>
      <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:22,justifyContent:'center'}}>
        <ScorePick val={h} onChange={setH} label={match.h} />
        <span style={{fontFamily:'Barlow Condensed',fontSize:28,fontWeight:700,color:'var(--muted)'}}>–</span>
        <ScorePick val={a} onChange={setA} label={match.a} />
      </div>
      <div style={{display:'flex',gap:10}}>
        <button className="btn" style={{flex:1}} onClick={onClose}>Cancel</button>
        <button className="btn-primary" style={{flex:2}} onClick={()=>onSave(match.id,h,a)}>Save result ✅</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
