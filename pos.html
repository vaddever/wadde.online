<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POS — QuoteMaster</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#0f6d5a;--accent-soft:#e3f0ea;--accent-ink:#0b4a3c;
  --ink:#1b1d24;--ink-soft:#5b5d68;--line:#e4ded2;
  --paper:#f6f3ec;--card:#fffdf8;
  --danger:#b3261e;--amber:#b45309;--amber-soft:#fbe7d2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Hanken Grotesk',system-ui,sans-serif;
  background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input{font-family:inherit;font-size:16px;color:var(--ink);outline:none}

/* ── Splash / error ──────────────────────────────────────────── */
#splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;background:var(--paper);z-index:200}
.spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-card{background:var(--card);border:1.5px solid var(--danger);border-radius:16px;
  padding:24px 20px;max-width:340px;text-align:center;line-height:1.5}
.err-card b{color:var(--danger);font-size:16px}
.err-card p{margin-top:10px;font-size:13.5px;color:var(--ink-soft)}

/* ── Login screen ────────────────────────────────────────────── */
#loginView{position:fixed;inset:0;display:none;flex-direction:column;
  align-items:center;overflow-y:auto;padding:32px 20px 40px;background:var(--paper);z-index:100}
.lv-logo{width:60px;height:60px;border-radius:16px;background:var(--accent);color:#fff;
  display:grid;place-items:center;font-size:26px;font-weight:700;margin-bottom:12px;overflow:hidden}
.lv-logo img{width:100%;height:100%;object-fit:cover}
.lv-title{font-size:22px;font-weight:700;margin-bottom:4px;text-align:center}
.lv-sub{font-size:13.5px;color:var(--ink-soft);text-align:center;margin-bottom:28px}
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:12px;width:100%;max-width:520px}
.emp-tile{background:var(--card);border:2px solid var(--line);border-radius:14px;
  padding:20px 14px;text-align:center;cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent}
.emp-tile:active{border-color:var(--accent);background:var(--accent-soft);transform:scale(.97)}
.emp-avt{width:46px;height:46px;border-radius:50%;background:var(--accent);color:#fff;
  display:grid;place-items:center;font-size:19px;font-weight:700;margin:0 auto 10px}
.emp-tile b{display:block;font-size:14px;margin-bottom:2px}
.emp-tile span{font-size:12px;color:var(--ink-soft)}

/* ── PIN pad ─────────────────────────────────────────────────── */
#pinView{position:fixed;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;padding:24px 20px;background:var(--paper);z-index:100}
.pin-name{font-size:20px;font-weight:700;margin-bottom:4px;text-align:center}
.pin-hint{font-size:13.5px;color:var(--ink-soft);margin-bottom:20px;text-align:center}
.pin-dots{display:flex;gap:14px;margin-bottom:28px}
.pin-dot{width:16px;height:16px;border-radius:50%;background:var(--line);transition:.15s}
.pin-dot.on{background:var(--accent)}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:min(260px,80vw)}
.pk{padding:18px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);
  font-size:22px;font-weight:600;text-align:center;cursor:pointer;transition:.12s;user-select:none}
.pk:active{background:var(--accent-soft);border-color:var(--accent);transform:scale(.95)}
.pin-err{color:var(--danger);font-size:13px;min-height:20px;margin-top:10px;text-align:center}
.pin-back{margin-top:18px;padding:10px 24px;border-radius:10px;border:1.5px solid var(--line);
  background:transparent;font-size:14px;font-weight:600}

/* ── POS main ────────────────────────────────────────────────── */
#posView{position:fixed;inset:0;display:none;flex-direction:column}

/* header */
.ph{background:var(--accent);color:#fff;padding:10px 16px;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;z-index:10}
.ph-biz{font-weight:700;font-size:15px;line-height:1.2}
.ph-sub{font-size:12px;opacity:.85}
.ph-btn{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;
  padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer}

/* items area */
.pos-items{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  padding:12px;padding-bottom:80px;/* space for cart bar */}
.pos-search input{width:100%;padding:11px 14px;border:1.5px solid var(--line);
  border-radius:12px;background:var(--card);font-size:15px}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:10px}

/* item tile */
.itile{background:var(--card);border:1.5px solid var(--line);border-radius:13px;
  padding:14px 12px;cursor:pointer;position:relative;transition:.12s;user-select:none;
  -webkit-tap-highlight-color:transparent}
.itile:active{background:var(--accent-soft);border-color:var(--accent);transform:scale(.97)}
.itile.oos{opacity:.38;pointer-events:none}
.itile .t-qty{position:absolute;top:-7px;right:-7px;background:var(--accent);color:#fff;
  border-radius:20px;font-size:11px;font-weight:700;padding:2px 8px;min-width:24px;text-align:center}
.itile .t-stk{position:absolute;top:6px;right:7px;font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:20px}
.sk-g{background:#e3f0ea;color:#0b5345}
.sk-l{background:#fbe7d2;color:#b45309}
.sk-o{background:#f7dedc;color:#b3261e}
.itile .t-name{font-weight:600;font-size:13px;line-height:1.3;margin-bottom:6px;
  padding-right:32px;/* avoid overlap with stock badge */}
.itile .t-price{font-size:15px;font-weight:700;color:var(--accent);
  font-family:'Spline Sans Mono',monospace}
.itile .t-unit{font-size:11px;color:var(--ink-soft);margin-top:2px}

/* ── Cart bar (mobile sticky) ────────────────────────────────── */
#cartBar{position:fixed;left:0;right:0;bottom:0;z-index:40;
  background:var(--accent);color:#fff;padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;
  transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  box-shadow:0 -4px 20px rgba(15,109,90,.25)}
#cartBar.up{transform:translateY(0)}
.cb-info{font-size:14px;font-weight:600}
.cb-total{font-size:18px;font-weight:700;font-family:'Spline Sans Mono',monospace}
.cb-cta{background:rgba(255,255,255,.25);padding:8px 16px;border-radius:10px;
  font-size:14px;font-weight:700;white-space:nowrap}

/* ── Cart sheet ──────────────────────────────────────────────── */
#cartBackdrop{position:fixed;inset:0;background:rgba(27,29,36,.45);
  z-index:49;display:none;opacity:0;transition:opacity .25s}
#cartBackdrop.show{display:block;opacity:1}

#cartSheet{position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:var(--card);border-radius:20px 20px 0 0;
  display:flex;flex-direction:column;
  max-height:88vh;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
#cartSheet.open{transform:translateY(0)}

.cs-handle{width:36px;height:4px;background:var(--line);border-radius:2px;
  margin:12px auto 0}
.cs-head{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--line)}
.cs-head h3{font-size:16px;font-weight:700}
.cs-add-more{background:var(--accent-soft);color:var(--accent-ink);border:none;
  border-radius:9px;padding:7px 14px;font-size:13.5px;font-weight:600;cursor:pointer}
.cs-add-more:active{opacity:.8}

.cs-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.cs-empty{padding:32px 20px;text-align:center;color:var(--ink-soft);font-size:14px}

.ci-row{display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-bottom:1px solid var(--line)}
.ci-row:last-child{border-bottom:none}
.ci-name{flex:1;min-width:0}
.ci-name b{display:block;font-size:13.5px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-name span{font-size:12px;color:var(--ink-soft)}
.ci-qty{display:flex;align-items:center;gap:6px;flex-shrink:0}
.cq-btn{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--line);
  background:var(--paper);font-size:18px;font-weight:700;display:grid;place-items:center;cursor:pointer}
.cq-btn:active{background:var(--accent-soft)}
.ci-amt{font-family:'Spline Sans Mono',monospace;font-size:13.5px;font-weight:600;
  min-width:70px;text-align:right;flex-shrink:0}
.ci-rm{color:#ccc;font-size:20px;padding:0 0 0 4px;background:none;border:none;
  cursor:pointer;line-height:1;flex-shrink:0}

.cs-footer{border-top:2px solid var(--line);padding:14px 16px;background:var(--card);flex-shrink:0}
.tot-row{display:flex;justify-content:space-between;font-size:14px;padding:3px 0}
.tot-grand{font-size:19px;font-weight:700;color:var(--accent-ink);
  border-top:1px solid var(--line);margin-top:8px;padding-top:8px}
.pay-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0 10px}
.pay-btn{padding:10px 4px;border-radius:10px;border:2px solid var(--line);
  background:transparent;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:.12s}
.pay-btn.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
.charge-btn{width:100%;padding:15px;border-radius:13px;background:var(--accent);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;border:none;
  font-family:inherit;transition:.13s}
.charge-btn:disabled{opacity:.45;cursor:not-allowed}
.charge-btn:active:not(:disabled){transform:scale(.98)}

/* ── Desktop: side-by-side cart panel ────────────────────────── */
#deskCart{display:none;width:340px;background:var(--card);border-left:1.5px solid var(--line);
  flex-direction:column;overflow:hidden;flex-shrink:0}
.dc-title{padding:13px 16px;font-weight:700;font-size:15px;border-bottom:1px solid var(--line)}
.dc-body{flex:1;overflow-y:auto}
.dc-footer{border-top:2px solid var(--line);padding:14px 16px;flex-shrink:0}

/* ── Checkout modal ──────────────────────────────────────────── */
#chkModal{position:fixed;inset:0;background:rgba(27,29,36,.5);display:none;
  align-items:flex-end;justify-content:center;z-index:60}
#chkModal.open{display:flex}
.chk-sheet{background:var(--card);border-radius:20px 20px 0 0;
  padding:22px 20px 28px;width:100%;max-width:480px;
  animation:slideup .2s cubic-bezier(.4,0,.2,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.chk-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:16px}
.chk-total{background:var(--accent-soft);border-radius:12px;padding:14px;
  text-align:center;margin:14px 0}
.chk-total .lbl{font-size:12.5px;color:var(--ink-soft);font-weight:600;text-transform:uppercase}
.chk-total .val{font-size:30px;font-weight:700;color:var(--accent-ink);
  font-family:'Spline Sans Mono',monospace}
.chk-field{margin:10px 0}
.chk-field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
.chk-field input{width:100%;padding:12px 14px;border:1.5px solid var(--line);
  border-radius:11px;font-size:16px;background:var(--paper)}
.chk-change{text-align:center;font-size:15px;font-weight:600;color:var(--accent-ink);
  min-height:22px;margin-bottom:4px}
.chk-confirm{width:100%;padding:15px;border-radius:13px;background:var(--accent);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;border:none;font-family:inherit;margin-top:10px}
.chk-cancel{width:100%;padding:12px;border-radius:13px;background:transparent;
  color:var(--ink-soft);font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;margin-top:6px}

/* ── Receipt ─────────────────────────────────────────────────── */
#rcptRoot{display:none}
.rcp{font-family:'Hanken Grotesk',sans-serif;width:320px;margin:0 auto;
  padding:20px;font-size:12px;color:#111}
.rcp-head{text-align:center;margin-bottom:14px}
.rcp-items{border-top:1px dashed #ccc;border-bottom:1px dashed #ccc;padding:8px 0;margin:10px 0}
.rcp-row{display:flex;justify-content:space-between;margin-bottom:4px}
.rcp-total{font-weight:700;font-size:14px}
.rcp-foot{text-align:center;color:#999;font-size:11px;margin-top:12px}
@media print{body *{visibility:hidden}#rcptRoot,#rcptRoot *{visibility:visible}
  #rcptRoot{display:block;position:absolute;left:0;top:0}@page{margin:8mm}}

/* ── Responsive ─────────────────────────────────────────────── */
@media(max-width:699px){
  .item-grid{grid-template-columns:repeat(2,1fr)}
}
@media(min-width:700px){
  #cartBar,#cartBackdrop,#cartSheet{display:none!important}
  #deskCart{display:flex!important}
  #posView{flex-direction:column}
  .pos-items{padding-bottom:12px}
  .item-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
}
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="spinner"></div>
  <div style="font-size:14px;color:#888">Loading POS…</div>
</div>

<!-- Login -->
<div id="loginView">
  <div class="lv-logo" id="bizLogo">Q</div>
  <div class="lv-title" id="bizName">POS</div>
  <div class="lv-sub">Select your name to sign in</div>
  <div class="emp-grid" id="empGrid"></div>
  <p style="margin-top:28px;font-size:12px;color:#bbb">Staff POS · Powered by QuoteMaster</p>
</div>

<!-- PIN -->
<div id="pinView">
  <div class="pin-name" id="pinName">Name</div>
  <div class="pin-hint">Enter your PIN</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
  </div>
  <div class="pinpad" id="pinPad"></div>
  <div class="pin-err" id="pinErr"></div>
  <button class="pin-back" onclick="showLogin()">← Back</button>
</div>

<!-- POS -->
<div id="posView">
  <!-- Header -->
  <div class="ph">
    <div>
      <div class="ph-biz" id="posBiz">POS</div>
      <div class="ph-sub" id="posCashier">Cashier</div>
    </div>
    <button class="ph-btn" onclick="endSession()">Sign out</button>
  </div>

  <!-- Items + (desktop) cart side by side -->
  <div style="flex:1;display:flex;overflow:hidden">
    <!-- Items panel -->
    <div class="pos-items">
      <div class="pos-search">
        <input id="posSearch" placeholder="🔍 Search products…" oninput="renderItems(this.value)">
      </div>
      <div class="item-grid" id="itemGrid"></div>
    </div>

    <!-- Desktop cart -->
    <div id="deskCart">
      <div class="dc-title">🛒 Cart</div>
      <div class="dc-body" id="deskCartBody"></div>
      <div class="dc-footer" id="deskCartFooter"></div>
    </div>
  </div>
</div>

<!-- Mobile: cart bar -->
<div id="cartBar" onclick="openCartSheet()">
  <div>
    <div class="cb-info" id="cbInfo">Cart</div>
    <div class="cb-total" id="cbTotal">—</div>
  </div>
  <div class="cb-cta">View cart →</div>
</div>

<!-- Mobile: cart sheet backdrop -->
<div id="cartBackdrop" onclick="closeCartSheet()"></div>

<!-- Mobile: cart sheet -->
<div id="cartSheet">
  <div class="cs-handle"></div>
  <div class="cs-head">
    <h3>🛒 Cart</h3>
    <button class="cs-add-more" onclick="closeCartSheet()">← Add more items</button>
  </div>
  <div class="cs-body" id="csBody"></div>
  <div class="cs-footer" id="csFooter"></div>
</div>

<!-- Checkout modal -->
<div id="chkModal">
  <div class="chk-sheet">
    <div class="chk-title">Complete Sale</div>
    <div class="chk-field">
      <label>Customer name (optional)</label>
      <input id="chk_cust" placeholder="Walk-in">
    </div>
    <div class="chk-total">
      <div class="lbl">Amount due</div>
      <div class="val" id="chk_total">—</div>
    </div>
    <div id="chk_cashFields">
      <div class="chk-field">
        <label>Cash tendered</label>
        <input id="chk_tendered" type="number" step="0.01" placeholder="0.00" oninput="updateChange()">
      </div>
      <div class="chk-change" id="chk_change"></div>
    </div>
    <button class="chk-confirm" onclick="confirmSale()">✓ Confirm &amp; Print Receipt</button>
    <button class="chk-cancel" onclick="closeCheckout()">Cancel</button>
  </div>
</div>

<div id="rcptRoot"></div>

<script>
const API_URL   = "https://script.google.com/macros/s/AKfycbzbNEhjv4vrjj0t9sSgvzpWI5xMHKoasdpCruLVQFDFVHssjcMYWo314YWDdvTe2SE6/exec";
const POS_TOKEN = new URLSearchParams(location.search).get('t') || '';

let ctx = null, cashier = null, cart = [], payMethod = 'cash', _posCounter = 1;
let _pinInput = '', _pinEmp = null;
const isMobile = () => window.innerWidth < 700;

// ── Helpers ────────────────────────────────────────────────────
const esc = s => String(s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt = n => (ctx?.settings?.currencySymbol||'') + ' ' +
  Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

// ── API ────────────────────────────────────────────────────────
async function api(action, payload={}) {
  const r = await fetch(API_URL, {method:'POST',
    body: JSON.stringify(Object.assign({action}, payload))});
  return r.json().catch(() => ({ok:false, error:'Bad response'}));
}

// ── Boot ───────────────────────────────────────────────────────
(async () => {
  if (!POS_TOKEN) {
    showErr('No POS token in this URL.\n\nGet the correct link from:\nPortal → Settings → POS Staff Access');
    return;
  }
  const r = await api('getPOSContext', {posToken: POS_TOKEN});
  if (!r.ok) { showErr(r.error || 'Could not connect. Check internet.'); return; }
  ctx = r;
  _posCounter = r.counter || 1;
  document.getElementById('splash').style.display = 'none';
  showLogin();
})();

function showErr(msg) {
  document.getElementById('splash').innerHTML =
    '<div class="err-card"><b>⚠ Cannot connect</b><p>' + msg.replace(/\n/g,'<br>') + '</p></div>';
}

// ── Login ──────────────────────────────────────────────────────
function showLogin() {
  document.getElementById('pinView').style.display   = 'none';
  document.getElementById('loginView').style.display = 'flex';
  document.getElementById('posView').style.display   = 'none';
  const s = ctx.settings;
  const logo = document.getElementById('bizLogo');
  if (s.logo) { logo.innerHTML = '<img src="'+s.logo+'">'; logo.style.background='transparent'; }
  else logo.textContent = (s.businessName||'Q')[0].toUpperCase();
  document.getElementById('bizName').textContent = s.businessName || 'POS';
  document.getElementById('empGrid').innerHTML = (ctx.employees||[]).map(e =>
    '<div class="emp-tile" onclick="pickEmp(\''+e.id+'\')">'+
      '<div class="emp-avt">'+(e.name||'?')[0].toUpperCase()+'</div>'+
      '<b>'+esc(e.name)+'</b><span>'+esc(e.role||'cashier')+'</span>'+
    '</div>').join('');
}

// ── PIN ────────────────────────────────────────────────────────
function pickEmp(id) {
  const e = (ctx.employees||[]).find(x => x.id === id);
  if (!e) return;
  _pinEmp = e;
  if (!e.pin) { cashier = e; openPOS(); return; }
  _pinInput = '';
  document.getElementById('pinName').textContent = e.name;
  document.getElementById('pinErr').textContent  = '';
  updateDots();
  buildPinpad();
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('pinView').style.display   = 'flex';
}
function buildPinpad() {
  document.getElementById('pinPad').innerHTML =
    [1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k =>
      '<div class="pk" onclick="pressPin(\''+k+'\')">'+(k===''?'':k)+'</div>'
    ).join('');
}
function pressPin(k) {
  if (k === '⌫') _pinInput = _pinInput.slice(0,-1);
  else if (k !== '' && _pinInput.length < 4) _pinInput += k;
  updateDots();
  if (_pinInput.length === 4) setTimeout(verifyPin, 60);
}
function updateDots() {
  document.querySelectorAll('.pin-dot').forEach((d,i) =>
    d.classList.toggle('on', i < _pinInput.length));
}
function verifyPin() {
  if (_pinEmp && _pinEmp.pin === _pinInput) { cashier = _pinEmp; openPOS(); }
  else {
    document.getElementById('pinErr').textContent = 'Incorrect PIN — try again';
    _pinInput = '';
    updateDots();
  }
}

// ── Open POS ───────────────────────────────────────────────────
function openPOS() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('pinView').style.display   = 'none';
  document.getElementById('posView').style.display   = 'flex';
  document.getElementById('posBiz').textContent     = ctx.settings.businessName || 'POS';
  document.getElementById('posCashier').textContent = 'Cashier: ' + (cashier ? cashier.name : '');
  document.getElementById('taxLabel') &&
    (document.getElementById('taxLabel').textContent =
      (ctx.settings.taxLabel||'Tax') + ' ' + ctx.settings.taxRate + '%');
  cart = []; payMethod = 'cash';
  renderItems('');
  updateCart();
}
function endSession() { cashier = null; cart = []; showLogin(); }

// ── Items ──────────────────────────────────────────────────────
function renderItems(q) {
  const items = (ctx.items||[]).filter(i =>
    (i.name+(i.sku||'')+(i.barcode||'')).toLowerCase().includes(q.toLowerCase()));
  document.getElementById('itemGrid').innerHTML = items.map(i => {
    const inCart = cart.find(c => c.itemId === i.id);
    const tracked = i.trackStock !== false;
    const qty = i.stockQty || 0;
    const oos = tracked && qty <= 0;
    const low = tracked && i.reorderLevel > 0 && qty <= i.reorderLevel && qty > 0;
    const stkCls = !tracked ? '' : oos ? 'sk-o' : low ? 'sk-l' : 'sk-g';
    return '<div class="itile'+(oos?' oos':'')+'" onclick="addToCart(\''+i.id+'\')">'+
      (inCart ? '<div class="t-qty">'+inCart.qty+'</div>' : '')+
      (tracked ? '<div class="t-stk '+stkCls+'">'+(oos?'Out':qty)+'</div>' : '')+
      '<div class="t-name">'+esc(i.name)+'</div>'+
      '<div class="t-price">'+fmt(i.unitPrice)+'</div>'+
      '<div class="t-unit">'+esc(i.unit||'pc')+'</div>'+
    '</div>';
  }).join('') || '<div style="padding:24px;color:#aaa;font-size:14px;text-align:center">No products found</div>';
}

// ── Cart ───────────────────────────────────────────────────────
function addToCart(itemId) {
  const item = (ctx.items||[]).find(i => i.id === itemId);
  if (!item) return;
  if (item.trackStock !== false) {
    const inCart = cart.find(c => c.itemId === itemId);
    const cartQty = inCart ? inCart.qty : 0;
    if ((item.stockQty||0) - cartQty <= 0) {
      alert(item.name + ' is out of stock'); return;
    }
  }
  const ex = cart.find(c => c.itemId === itemId);
  if (ex) ex.qty++;
  else cart.push({itemId, name:item.name, unitPrice:item.unitPrice,
    taxable:item.taxable!==false, qty:1, amount:item.unitPrice});
  calcAmounts();
  updateCart();
  renderItems(document.getElementById('posSearch').value);
}
function adjQty(idx, delta) {
  cart[idx].qty = Math.max(1, cart[idx].qty + delta);
  calcAmounts();
  updateCart();
  renderItems(document.getElementById('posSearch').value);
}
function removeFromCart(idx) {
  cart.splice(idx, 1);
  calcAmounts();
  updateCart();
  renderItems(document.getElementById('posSearch').value);
}
function calcAmounts() {
  const rate = (ctx.settings.taxRate||0) / 100;
  let sub=0, tax=0;
  cart.forEach(ci => {
    ci.amount = +(ci.qty * ci.unitPrice).toFixed(2);
    sub += ci.amount;
    if (ci.taxable) tax += ci.amount * rate;
  });
  return {sub:+sub.toFixed(2), tax:+tax.toFixed(2), total:+(sub+tax).toFixed(2)};
}
function updateCart() {
  const t     = calcAmounts();
  const count = cart.reduce((s,c) => s+c.qty, 0);
  const rowsHtml = cart.length ? cart.map((ci,ix) =>
    '<div class="ci-row">'+
      '<div class="ci-name"><b>'+esc(ci.name)+'</b><span>'+fmt(ci.unitPrice)+' each</span></div>'+
      '<div class="ci-qty">'+
        '<button class="cq-btn" onclick="adjQty('+ix+',-1)">−</button>'+
        '<span style="min-width:20px;text-align:center;font-weight:700">'+ci.qty+'</span>'+
        '<button class="cq-btn" onclick="adjQty('+ix+',1)">+</button>'+
      '</div>'+
      '<div class="ci-amt">'+fmt(ci.amount)+'</div>'+
      '<button class="ci-rm" onclick="removeFromCart('+ix+')">×</button>'+
    '</div>').join('')
    : '<div class="cs-empty">Cart is empty.<br>Tap products to add them.</div>';

  const payHtml =
    '<div class="pay-row">'+
      ['cash','card','transfer'].map(m =>
        '<div class="pay-btn'+(payMethod===m?' sel':'')+'" id="pm_'+m+'" onclick="selPay(\''+m+'\')">'+
          {cash:'💵 Cash',card:'💳 Card',transfer:'🏦 Transfer'}[m]+
        '</div>').join('')+
    '</div>';
  const totHtml =
    '<div class="tot-row"><span>Subtotal</span><span>'+fmt(t.sub)+'</span></div>'+
    '<div class="tot-row"><span>'+(ctx.settings.taxLabel||'Tax')+' '+ctx.settings.taxRate+'%</span><span>'+fmt(t.tax)+'</span></div>'+
    '<div class="tot-row tot-grand"><span>Total</span><span>'+fmt(t.total)+'</span></div>';
  const chargeHtml =
    '<button class="charge-btn" id="chargeBtn"'+(cart.length?'':' disabled')+' onclick="openCheckout()">'+
      (cart.length ? 'Charge — '+fmt(t.total) : 'Add items to charge')+
    '</button>';

  // Update mobile sheet
  const csBody = document.getElementById('csBody');
  const csFooter = document.getElementById('csFooter');
  if (csBody)   csBody.innerHTML   = rowsHtml;
  if (csFooter) csFooter.innerHTML = totHtml + payHtml + chargeHtml;

  // Update desktop cart
  const dcBody   = document.getElementById('deskCartBody');
  const dcFooter = document.getElementById('deskCartFooter');
  if (dcBody)   dcBody.innerHTML   = rowsHtml;
  if (dcFooter) dcFooter.innerHTML = totHtml + payHtml + chargeHtml;

  // Update mobile bar
  const bar = document.getElementById('cartBar');
  if (bar) {
    if (cart.length) {
      document.getElementById('cbInfo').textContent  = count + ' item' + (count!==1?'s':'');
      document.getElementById('cbTotal').textContent = fmt(t.total);
      bar.classList.add('up');
    } else {
      bar.classList.remove('up');
    }
  }
}

function selPay(m) {
  payMethod = m;
  document.querySelectorAll('.pay-btn').forEach(b =>
    b.classList.toggle('sel', b.id === 'pm_'+m));
}

// ── Cart sheet (mobile) ────────────────────────────────────────
function openCartSheet() {
  document.getElementById('cartSheet').classList.add('open');
  document.getElementById('cartBackdrop').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeCartSheet() {
  document.getElementById('cartSheet').classList.remove('open');
  const bd = document.getElementById('cartBackdrop');
  bd.classList.remove('show');
  document.body.style.overflow = '';
}

// ── Checkout ───────────────────────────────────────────────────
function openCheckout() {
  const t = calcAmounts();
  document.getElementById('chk_total').textContent      = fmt(t.total);
  document.getElementById('chk_tendered').value         = '';
  document.getElementById('chk_change').textContent     = '';
  document.getElementById('chk_cashFields').style.display = payMethod==='cash'?'block':'none';
  document.getElementById('chkModal').classList.add('open');
}
function closeCheckout() {
  document.getElementById('chkModal').classList.remove('open');
}
function updateChange() {
  const t = calcAmounts();
  const tendered = +document.getElementById('chk_tendered').value || 0;
  const el = document.getElementById('chk_change');
  if (tendered > 0)
    el.textContent = tendered >= t.total
      ? 'Change: '+fmt(tendered - t.total)
      : '⚠ Not enough';
}
async function confirmSale() {
  const t = calcAmounts();
  const s = ctx.settings;
  const tendered = payMethod==='cash'
    ? (+document.getElementById('chk_tendered').value || t.total)
    : t.total;
  const num = (s.posPrefix||'TXN-') + String(_posCounter).padStart(4,'0');
  const txn = {
    id: Math.random().toString(36).slice(2), number: num,
    date: new Date().toISOString().slice(0,10),
    time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
    cashier: cashier?.name || 'Staff',
    customer: document.getElementById('chk_cust').value || 'Walk-in',
    lineItems: JSON.parse(JSON.stringify(cart)),
    totals: {...t, tendered, change: +(tendered-t.total).toFixed(2)},
    paymentMethod: payMethod
  };
  closeCheckout();
  closeCartSheet();
  api('savePOSTransaction', {posToken: POS_TOKEN, txn: JSON.stringify(txn)})
    .then(r => { if (r.ok && r.nextCounter) _posCounter = r.nextCounter; });
  _posCounter++;
  printReceipt(txn);
  cart = []; updateCart(); renderItems('');
}
function printReceipt(txn) {
  const s = ctx.settings;
  const logo = s.logo
    ? '<img src="'+s.logo+'" style="width:48px;height:48px;border-radius:8px;object-fit:cover">'
    : '<div style="width:48px;height:48px;border-radius:8px;background:#0f6d5a;color:#fff;display:grid;place-items:center;font-size:20px;font-weight:700;margin:0 auto">'+
        (s.businessName||'Q')[0]+'</div>';
  document.getElementById('rcptRoot').innerHTML =
    '<div class="rcp">'+
      '<div class="rcp-head">'+logo+
        '<div style="font-weight:700;font-size:16px;margin-top:8px">'+esc(s.businessName||'')+'</div>'+
        '<div style="font-size:12px;color:#888">'+txn.date+' '+txn.time+'</div>'+
        '<div style="font-size:12px;color:#888">Receipt '+esc(txn.number)+'</div>'+
        '<div style="font-size:12px;color:#888">'+esc(txn.cashier)+' · '+esc(txn.customer)+'</div>'+
      '</div>'+
      '<div class="rcp-items">'+
        txn.lineItems.map(li =>
          '<div class="rcp-row"><span>'+esc(li.name)+' ×'+li.qty+'</span><span>'+fmt(li.amount)+'</span></div>'
        ).join('')+
      '</div>'+
      '<div class="rcp-row"><span>'+(s.taxLabel||'Tax')+' '+s.taxRate+'%</span><span>'+fmt(txn.totals.tax)+'</span></div>'+
      '<div class="rcp-row rcp-total"><span>TOTAL</span><span>'+fmt(txn.totals.total)+'</span></div>'+
      (txn.paymentMethod==='cash'
        ? '<div class="rcp-row"><span>Cash</span><span>'+fmt(txn.totals.tendered)+'</span></div>'+
          '<div class="rcp-row"><span>Change</span><span>'+fmt(txn.totals.change)+'</span></div>'
        : '<div style="text-align:right;color:#888">Paid by '+txn.paymentMethod+'</div>')+
      '<div class="rcp-foot">Thank you!</div>'+
    '</div>';
  setTimeout(() => window.print(), 100);
}
</script>
</body>
