<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>POS — QuoteMaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--accent:#0f6d5a;--accent-soft:#e3f0ea;--ink:#1b1d24;--ink-soft:#5b5d68;--line:#e4ded2;--paper:#f6f3ec;--card:#fffdf8;--danger:#b3261e;--amber:#b45309;--amber-soft:#fbe7d2;--shadow:0 2px 8px rgba(27,29,36,.08);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--paper);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none}
input{font-family:inherit;font-size:16px;color:var(--ink)}

/* ---------- Loading/Error ---------- */
#splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--paper);flex-direction:column;gap:16px;z-index:99}
.spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-card{background:var(--card);border:1px solid var(--danger);border-radius:14px;padding:24px;max-width:360px;text-align:center;color:var(--danger)}

/* ---------- Employee login ---------- */
#loginView{display:none;min-height:100vh;padding:24px 16px}
.login-header{text-align:center;margin-bottom:24px}
.biz-logo{width:56px;height:56px;border-radius:14px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:24px;font-weight:700;margin:0 auto 10px}
.biz-logo img{width:100%;height:100%;object-fit:cover;border-radius:14px}
.login-header h2{font-size:22px;margin-bottom:4px}
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;max-width:560px;margin:0 auto}
.emp-tile{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:18px 12px;text-align:center;cursor:pointer;transition:.15s;user-select:none}
.emp-tile:hover,.emp-tile:active{border-color:var(--accent);background:var(--accent-soft)}
.emp-avt{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:18px;font-weight:700;margin:0 auto 9px}
.emp-name{font-weight:600;font-size:14px}
.emp-role{font-size:12px;color:var(--ink-soft);margin-top:2px}

/* ---------- PIN pad ---------- */
#pinView{display:none;min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
.pin-header{text-align:center;margin-bottom:20px}
.pin-name{font-size:20px;font-weight:700;margin-bottom:4px}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:16px 0}
.pin-dot{width:16px;height:16px;border-radius:50%;background:var(--line);transition:.15s}
.pin-dot.filled{background:var(--accent)}
.pinpad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;max-width:260px;width:100%}
.pin-key{padding:16px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);font-size:22px;font-weight:600;cursor:pointer;text-align:center;transition:.12s;user-select:none}
.pin-key:hover,.pin-key:active{background:var(--accent-soft);border-color:var(--accent)}
.pin-err{color:var(--danger);font-size:13px;margin-top:10px;min-height:20px;text-align:center}
.btn-back{margin-top:14px;padding:10px 20px;border-radius:10px;border:1.5px solid var(--line);background:transparent;font-size:14px;font-weight:600;cursor:pointer}

/* ---------- POS ---------- */
#posView{display:none;height:100vh;flex-direction:column;overflow:hidden}
.pos-header{background:var(--accent);color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.pos-header .biz{font-weight:700;font-size:15px}
.pos-header .cashier{font-size:12.5px;opacity:.9}
.pos-header button{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer}
/* Mobile tabs */
.pos-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--line);flex-shrink:0}
.pos-tab{flex:1;padding:12px;text-align:center;font-weight:600;font-size:14px;cursor:pointer;border-bottom:2.5px solid transparent;color:var(--ink-soft);transition:.12s}
.pos-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* Body */
.pos-body{flex:1;display:flex;overflow:hidden}
.pos-items{flex:1;overflow-y:auto;padding:12px;background:var(--paper)}
.pos-search{position:relative;margin-bottom:10px}
.pos-search input{width:100%;padding:10px 14px;border:1.5px solid var(--line);border-radius:11px;background:var(--card);font-size:15px}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px}
.item-tile{background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:13px 11px;cursor:pointer;transition:.13s;position:relative;user-select:none}
.item-tile:hover,.item-tile:active{background:var(--accent-soft);border-color:var(--accent)}
.item-tile .t-name{font-weight:600;font-size:13px;line-height:1.3;margin-bottom:5px}
.item-tile .t-price{font-size:14px;font-weight:700;color:var(--accent);font-family:'Spline Sans Mono',monospace}
.item-tile .t-stk{position:absolute;top:5px;right:6px;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px}
.stk-good{background:#e3f0ea;color:#0b5345}.stk-low{background:#fbe7d2;color:#b45309}.stk-out{background:#f7dedc;color:#b3261e}
.stk-dim{opacity:.35;cursor:not-allowed!important}
.item-tile .t-badge{position:absolute;top:-7px;right:-7px;background:var(--accent);color:#fff;border-radius:20px;font-size:11px;font-weight:700;padding:2px 8px;min-width:24px;text-align:center}
/* Cart panel */
.pos-cart{width:340px;background:var(--card);border-left:1.5px solid var(--line);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.cart-title{padding:12px 14px;font-weight:700;font-size:14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.cart-body{flex:1;overflow-y:auto;padding:6px 0}
.cart-empty{padding:30px 20px;text-align:center;color:var(--ink-soft);font-size:13.5px}
.cart-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line)}
.cart-row:last-child{border-bottom:none}
.cart-row-name{flex:1;font-size:13.5px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cart-row-sub{font-size:12px;color:var(--ink-soft)}
.qty-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.qty-btn{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--line);background:var(--paper);font-size:18px;font-weight:700;cursor:pointer;display:grid;place-items:center;line-height:1}
.qty-btn:active{background:var(--accent-soft)}
.cart-row-amt{font-size:13px;font-family:'Spline Sans Mono',monospace;min-width:64px;text-align:right;flex-shrink:0}
.cart-footer{border-top:2px solid var(--line);padding:12px 14px;background:var(--card)}
.total-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px}
.total-row.grand{font-size:18px;font-weight:700;color:var(--accent);margin-top:6px;padding-top:6px;border-top:1px solid var(--line)}
.pay-methods{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:10px 0 10px}
.pay-btn{padding:10px 4px;border-radius:10px;border:2px solid var(--line);background:transparent;font-size:13px;font-weight:600;cursor:pointer;transition:.12s;text-align:center}
.pay-btn.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.charge-btn{width:100%;padding:14px;border-radius:12px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.13s}
.charge-btn:disabled{opacity:.5;cursor:not-allowed}
.charge-btn:active:not(:disabled){transform:scale(.98)}
/* Checkout modal */
#checkoutModal{position:fixed;inset:0;background:rgba(27,29,36,.5);display:none;align-items:flex-end;justify-content:center;z-index:50;padding:0}
#checkoutModal.open{display:flex}
.checkout-sheet{background:var(--card);border-radius:20px 20px 0 0;padding:22px 20px;width:100%;max-width:480px;animation:slideup .2s ease}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.cs-title{font-size:18px;font-weight:700;margin-bottom:16px;text-align:center}
.cs-field{margin:10px 0}
.cs-field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
.cs-field input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:16px;background:var(--paper)}
.cs-total{background:var(--accent-soft);border-radius:11px;padding:14px;text-align:center;margin:14px 0}
.cs-total .lbl{font-size:13px;color:var(--ink-soft)}
.cs-total .val{font-size:28px;font-weight:700;color:var(--accent);font-family:'Spline Sans Mono',monospace}
.cs-change{text-align:center;font-size:15px;font-weight:600;color:var(--accent);margin-bottom:10px;min-height:24px}
.cs-confirm{width:100%;padding:15px;border-radius:12px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer;border:none;font-family:inherit;margin-top:8px}
.cs-cancel{width:100%;padding:12px;border-radius:12px;background:transparent;color:var(--ink-soft);font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;margin-top:6px}
/* Receipt print */
#rcptRoot{display:none}
.rcp{font-family:'Hanken Grotesk',sans-serif;width:320px;margin:0 auto;padding:20px;font-size:12px;color:#111}
.rcp-head{text-align:center;margin-bottom:14px}
.rcp-items{border-top:1px dashed #ccc;border-bottom:1px dashed #ccc;padding:8px 0;margin:10px 0}
.rcp-row{display:flex;justify-content:space-between;margin-bottom:4px}
.rcp-total{font-weight:700;font-size:14px}
.rcp-foot{text-align:center;color:#999;font-size:11px;margin-top:12px}
@media print{body *{visibility:hidden}#rcptRoot,#rcptRoot *{visibility:visible}#rcptRoot{display:block;position:absolute;left:0;top:0}@page{margin:8mm}}
/* Responsive */
@media(max-width:700px){
  .pos-tabs{display:flex!important}
  .pos-cart{display:none;width:100%}
  .pos-cart.show-mobile{display:flex!important;position:fixed;inset:0;z-index:40;overflow:auto}
  .pos-cart .cart-footer{position:sticky;bottom:0}
  #posView{height:auto;min-height:100vh}
  .pos-body{overflow:visible}
  .pos-items{width:100%}
  .item-grid{grid-template-columns:repeat(2,1fr)}
}
@media(min-width:701px){.pos-tabs{display:none!important}}
</style>
</head>
<body>

<div id="splash"><div class="spinner"></div><div class="muted" style="font-size:14px;color:#888">Loading POS…</div></div>

<div id="loginView">
  <div class="login-header">
    <div class="biz-logo" id="bizLogo">Q</div>
    <h2 id="bizName">QuoteMaster POS</h2>
    <p style="color:#888;font-size:14px">Select your name to sign in</p>
  </div>
  <div class="emp-grid" id="empGrid"></div>
  <p style="text-align:center;color:#bbb;font-size:12px;margin-top:28px">Staff POS · Powered by QuoteMaster</p>
</div>

<div id="pinView">
  <div class="pin-header">
    <div class="emp-avt" id="pinAvt" style="margin:0 auto 8px">?</div>
    <div class="pin-name" id="pinName">Name</div>
    <div style="color:#888;font-size:13.5px">Enter your PIN</div>
  </div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pinpad" id="pinPad"></div>
  <div class="pin-err" id="pinErr"></div>
  <button class="btn-back" onclick="showLogin()">← Back</button>
</div>

<div id="posView">
  <div class="pos-header">
    <div><div class="biz" id="posBiz">POS</div><div class="cashier" id="posCashier">Cashier</div></div>
    <button onclick="endSession()">Sign out</button>
  </div>
  <div class="pos-tabs">
    <div class="pos-tab active" id="tabItems" onclick="switchTab('items')">Products</div>
    <div class="pos-tab" id="tabCart" onclick="switchTab('cart')">Cart <span id="cartCount" style="background:var(--accent);color:#fff;border-radius:20px;padding:1px 7px;font-size:12px;margin-left:4px">0</span></div>
  </div>
  <div class="pos-body">
    <div class="pos-items" id="itemsPanel">
      <div class="pos-search"><input id="posSearch" placeholder="🔍 Search products…" oninput="renderItems(this.value)"></div>
      <div class="item-grid" id="itemGrid"></div>
    </div>
    <div class="pos-cart" id="cartPanel">
      <div class="cart-title">🛒 Cart</div>
      <div class="cart-body" id="cartBody"></div>
      <div class="cart-footer">
        <div class="total-row"><span>Subtotal</span><span class="mono" id="totalSub">—</span></div>
        <div class="total-row"><span id="taxLabel">Tax</span><span class="mono" id="totalTax">—</span></div>
        <div class="total-row grand"><span>Total</span><span class="mono" id="totalAmt">—</span></div>
        <div class="pay-methods">
          <div class="pay-btn sel" id="pm_cash" onclick="selPay('cash')">💵 Cash</div>
          <div class="pay-btn" id="pm_card" onclick="selPay('card')">💳 Card</div>
          <div class="pay-btn" id="pm_transfer" onclick="selPay('transfer')">🏦 Transfer</div>
        </div>
        <button class="charge-btn" id="chargeBtn" disabled onclick="openCheckout()">Charge — —</button>
      </div>
    </div>
  </div>
</div>

<div id="checkoutModal">
  <div class="checkout-sheet">
    <div class="cs-title">Complete Sale</div>
    <div class="cs-field"><label>Customer name (optional)</label><input id="cs_cust" placeholder="Walk-in"></div>
    <div class="cs-total"><div class="lbl">Amount due</div><div class="val" id="cs_total">—</div></div>
    <div id="cs_cashFields">
      <div class="cs-field"><label>Cash tendered</label><input id="cs_tendered" type="number" step="0.01" placeholder="0.00" oninput="updateChange()"></div>
      <div class="cs-change" id="cs_change"></div>
    </div>
    <button class="cs-confirm" onclick="confirmSale()">Confirm & Print Receipt</button>
    <button class="cs-cancel" onclick="closeCheckout()">Cancel</button>
  </div>
</div>

<div id="rcptRoot"></div>

<script>
// ── Config ───────────────────────────────────────────────────────
const API_URL    = "https://script.google.com/macros/s/AKfycbzbNEhjv4vrjj0t9sSgvzpWI5xMHKoasdpCruLVQFDFVHssjcMYWo314YWDdvTe2SE6/exec";
const POS_TOKEN  = new URLSearchParams(location.search).get('t') || '';

// ── State ────────────────────────────────────────────────────────
let ctx = null;        // {items, employees, settings, counter}
let cashier = null;    // selected employee
let cart = [];
let payMethod = 'cash';
let _pinInput = '';
let _pinEmp = null;
let _posCounter = 1;

// ── API ──────────────────────────────────────────────────────────
async function api(action, payload={}) {
  const r = await fetch(API_URL, {method:'POST', body:JSON.stringify(Object.assign({action},payload))});
  return r.json().catch(()=>({ok:false,error:'Bad response'}));
}

// ── Boot ─────────────────────────────────────────────────────────
(async () => {
  if (!POS_TOKEN) {
    showErr('No POS access token in this URL.\n\nTo get the correct link:\n1. Open the portal at wadde.online/quotemaster/\n2. Go to Settings\n3. Copy the link from "POS Staff Access Link"\n4. Bookmark that link on this device.');
    return;
  }
  const r = await api('getPOSContext', {posToken: POS_TOKEN});
  if (!r.ok) { showErr(r.error||'Could not connect. Check your internet and try again.'); return; }
  ctx = r;
  _posCounter = r.counter||1;
  hideSplash();
  showLogin();
})();

function hideSplash(){ document.getElementById('splash').style.display='none'; }
function showErr(msg){
  document.getElementById('splash').innerHTML=`<div class="err-card"><b>⚠ Cannot connect</b><p style="margin-top:8px;font-size:13.5px">${msg.replace(/\n/g,'<br>')}</p></div>`;
}

// ── Login ────────────────────────────────────────────────────────
function showLogin() {
  hide('pinView'); show('loginView'); hide('posView');
  const s = ctx.settings;
  const logo = document.getElementById('bizLogo');
  if (s.logo) { logo.innerHTML=`<img src="${s.logo}">`; logo.style.background=''; }
  else logo.textContent = (s.businessName||'Q')[0].toUpperCase();
  document.getElementById('bizName').textContent = s.businessName||'POS';
  const grid = document.getElementById('empGrid');
  grid.innerHTML = (ctx.employees||[]).map(e =>
    `<div class="emp-tile" onclick="pickEmp('${e.id}')">
      <div class="emp-avt">${(e.name||'?')[0].toUpperCase()}</div>
      <div class="emp-name">${esc(e.name)}</div>
      <div class="emp-role">${e.role||'cashier'}</div>
    </div>`).join('');
}

function pickEmp(id) {
  const e = (ctx.employees||[]).find(x => x.id===id);
  if (!e) return;
  _pinEmp = e;
  if (!e.pin) { cashier=e; openPOS(); return; } // no PIN set → direct login
  _pinInput = '';
  document.getElementById('pinAvt').textContent = e.name[0].toUpperCase();
  document.getElementById('pinName').textContent = e.name;
  document.getElementById('pinErr').textContent = '';
  updatePinDots();
  buildPinpad();
  hide('loginView'); show('pinView');
}

function buildPinpad() {
  const keys = [1,2,3,4,5,6,7,8,9,'',0,'⌫'];
  document.getElementById('pinPad').innerHTML = keys.map(k =>
    `<div class="pin-key" onclick="pressPin('${k}')">${k}</div>`).join('');
}
function pressPin(k) {
  if (k==='⌫') { _pinInput=_pinInput.slice(0,-1); }
  else if (k!=='' && _pinInput.length<4) _pinInput+=k;
  updatePinDots();
  if (_pinInput.length===4) verifyPin();
}
function updatePinDots() {
  document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<_pinInput.length));
}
function verifyPin() {
  if (_pinEmp && _pinEmp.pin === _pinInput) { cashier=_pinEmp; openPOS(); }
  else { document.getElementById('pinErr').textContent='Wrong PIN. Try again.'; _pinInput=''; setTimeout(updatePinDots,100); }
}

// ── POS ──────────────────────────────────────────────────────────
function openPOS() {
  hide('loginView'); hide('pinView'); show('posView');
  const s = ctx.settings;
  document.getElementById('posBiz').textContent = s.businessName||'POS';
  document.getElementById('posCashier').textContent = 'Cashier: '+(cashier?cashier.name:'');
  document.getElementById('taxLabel').textContent = (s.taxLabel||'Tax')+' '+s.taxRate+'%';
  cart = []; payMethod = 'cash'; updateCart();
  renderItems('');
}

function renderItems(q) {
  const items = (ctx.items||[]).filter(i=>(i.name+(i.sku||'')+(i.barcode||'')).toLowerCase().includes(q.toLowerCase()));
  const s = ctx.settings;
  const fmt = n => s.currencySymbol+' '+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById('itemGrid').innerHTML = items.map(i => {
    const inCart = cart.find(c=>c.itemId===i.id);
    const tracked = i.trackStock!==false;
    const qty = i.stockQty||0;
    const oos = tracked && qty<=0;
    const low = tracked && i.reorderLevel>0 && qty<=i.reorderLevel && qty>0;
    const stkCls = !tracked?'':oos?'stk-out':low?'stk-low':'stk-good';
    const stkLabel = !tracked?'':oos?'Out':String(qty);
    return `<div class="item-tile${oos?' stk-dim':''}" onclick="${oos?'':'addToCart(\''+i.id+'\')'}">
      ${inCart?`<div class="t-badge">${inCart.qty}</div>`:''}
      ${tracked?`<div class="t-stk ${stkCls}">${stkLabel}</div>`:''}
      <div class="t-name">${esc(i.name)}</div>
      <div class="t-price">${fmt(i.unitPrice)}</div>
      <div class="t-unit">${esc(i.unit||'pc')}</div>
    </div>`;
  }).join('') || '<div style="padding:20px;color:#aaa;font-size:13.5px">No products found</div>';
}

function addToCart(itemId) {
  const item = (ctx.items||[]).find(i=>i.id===itemId); if(!item) return;
  if (item.trackStock!==false) {
    const inCart = cart.find(c=>c.itemId===itemId);
    const cartQty = inCart ? inCart.qty : 0;
    if ((item.stockQty||0) - cartQty <= 0) {
      alert(item.name + ' is out of stock'); return;
    }
  }
  const ex = cart.find(c=>c.itemId===itemId);
  if (ex) ex.qty++; else cart.push({itemId, name:item.name, unitPrice:item.unitPrice, taxable:item.taxable!==false, qty:1, amount:item.unitPrice});
  calcCart(); updateCart(); renderItems(document.getElementById('posSearch').value);
}

function adjQty(idx, delta) {
  cart[idx].qty = Math.max(1, cart[idx].qty+delta);
  calcCart(); updateCart(); renderItems(document.getElementById('posSearch').value);
}
function removeFromCart(idx) {
  cart.splice(idx,1); calcCart(); updateCart(); renderItems(document.getElementById('posSearch').value);
}

function calcCart() {
  const rate = (ctx.settings.taxRate||0)/100;
  let sub=0, tax=0;
  cart.forEach(ci=>{ ci.amount=+(ci.qty*ci.unitPrice).toFixed(2); sub+=ci.amount; if(ci.taxable)tax+=ci.amount*rate; });
  return {subtotal:+sub.toFixed(2), tax:+tax.toFixed(2), total:+(sub+tax).toFixed(2)};
}

function updateCart() {
  const s = ctx.settings;
  const fmt = n => s.currencySymbol+' '+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  const t = calcCart();
  const count = cart.reduce((s,c)=>s+c.qty,0);
  document.getElementById('cartCount').textContent = count;
  const body = document.getElementById('cartBody');
  body.innerHTML = cart.length ? cart.map((ci,ix)=>`
    <div class="cart-row">
      <div style="flex:1;min-width:0">
        <div class="cart-row-name">${esc(ci.name)}</div>
        <div class="cart-row-sub">${fmt(ci.unitPrice)} each</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="adjQty(${ix},-1)">−</button>
        <span style="min-width:22px;text-align:center;font-size:14px;font-weight:600">${ci.qty}</span>
        <button class="qty-btn" onclick="adjQty(${ix},1)">+</button>
      </div>
      <div class="cart-row-amt">${fmt(ci.amount)}</div>
      <button onclick="removeFromCart(${ix})" style="background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:0 0 0 6px">×</button>
    </div>`).join('')
    : '<div class="cart-empty">Tap products to add them to the cart</div>';
  document.getElementById('totalSub').textContent = fmt(t.subtotal);
  document.getElementById('totalTax').textContent = fmt(t.tax);
  document.getElementById('totalAmt').textContent = fmt(t.total);
  const btn = document.getElementById('chargeBtn');
  btn.disabled = !cart.length;
  btn.textContent = cart.length ? `Charge — ${fmt(t.total)}` : 'Charge — add items';
}

function selPay(m) {
  payMethod = m;
  ['cash','card','transfer'].forEach(k=>document.getElementById('pm_'+k).classList.toggle('sel',k===m));
}

// ── Tabs (mobile) ────────────────────────────────────────────────
function switchTab(tab) {
  const items = document.getElementById('itemsPanel');
  const cartP = document.getElementById('cartPanel');
  document.getElementById('tabItems').classList.toggle('active',tab==='items');
  document.getElementById('tabCart').classList.toggle('active',tab==='cart');
  if (window.innerWidth <= 700) {
    items.style.display = tab==='items'?'block':'none';
    cartP.classList.toggle('show-mobile', tab==='cart');
  }
}

// ── Checkout ─────────────────────────────────────────────────────
function openCheckout() {
  const t = calcCart();
  const s = ctx.settings;
  const fmt = n => s.currencySymbol+' '+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById('cs_total').textContent = fmt(t.total);
  document.getElementById('cs_tendered').value = '';
  document.getElementById('cs_change').textContent = '';
  document.getElementById('cs_cashFields').style.display = payMethod==='cash'?'block':'none';
  document.getElementById('checkoutModal').classList.add('open');
}
function closeCheckout() { document.getElementById('checkoutModal').classList.remove('open'); }
function updateChange() {
  const t = calcCart();
  const tendered = +document.getElementById('cs_tendered').value||0;
  const s = ctx.settings;
  const fmt = n => s.currencySymbol+' '+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  if (tendered>0) document.getElementById('cs_change').textContent = tendered>=t.total ? 'Change: '+fmt(tendered-t.total) : '⚠ Not enough';
}
async function confirmSale() {
  const t = calcCart();
  const s = ctx.settings;
  const tendered = payMethod==='cash'?(+document.getElementById('cs_tendered').value||t.total):t.total;
  const num = (s.posPrefix||'TXN-')+String(_posCounter).padStart(4,'0');
  const txn = {
    id: Math.random().toString(36).slice(2), number: num,
    date: new Date().toISOString().slice(0,10),
    time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
    cashier: cashier?.name||'Staff',
    customer: document.getElementById('cs_cust').value||'Walk-in',
    lineItems: JSON.parse(JSON.stringify(cart)),
    totals: {...t, tendered, change:+(tendered-t.total).toFixed(2)},
    paymentMethod: payMethod
  };
  closeCheckout();
  // Save to backend (non-blocking)
  api('savePOSTransaction', {posToken: POS_TOKEN, txn: JSON.stringify(txn)})
    .then(r=>{ if(r.ok&&r.nextCounter) _posCounter=r.nextCounter; });
  _posCounter++;
  printReceipt(txn);
  cart = []; updateCart();
  renderItems('');
  if(window.innerWidth<=700) switchTab('items');
}

function printReceipt(txn) {
  const s = ctx.settings;
  const fmt = n => s.currencySymbol+' '+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  const logo = s.logo?`<img src="${s.logo}" style="width:48px;height:48px;border-radius:8px;object-fit:cover">`:
    `<div style="width:48px;height:48px;border-radius:8px;background:#0f6d5a;color:#fff;display:grid;place-items:center;font-size:20px;font-weight:700;margin:0 auto">${(s.businessName||'Q')[0]}</div>`;
  document.getElementById('rcptRoot').innerHTML=`<div class="rcp">
    <div class="rcp-head">${logo}<div style="font-weight:700;font-size:16px;margin-top:8px">${esc(s.businessName||'')}</div>
      <div style="font-size:12px;color:#888">${txn.date} ${txn.time}</div>
      <div style="font-size:12px;color:#888">Receipt ${esc(txn.number)}</div>
      <div style="font-size:12px;color:#888">Cashier: ${esc(txn.cashier)} · ${esc(txn.customer)}</div>
    </div>
    <div class="rcp-items">
      ${txn.lineItems.map(li=>`<div class="rcp-row"><span>${esc(li.name)} ×${li.qty}</span><span>${fmt(li.amount)}</span></div>`).join('')}
    </div>
    <div class="rcp-row"><span>${s.taxLabel} ${s.taxRate}%</span><span>${fmt(txn.totals.tax)}</span></div>
    <div class="rcp-row rcp-total"><span>TOTAL</span><span>${fmt(txn.totals.total)}</span></div>
    ${txn.paymentMethod==='cash'?`<div class="rcp-row"><span>Cash</span><span>${fmt(txn.totals.tendered)}</span></div>
    <div class="rcp-row"><span>Change</span><span>${fmt(txn.totals.change)}</span></div>`:`<div style="text-align:right;color:#888">Paid by ${txn.paymentMethod}</div>`}
    <div class="rcp-foot">Thank you!</div>
  </div>`;
  setTimeout(()=>window.print(),100);
}

function endSession() { cashier=null; cart=[]; showLogin(); }

// ── Utils ────────────────────────────────────────────────────────
function show(id){ const el=document.getElementById(id); el.style.display='flex'; }
function hide(id){ document.getElementById(id).style.display='none'; }
function esc(s){ return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
</script>
</body>
</html>
